front:
  text: 序是書系大冢敬節君之新著君已專攻現代醫術以尚有遺憾於是百方考慮深究古醫方之殘籍多方歷問遺老孜孜修習診方藥術益謙自卑雖倦不知原夫醫方藥術之技自後漢歷三國六朝迄於隋唐益見其精今世所存傷寒金匱本草諸書咸皆當時之殘籍經前賢補詮修訂僅傳其一斑者耳且當時西域南荒之通聘漸次頻繁醫藥亦隨文物而俱盛大和朝廣聘醫博波斯醫之投歸我國此一例也其他可想而知矣至於近世因荷醫德醫之漸入竟使醫製為之一變而滅卻古醫之傳統此殆與漢武之禮聘巫覡作不死長生之夢者正復相同凡事由疏入密由簡移繁為物情必然之理密矣繁矣於是審之而使約集之而使整於是密者痼於密繁者溷於繁紛錯滑離竟喪其本雖聖者不能除其弊是亦必然之理也往昔張仲景氏約南北百家之傳如收羅於一型之中一掃扁鵲巫覡之蠱言一刀斬斷千百亂麻此亦可以語於現代治學之術矣古醫法既泯其傳統而歐洲醫術敷布於天下密之愈密繁之愈繁紛錯滑離之弊漸以滋生而古醫復活之論亦起但論者雖多讀其書傳而不解診術藥方道聽途說徒毀他家嘵嘵然猶不自省君獨居此間排其醜陋孜孜於究方煉術時至廢寢忘食豫苦喘三十年經君一診始斷斯病或將與生共終當其喘咳既盛則和而緩之當其厄噎鬱閉則疏而開之譬猶古國之保守殘器自然漸衰之理不宜妄施克伐查醫家之為余立醫案者凡數十人咸在急切攻其疾患不測體軀萎衰之狀而君獨能洞鑑其隱以處理殘鼎敗器之法處理之殆所謂釋生之惑而忘其死者否耶今之說病理講藥方者雖古今東西規矩不同但其真諦之所存機訣之所在必得相同所謂異途而同歸者是也君之此著蓋亦約之整之遵古人之遺意者乎參較彼此觀對異同以其醫方藥術打破神異靈怪妖妄詭譎之迷正是暗中之一炬彼益是益足以照破東西醫家之迷途者也乃為之序昭和八年晚秋權藤成卿多麻識於南鄰旭丘之僑居
