body:
  text: 凡例本書分上下二卷上卷本系恩師湯本求真翁自己擔任執筆下卷托余講述但入春以來翁頓呈衰老之象懼其稿之難於完成也因命余從事於上卷余拜命以來深懼責任之重而且深雖日夜憑几綴稿但以淺學魯鈍之餘不免難於發揮古醫之真理殊以為憾耳本編大別為前後兩篇後篇內設原因症候療法備考諸項目間録實驗例案原因及症候不敢稍加私意本於現代西醫學之說內科以橋本節齊氏新著內科全書為本療法則參酌各書就余之經驗分經緯而說述之備考部則引用學術豐富之諸先輩之說以備考證備孝中不録古方而多采録後世之方因遵奉古方屏斥後世之方非學者應有之態度此不論東西醫學之研究家理由固相同也後世方雖亦録自先哲之經驗但其運用中自有其新經驗存乎其間也昭和八年十二月於牛込船河原町寓居著者志前篇證候與治法概編第一章頭痛眩暈耳鳴頭痛當患者訴頭痛之際應考其頭痛起於何病陽證之頭痛乎陰證之頭痛乎抑為虛證之頭痛乎實證之頭痛乎探求病源實為漢醫最要之事同一風邪之頭痛也在甲則鼻塞微惡寒有熱無汗脈浮緊乙則鼻涕交流惡寒強體溫不升脈沉而弱甲病陽證乙病陰證處方自異故甲宜與麻黃湯乙宜與麻黃附子細辛湯同一胃病之頭痛也而胃內所停滯之水毒雖同而丙則脈浮數口渴小便不利舌苔白而乾燥時欲飲水飲則屢屢吐出丁則脈浮數口不渴舌苔無屢屢吐水丙陽證也丁陰證也前者宜與五苓散後者宜與吳茱萸湯又同一子宮病之頭痛也戊則脈沉實大便有祕結之傾向顏面充血時時眩暈月經不順左腹下疼痛按其腹部覺全部有充實之感以指觸於左臂骨窩之部有過敏之索條物己則脈虛軟大便每日一次至二次眩暈耳鳴肩凝月經不順一月中有二次下腹疼痛腹部全部軟弱腰腳易冷戊所患者為陽實證己所患者為陰虛證前者以桃核承氣湯為主治藥後者以當歸芍藥散治之易起頭痛之疾患就現代醫學之見地多起於發熱腎臟炎動脈硬化症緑內障腦腫瘍黴毒外傷硬結頭痛副鼻腔疾患耳之慢性化膿便祕循環障礙子宮疾患等余今大別為四類一曰外邪之頭痛風邪流行性感冒腸窒扶斯等等頭痛屬之痛時多兼發熱二曰痰飲之頭痛水毒停滯於胃腸之內上衝而起之痛也三曰血證性之頭痛月經不順或血液循環受障礙而起者也四曰食毒性之頭痛便祕或消化不良食毒停滯於胃腸內頭中受刺戟而起之痛也四者之中更各分陰陽虛實矣外邪之頭痛用桂枝湯麻黃湯葛根湯小柴胡湯及其加減之方以治之者為多痰飲性之頭痛用苓桂朮甘湯茯苓飲人參湯大建中湯真武湯吳茱萸湯五苓散茯苓澤瀉湯等治之血證性之頭痛用當歸芍藥散桂枝茯苓丸桃核承氣湯等以治之食毒性之頭痛則應用瀉心湯承氣湯之類眩暈眩暈俗名也眩者眼前暗黑之意暈與運通故有眩運目運頭眩冒眩癲眩之稱凡眩暈輒兼頭冒頭冒者即頭覺沉重眼前不清楚是也凡西醫學之貧血胃腸病心臟病尤其在瓣膜狹窄腦腫瘍尤其在腦黴毒小腦疾患多發性硬化症癲癇希斯篤里神經衰弱中毒眼筋麻痹內耳疾患等往往起眩暈傷寒論金匱要略言及眩之處方有十一方其中有術者六方有茯苓者五方此亦鑑於事實可定眩暈與水毒有密切之關係者也西醫學則云眩暈與三半規管內液之動搖有直接之關係然吾人對於古賢治眩暈必先治水之深謀遠慮實大堪驚歎焉茲就傷寒論金匱要略中拾出治眩之處方十一計苓桂朮甘湯真武湯葵子茯苓散桂枝芍藥知母湯桂枝加龍骨牡蠣湯五苓散小半夏加茯苓湯澤瀉湯近效方術附湯茵陳蒿湯甘草乾薑湯治冒之處方四計苓桂五味甘草湯苓甘姜味辛夏湯澤瀉湯大承氣湯等其治乍起眩暈之方大抵使用瀉心湯古人云瀉火降逆其於水火相剋之理論述之甚詳茵陳湯證之眩雖近於瀉心湯證之眩而於水火相剋之理論說來至詳且備倘細細考究之實能發見甚有趣味之暗示焉惠美三白雲産後血運者水氣也得以附子瀉心湯治之原南陽云世人用人參黃連防己大黃桂枝茯苓朮甘草之套方以治眩暈遠不如白虎湯之有奇驗白虎湯證用白虎湯其有奇驗固勿論已即如舟車酒醉之眩暈用半夏瀉心湯與五苓散而有效古人早有卓識矣和回子真翁云所謂調血劑必從根治余曾屢屢用當歸芍藥散以治此種之患者而其中之澤瀉茯苓朮諸藥則視其原因之或為船醉或為水毒而有加減焉耳鳴耳鳴往往與眩暈為同時並起之症候眩暈愈時耳鳴亦止耳鳴告愈同時眩暈亦止此為餘日常臨床所得之實驗古人云耳久鳴則聾蓋耳鳴則激之為聾也所謂患神經衰弱症者之耳鳴多因於水毒用茯苓飲柴胡加龍骨牡蠣湯苓桂朮甘湯苓桂五味甘草湯酸棗仁湯當歸芍藥散等輒有效患動脈硬化症者之耳鳴多用瀉心湯梔子豉湯及以上各方之加味患中耳炎者之耳鳴多用小柴胡湯大柴胡湯柴胡桂枝湯等以治之備考本間棗軒對於眩暈之說古人學說稱眩暈為腦海虛即腦病也夫腦有自體發病者亦有因外界侵犯於腦而起病者中風癇證發狂恐怖等之眩暈腦之自體之病也産後及子宮出血吐血衄血腸出血尿血等症致血液虛竭虛里與腎間之動悸非常或因過飲過浴諸熱病等而發之眩暈從外界侵犯於腦而起者也中略卒然暈倒者可不論其虛實與以回生散參連湯三黃湯等當有效産後之血暈或血多則上衝面目紅赤脈絡怒脹之眩者用三黃湯加辰砂或用苓桂朮甘湯三黃湯瀉心湯合方為佳下劑不宜長服若前方已服數十日者用苓桂朮甘湯巫神湯如心散之類轉方為佳亡血後動悸高而眩甚者可用腎氣丸連珠飲八珍湯而兼用鎮悸丸脾胃虛弱面色萎黃動悸而眩暈者宜與歸脾湯兼用寧心膏即真武湯亦可用之癇證之眩暈者沉香天麻湯為上頭痛眩暈嘔吐者宜與半夏白朮天麻湯如服後嘔吐猶不止者宜用半夏瀉心湯或小半夏加茯苓湯原著者按不論何處若蔑視病之虛實雖經治療猶之未治回生散系香附子紫檀人參白檀鬱金甘草胡椒而成倘施於實證之眩暈即為不考藥效之誤又以三黃投於虛證亦大不妥參連湯者人參與黃連也産後之血暈多應用當歸芍藥散不長服下劑云云系從西醫之知識而出發者之說也西醫蔑視陰陽虛實往往濫用下劑因過下而困疲下已難下而又有不得不下之必要故曰轉方此種轉方山脅東洋之所謂醫之自轉醫者翻弄病之良手也巫神湯者五苓散加乾薑黃連木香者也連珠飲八珍湯木香甘草也沉香天麻鎮悸丸可參照心悸亢進條歸脾湯者當歸白朮茯苓黃耆龍眼肉酸棗仁遠志人參湯者沉香益智天麻防風半夏附子獨活羌活甘草當歸殭蠶生薑也半夏白朮天麻湯者半夏陳皮麥芽茯苓黃耆人參澤瀉蒼朮天麻神麯白朮黃柏乾薑生薑也亡血後動悸高而眩甚者炙甘草湯芎歸膠艾湯當歸芍藥散有效脾胃虛弱面色萎黃動悸眩暈者多用茯苓飲合苓桂朮甘湯頭痛眩暈嘔吐者為吳茱萸湯五苓散之證從證運方庶不誤也有持桂里之眩暈說眩者目之意暈者猶運也如身在車船之上不能自主也故俗人往往即用眩運二字此疾多從水飲而生亦有因氣疾而來者亦有因過食而來者婦人從血道而發男子自瘀血結毒陳久性黴毒而生原著者按眩多因水飲之說實大得我心傷寒纘論太陽病脈沉身熱頭痛者陽中夾陰者也黃耆建中湯治之若誤投發汗而不瘥者四逆湯溫之集驗良方白虎湯治中暑熱射病口渴喜飲身熱頭暈昏暈等證有效傷寒緒論太陽病者發汗發汗過度則陽虛而耳聾叉手自冒不可誤用小柴胡湯宜用建中湯治之第二章嘔吐吐血喀血吞酸嘈雜噦嘔吐金匱要略傷寒論中之區別嘔吐乾嘔嘔逆吐吐逆等項東垣之解釋云有聲無物曰嘔有物無聲曰吐口中喀喀有聲有吐者之象而始終不吐出者嘔也乾嘔也如乳兒患腳氣與患腦膜炎者其聲未出而乳汁食物已有甚多之吐出者吐也食急而有物奔出者大抵為吐有聲而同時有物者曰嘔吐嘔逆者嘔之激也吐逆者吐之激也上述嘔有乾嘔之逆而乾嘔嘔逆之中又各分陽證與陰證小柴胡湯梔子生薑豉湯柴胡桂枝湯白虎加桂枝湯豬苓湯治陽證之嘔者也烏梅丸吳茱萸湯大建中湯四逆湯真武湯治陰證之嘔者也今從傷寒論金匱要略中採録治嘔之方一十有六其中十四方配合以生薑乾薑治乾嘔之方一十有三其中十二方亦有生薑或乾薑之配合茲抄録如次嘔大建中湯半夏瀉心湯苓甘姜味辛夏湯烏梅丸四逆湯以上諸藥中有乾薑黃芩加半夏生薑湯葛根加半夏湯吳茱萸湯小柴胡湯大柴胡湯柴胡桂枝湯梔子生薑豉湯小半夏加茯苓湯真武湯以上諸藥中有生薑白虎加桂枝湯豬苓湯乾嘔小青龍湯六物黃芩湯四逆湯通脈四逆湯白通加豬膽汁湯半夏乾薑散甘草瀉心湯以上諸藥中有乾薑桂枝湯小柴胡湯橘皮湯以上諸藥中有生薑十棗湯嘔逆竹皮大丸有桂枝從上看來可知凡治嘔乾嘔嘔逆之病大抵用生薑乾薑桂枝此生薑桂枝均含有揮發油西醫用為健胃之劑認為作用甚廣臨床醫家最宜注意者凡治嘔與乾嘔往往多用上舉諸溫性刺戟藥之一方然有時亦有全然不用刺戟藥卻用緩和黏滑疏通之劑如豬苓湯等方劑此亦不可忘忽者也近來西醫界盛用半夏以為鎮吐之劑半夏決非鎮吐之劑余敢斷然言之此係西醫之誤吾人當矯正也治吐之劑余獨舉大黃半夏雖治吐有效其實不能治吐漢醫對於吐證雖亦有以半夏處方者然實非半夏之效彼不自知其力量之將軍不能視察敵人之病以致誤遭敗北而乃罪責兵卒其可得乎試觀傷寒論金匱要略其中言及治吐之處方共計有七其中皆無以半夏為配劑者也吐茯苓澤瀉湯五苓散桂枝芍藥知母湯茯苓飲以上各方有術大黃甘草湯調胃承氣湯以上兩方有大黃乾薑黃連黃芩人參湯上舉七方中四方有術二方有大黃於此可知治吐以大黃或尤為要藥矣但術之可治者大黃往往不能治之據金匱要略云痰飲之病宜用溫藥痰飲者胃內停水也停水於胃內則飲食之物不得疏通於是吐矣故宜用術等之溫藥以去其水此時消化器為弛緩症狀反之宿食燥屎鬱積於消化管內以防飲食物之下降於是吐矣此時宜用大黃等之冷藥使胃腸緊縮以去其宿食此際消化器現緊縮之狀態以上云云皆其區別也即言吐之症狀凡胃內停水者宜配用術之方劑宿食燥屎者宜用有大黃之方劑二者誤用則增病勢之惡逆診斷者不可不慎也古方中雖有將術與大黃合組為一方劑者然與後世醫人之加味者不可同日而語況嘔吐與吐又無區別習得半夏有治吐效力之皮毛學識者即批判漢藥區別門戶蔑視前人之勞苦殊失公平之見地也茲檢傷寒論金匱要略中言及嘔吐之方配以半夏者亦計有六開列如下嘔吐附子粳米湯小半夏湯小半夏加茯苓湯大半夏湯半夏乾薑人參丸黃連湯吐血喀血吐血者消化管尤其是胃或食道出血從口腔吐出之謂也喀血者從呼吸器尤其是肺出血之謂也傷寒論金匱要略中只有吐血之語而無喀血之文字意者其時之吐血無今日喀血之意金匱要略驚悸吐衄下血胸滿瘀血病脈證治項中有云病人面無色無寒熱脈沉弦者衄也脈浮弱以手按之即絶者下血也煩咳者必為吐血此所云之吐血實即今日之所謂喀血也吐血與喀血不可同一處理但在處方上若不確定其陰陽虛實而誤用之亦往往不效故在處方之前先宜看定其是吐血乎抑是喀血乎然後辨明其為陰證歟陽證歟抑虛證歟實證歟試舉一例以明之瀉心湯柏葉湯均治吐血之劑也然瀉心湯證之出血為組織上起炎症之充血柏葉湯之出血為組織弛緩所起之鬱血蓋瀉心湯為陽證之治劑柏葉湯為陰證之治劑苟柏葉湯之症誤與瀉心湯則出血增加病者立即可斃吐血喀血既認明矣陰陽之分亦不可不慎前舉諸方之外如人參湯甘草乾薑湯黃土湯治陰證之吐血者也白虎湯梔子豉湯及其加減方茵陳蒿湯桃核承氣湯桂枝茯苓丸等治陽證之吐血者也請在第三章下血條更事研究茲採録金匱要略中關於吐血之說於下一吐血咳逆上氣之候也其脈數而有熱者死栗園譯者按即日本名漢醫淺田栗翁曰脈緩而身涼者血或可止原著者按患肺結核者多表見此種症狀上氣者兩頰潮紅氣上逆之謂也二貧血之亡血者無汗意出汗者更失體液故至惡寒戰栗原著者按病者對於醫家施行手術之創口或誤傷之處訴疼痛時西醫往往在阿斯匹靈中混加莫兒希納加羅莫金之類企圖達其鎮痛之目的稱為補血液又以林搿兒液注射之稱為消耗之發汗劑此殆即西醫之治療方針乎吞酸嘈雜胸中吐出苦酸之水曰吞酸嘈雜治吞酸嘈雜之方屢屢應用者為生薑瀉心湯旋覆花代赭石湯柴胡加龍骨牡蠣湯桂枝甘草龍骨牡蠣湯小陷胸湯等如以上方劑不能見效病勢反覺惡化時則用大建中湯或吳茱萸湯此係余之經驗頗著速效此中陰陽相異之認辨甚為切要也噦噦俗名也有陰陽虛實可以大小承氣湯治之亦可與以小柴胡湯橘皮湯橘皮竹茹湯之類亦可選用食毒氣逆水毒以及水毒帶熱帶寒之時機可用小半夏湯吳茱萸湯四逆湯等備考蘭軒醫談噦有數因陽明證渴而不能食食下後漸漸口渴引飲此必發噦選用茯苓飲橘皮竹茹湯可愈竹茹湯之人參代以麥門冬竹茹代以竹瀝甚妙因留飲而噦者其小便必不利又投承氣湯後亦有稍稍下降而仍噦者此因熱氣挾痰水毒而上逆也非竹瀝不效有持桂里之說方書有種種名目而以噦字為最正確此症自古即認為胃中之寒亦有因熱而來者蛔蟲同蛔蟲積聚痰飲等皆患此病發時挾以他病者凶候也尤以痢疾後及諸病之所發者為最凶橘皮竹茹湯此為古今治噦逆之通用方劑橘皮湯手足厥而氣逆者均用之詳說於嘔吐門可參照半夏噦心湯噦逆而心下有痞鞕者用此方以開通之痢疾傷寒之患此者尤為吃緊之要方吳茱萸湯吳茱萸為止噦之效藥陰證用之陽證則不適用本草綱目中有吳茱萸橘皮附子三味之方用於陰證甚相宜柿蒂湯大冢云此方在柿蒂丁香之中加生薑煎而熱服之古時無此方劑對證應用能奏偉效其主治為胸滿與咳逆不止等用橘皮竹茹湯之類尚不止者可用此方以止之蓋柿蒂為治噦之專藥煙法印云此物若與石蜜合煮愈妙又在平胃散中加柿蒂丁子亦有偉效甘草乾薑湯與以苦味劑而猶不止者用此方間能奏效炙甘草湯噦而脈結者可用此方但須在危篤症中用之附子粳米湯胃中寒甚噦逆更加嘔吐輕劑無效時用之四逆湯陰寒脫症之噦用此方甚佳在霍亂症嘔吐下痢手足微冷脈細而噦者用此方能救其十一豬膽汁湯噦時厄厄不已呼吸有暫絶之狀用此可以急救無豬膽時熊膽亦可用之大冢云此可用通脈四逆湯加豬膽汁湯白通加豬膽汁湯之類備考本間棗軒之說吐血嘔血古時統稱嘔血有從肺出與胃出二證中略而治法並不區別大抵吐血多者用三黃湯犀角地黃湯或二方合用亦有用四物湯者吐血少者或連綿不止胸脅苦滿者用柴胡四物湯或黃土湯如用以上手段猶不止者可與斷紅飲間服阿芙蓉液服後血色變黑者為止之前兆亡血過多而脈沉微虛里煽動氣短出汗者生命已在瞬息之間可與獨參湯兼用回生散亦佳吐血之後變黃胖者可用連珠飲兼鎮悸丸虛勞者以人參養榮湯為佳無病而微喀血久而不止者涼膈散為宜飲酒後吐血者亦可用涼膈散出血過多亡血甚者可與理中湯四物湯原著者按吐血亦有陰陽虛實宜從證以處方三黃湯者瀉心湯之別名也四物湯者當歸川芎芍藥地黃也柴胡四物湯者小柴胡湯與四物湯之合方也命期促迫者宜與獨參湯而不投四逆加人參湯獨參湯者人參一味也斷紅飲犀角地黃湯人參養榮湯涼膈散等可參照肺結核條備考之部黃胖者在十二指腸蟲病心臟病腎臟病等其病勢進行則其人貧血甚皮膚淡黃稍有水氣動悸甚強者也連珠飲者苓桂朮甘湯合四物湯加木瓜薏仁朮萆薢也傷寒緒論太陽則脈浮數灸之必驚狂起臥不安咽噪吐血此時投桂枝去芍藥加蜀漆牡蠣龍骨救逆湯為佳集驗良方黃耆建中湯治吐血衄血虛羸不足飲食乏味腳步軟弱言語倦怠失精遺精內熱等諸虛損之證有效續易簡方理中湯治身寒氣虛咯血吐血之劑千金方酒徒之咳者必吐血此因久經長年月日過度之飲故也其脈虛者血必冒若飲後胸滿者厚朴大黃湯治之櫻寧生傳桃仁承氣湯治積鬱火甚迫血上行衄血數升面赤脈躁疾精神恍惚如癡者有效心法附余吐血者胸中覺氣塞上吐紫血者桃仁承氣湯下之千金方凡服藥後嘔逆不入腹者先以甘草一兩水煎服之可效朱氏衆驗二神湯即甘草乾薑湯治吐血極妙證治準繩梔子蘗皮湯治小兒衄血極有效原著者按此方不只限於小兒衄血即吐血亦極有效小兒衄血可用麻黃湯桃核承氣湯瀉心湯之類三因方大半夏湯為治心氣鬱而不行生涎飲心下痞鞕聚結不散腸中轆轆有聲食入即吐之劑仁齊直接半夏丸生薑半夏湯所制之丸治吐血下血崩中帶下喘急痰嘔中滿虛腫諸病有效按崩中帶下即今西醫之所謂子宮病也療治茶談嘔吐證之動悸甚者必致煎湯不入往往無相應之藥其時在下焦穴針灸之以引下其動氣藥則將丸藥為散藥漸漸靜其動氣然後再與煎藥若無此心得妄用湯藥反足增病蘭軒醫談衄血之實證應用三黃湯瀉心湯此其現象為出血不止及其血自止血虛者用廣東人參肉桂之類血實者脈實數血虛者脈沉微若微數者必死證治摘要一男子下痢不止發噦吐蛔蟲與以吳茱萸湯見效第三章便祕下痢下血子宮出血便祕便祕有種種為說明上便宜計區別為一緊縮性便祕二弛緩性便祕三狹窄性便祕一緊縮性便祕所謂實證之病也其見症為脈沉實或沉遲而多力按其腹部有充實之盛血壓高大便堅硬大黃芒硝之配劑可奏效二弛緩性便祕為腸管麻痹弛緩無排出大便之力因而起便祕脈浮弱或沉遲而多微弱腹部軟弱大便多含水分排泄少而不通快此多起於水毒停滯於消化管內而起胃腸之下垂此症決不可用下劑若投以大黃則弛緩益甚且起腹痛裡急後重之患宜與大建中湯理中湯當歸芍藥散等以除水毒刺戟腸管之緊縮大建中湯等溫藥也溫可以去弛緩及去失其麻痹則大便不求暢而自暢矣三狹窄性便祕為腸管自身起窄與鄰接之臟器生腫瘤或腫大壓迫腸管而起狹窄結果起便祕之病也此病可用大黃牡丹皮湯桂枝茯苓丸桃核承氣湯下瘀血丸大黃䗪蟲丸等以去腫瘤炎症瘀血塊等而圖腸管之疏通此外尚有老人或熱性病之回覆期或慢性病等體液枯燥致大便難通者投與麥門冬等溫潤之劑往往得效有時亦可用麻子仁丸亦可用蜜在藥味中煎導之上述便祕之證在漢醫學非經嚴重之區別徹底之明瞭決不濫用下劑蜜煎導之方法與今日裡斯林浣腸之理論方法相似其適應之症不止限於便祕但今日為濫用浣腸之時代宜注意大承氣湯掃滌胃腸內容物者也患腸實證者用以浣腸也溫藥者對於弛緩性之便祕用浣腸也然我道之用蜜煎導者須在發汗過度或小便多出體液枯竭致大便不下而不能用下劑以攻之者始用之而患盲腸炎者與以阿芙蓉後致起便祕時始用浣腸之法下痢投發汗劑之葛根湯而愈下痢投利尿劑之豬苓湯而愈下痢甚至投下劑而止下痢凡此諸法決非偶然之奇蹟漫然投藥而得僥幸須握有確確鑑鑑之實證者也今日西醫界凡遇裡急後重而兼下痢者即以投下劑為其定則裡急後重誠然多現於陽實之證然有時陰虛之證亦有裡急後重者此則不可忘忽者也在證之不適用下劑時可用真武湯之附子劑大腸加答兒或赤痢之裡急後重者或有表證者投葛根湯以發汗能見速效余對於慢性大腸加答兒之歷久未愈者投以豬苓湯以圖利尿果見速治豬苓湯之阿膠與白頭翁加甘草阿膠湯之阿膠對於裡急後重大有緩解之力凡有濕熱即炎症充血肛門感灼熱者多用白頭翁湯凡裡急後重而不感緊迫壓出之力不足大便有殘留之氣味而不能通快者真武湯治之故在診斷之際有無裡急後重宜丁寧訊問裡急後重而有緊迫之感者陽證也脈舌均現陽性之症狀脈弛緩而弱者陰證也在按脈之際即能區別之此陰陽之相異為治療方針之根干不可輕輕看過茲採録傷寒論金匱要略中言及下痢之處方陰陽之大別於次陽證之治劑黃芩湯黃芩加半夏生薑湯六物黃芩湯甘草瀉心湯生薑瀉心湯大柴胡湯葛根黃連黃芩湯以上皆有黃芩井白頭翁湯白頭翁加甘草阿膠湯葛根湯四逆湯大承氣湯豬苓湯陰證之治劑真武湯四逆湯通脈四逆湯白通湯白通加豬膽汁湯四逆加人參湯人參湯桂枝人參湯桃花湯吳茱萸湯通觀以上各方凡陰證之治劑大半配合苦味之劑如黃芩黃連黃蘗等陰證之治劑多用辛味之藥物為配合附子乾薑吳茱萸術等兩兩比較之覺其問題殊有興味附言金匱要略有利氣之文字今日神經性之下痢者往往頻頻有催便之意如廁後大便不能通快者此其治法用訶梨勒散訶梨勒即訶子也有利氣之意凡大便不通投硝黃芒硝大黃之劑後便意頻數而不能通者用之即不可誤於藥室方函口訣用寬暢湯治之下血子宮出血從大便而出之血曰下血近於肛門之出血曰近血在肛門深部之出血曰遠血漏下者有子宮之出血故云子宮出血治下血及漏下之處方大體如次黃土湯桃核承氣湯桂枝茯苓丸芎歸膠艾湯赤豆當歸散旋覆花湯下血漏下由於組織弛緩而起鬱血或由於血管或周圍血行障礙而起鬱血鬱血之極乃呈是症上舉六方可以治之在鼻黏膜附近之組織緊張局部充血之甚遂致血管破裂而出血者曰衄血麻黃湯可以止之炎症充血之喀血瀉心湯可以止之身體上半部之出血多系炎症充血之所致身體下半部之出血多屬鬱血之所致此為今日生理學病理學上之說明與證明亦為臨床上極有興味之事實妊娠中因胎兒之壓迫障礙血行易起鬱血即非妊娠之婦女與普通之男子亦有起鬱血者多用當歸川芎桃仁牡丹皮之類以治之其各處方可參照藥方解釋編備考本間棗軒便祕之說患眼病者連服大黃芒硝等之下劑不按通常之分量致脾胃衰弱再與強下之劑往往促其生命假令幾日不通而不能投下劑時可與參連白虎湯用滑細棒卷以綿其大如煙管長三寸許塗中黃膏插入肛門留綿而抽去其細棒如此數十日大便自然可通而如平常矣原著者按便祕不必用大黃芒硝主治誤而長服之脾胃當然虛弱矣但確為大黃芒硝之證間續服之而不得復其健康者此又非下劑之罪矣其故在於用之人之力量不足便祕亦有陰陽虛實不辨別之服藥亦無效也傷寒論中有燥屎五六枚與燥屎在胃中之文以西醫內景之理推之胃決非燥屎之處又依仲景內臟之說觀之所謂胃中雲云亦決非西醫所指之胃此殆與熱入血室冷結膀胱之類相同茲從各方實驗證之大便之腸指橫行結腸而言可與以大柴胡湯等又查蜜煎導條中有用豬膽汁以為導劑對於宿食惡物甚有效云云夫導劑不限於豬膽汁惟聞諸西醫云膽汁可以消化飲食則膽汁或能解宿食惡物而制燥屎者歟原著者按膽汁有促進腸中蠕動之性質故便祕用豬膽汁為極合理的數千年前所行之合理方法至今日而漸漸明瞭其原理此即漢法醫學十分偉大之明證引用稻田博士言仲景之書從實驗而出與今日西洋學說若合符節中略治法從病因而有異同麻子仁丸調胃承氣湯蘆薈丸等可審用之亦可兼施蜜煎導灌腸法等有持桂里便祕之說凡有症疝之人大便常易祕原著者按子宮及其附屬器有炎症腫瘤者常有所謂習慣性便祕臨床醫家時常遇之又産後發汗後一切久病之末津液乾者多結燥高年血弱別無病患者亦結燥先哲云燥結有實者有虛者誠難言也原著者按燥結有虛實不能誤投峻下之劑據桂里翁對於便祕之治法推獎小承氣湯大承氣湯調胃承氣湯倒換散大黃荊芥二味各等分研末服之潤腸湯麻子仁丸加減方通仙丸麻仁丸蜜煎導之外並推獎尉法尉法炒鹽入絹袋在病人腹上尉之之法也服下藥以內催通氣而屎不出時行尉法可效又用溫石以為通徹溫氣之法對於大小便祕均有效醫宗金鑑經行後或出血過多者貧血而榮養衰弱者黃耆建中湯治之聖濟總録烏梅於産後冷熱痢久病下痢不止者有效證治摘要甘草瀉心湯之治下痢以腹中雷鳴者為目的若腹不雷鳴為谷不和之下痢四逆湯主治之第四章小便自利遺尿小便不利淋瀝血尿小便自利小便自利者尿自利而快其量多之謂也桂子附子去桂加朮湯小建中湯苓薑朮甘湯小青龍湯抵當湯等治小便自利之症也八味丸當歸芍藥散真武湯四逆湯甘草乾薑湯等亦治小便自利之證也小便自利亦分陰證陽證陰證依甘草乾薑湯條上虛而不能制下故宜用乾薑附子等熱藥以刺戟之抵當湯治瘀血之蓄積而現小便自利者此外如白虎湯治陽證之小便自利者也故對於小便自利之症宜詳細審察其為苓薑朮甘湯證之小便自利乎抑為白虎湯證之小便自利乎所謂白虎湯證之症狀即熱厥之症狀所謂苓薑朮甘湯之證狀即腰冷如坐水中雖其症狀紛紛然一見便明遺尿有白虎湯證之遺尿有甘草乾薑湯證之遺尿前者為陽之極點後者純粹陰證同一遺尿也機轉正相反白虎湯條中有口不仁之文口不仁者口中不覺有香味也以今日新名詞言之不仁即知覺麻鈍之謂吾今易口字為膀胱曰陽證之遺尿者膀胱之知覺麻鈍也雖上下相異而自命確有至理甘草乾薑湯證之遺尿則起於緊縮力之不足故小便出而不多遺尿亦為小便自利之變相運用小便自利諸方劑可以成功小便不利淋瀝小便不利非小便滑利也淋瀝出淋也今從傷寒論金匱要略中採録治小便不利之方二十二桂枝加黃耆湯甘草附子湯蒲灰散滑石白魚散茯苓戎鹽湯葵子茯苓散四逆散五苓散豬苓湯八味丸栝蔞瞿麥丸小青龍湯越婢加朮湯小柴胡湯柴胡桂枝甘薑湯柴胡加龍骨牡蠣湯大承氣湯真武湯大黃消石湯茵陳蒿湯桃花湯桂枝去桂加茯苓朮湯通觀上舉諸方其最顯明者為多用滑石蒲灰栝蔞根龍骨牡蠣等使黏膜面滑利之藥物以圖尿量之增加其次用大承氣湯大黃消石湯茵陳蒿湯下瀉之藥劑以治小便不利此亦堪注目者也又此二十二方劑中有桂枝者計七方此因其氣上衝而起小便不利也小便不利之治藥中力最大而配用最多者為茯苓計二十二方中共有九方配茯苓焉淋瀝亦有實證虛證之分余於實證使用桃核承氣湯或大黃牡丹皮湯屢收良好之效果虛證用蒲灰散滑石白魚散等在虛實之間者豬苓湯最多血尿尿中有血此從膀胱或腎臟而出者最多從膀胱出血者多用豬苓湯從腎臟出血者多用芎歸膠艾湯黃土湯以治愈之備考內科摘要茯苓甘草湯治膀胱發咳咳而遺溺遺尿者也原著者按老年婦人在冬期罹氣管枝炎在咳嗽之際稍稍努責往往遺尿此即膀胱腑因發咳而遺尿之解也醫學綱目腎著湯治胞痹小便不通原著者按腎著湯者苓薑朮甘湯也胞痹者膀胱之麻痹也本方為治胞痹小便自利之劑胞痹達於極度則小便不通亦可治之傳信尤易方桃仁承氣湯治淋血有效類聚方廣義苓薑朮甘湯治老人平日小便失禁腰腿沉重而冷痛者又在十四五歲時無遺尿之病者難治惟用此方加反鼻能奏效因證可加附子老人腰冷小便頻數或遺尿下腹動悸者天雄散治之橘窗畫影桂枝加龍骨牡蠣湯本治失精一老醫用之以治老宮女之小便頻數和田東郭用之以治高槻老臣之小便閉而奏效余用之以治遺尿屢見奇效第五章口渴咽乾口燥口渴口渴與咽乾口燥似同而異前者欲飲湯水後者雖覺乾燥但不欲飲水向口內望之有濕者也西醫不重視其區別大抵以叟罹特兒水與之然我道則甚重視其陰陽之區別口渴大抵為陽證之微候其治療目標在乎消炎鎮靜配藥以寒藥或冷藥為多傷寒論金匱要略中有治口渴之處方十八悉為陽證之治劑黃耆芍藥桂枝苦酒湯身體腫發熱出汗之渴五苓散脈浮數煩渴者出汗而渴者渴而欲飲水者入水則吐者水下後心下痞者與以瀉心湯而痞不解者渴而口中燥煩者小便不利者豬苓湯脈浮發熱渴欲飲水小便不利者下利六七日咳而嘔渴心煩不得眠者栝蔞瞿麥丸小便不利有水氣其人若渴者小青龍湯心下有水氣乾嘔發熱而渴或渴或利小柴胡湯或胸中煩而不嘔或渴或腹中痛柴胡去半夏加栝蔞湯瘧病發渴者柴胡桂枝幹薑湯胸脅滿微結小便不利渴而不嘔白虎加人參湯大汗之後大煩渴而不解脈洪大者表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者生薑甘草湯咳唾涎沫不止咽燥而渴小半夏加茯苓湯先渴後嘔水停心下此屬飲酒家之病栝蔞牡蠣散百合病渴而不倒水者茯苓澤瀉湯反胃吐而渴欲飲水者茵陳蒿湯小便不利渴欲飲水者文蛤湯吐後渴欲得水貪飲者豬苓散思水者大陷胸湯發重汗大便五六日不下舌上燥而渴者白頭翁湯下利欲飲水者此係有熱者以上石膏文蛤黃連豬苓澤瀉栝蔞根半夏牡蠣山梔子黃蘗芒硝等寒藥冷藥占其大半此因口渴而屬陰證者甚稀之故四逆湯利則陰證之治劑也以附子乾薑等熱藥構成此方若非下痢而失體液陷於陰證者戒用之其類似陰證而在發汗嘔吐下痢之後發渴及內熱而好水者仍為陽證此應明確區別者也咽乾口燥咽乾口燥必非陽證之標識左揭諸方系治咽乾口燥者小建中湯咽乾口燥苓桂五味甘草湯多唾口燥甘草乾薑湯咽中干大承氣湯少陰病有二三日之口燥咽乾急者可以此下之少陰病自利清水色純青心下必痛口乾燥急者以此下之桔梗湯咽乾不渴時出腥臭之濁唾者己椒藶黃丸腹滿口舌乾燥者苦參湯下部潰瘍則咽乾者咽乾不唾此為可驚之一種急迫症狀宜用小建中湯甘草乾薑湯之類以甘草為君藥使其飴而緩其急迫解其咽乾大建中湯治屢屢咽乾口燥之症狀芩桂五味甘草湯治口燥時唾液多而稀薄之症口為入口尿道為出口故凡尿意頻數有淋瀝之氣味者亦能擴為多唾口燥之症用此方能奏偉效大承氣湯亦治口燥咽乾但其乾燥不僅咽口而已腸管內亦乾燥結糞者用之余嘗診一男子誤口渴為咽乾口燥與以白虎湯三周而不效易以大承氣湯三日即治又大承氣湯證之口燥咽乾與苦參湯證之因下部潰瘍而咽乾者適成有趣之相反證此則臨床家所宜隨時注意者也桔梗湯證為咽乾甘草湯證為咽痛而感輕微之乾燥己椒藶黃丸證之為口舌乾燥則余未遭遇焉由上所舉余可約述其語曰口渴多陽證咽乾口燥有陽實證亦有陰虛證凡急迫症狀之有一種徵候即屢現咽乾口燥之狀臨床家應毋忽忘第六章咳嗽喘咳嗽咳嗽俗語也在傷寒論金匱要略中有咳咳唾咳逆等文字丹臺玉案中有有聲無痰曰咳痰隨聲出曰嗽聲中有痰曰咳嗽之分其實咳不能全然無聲亦不能全然無痰此比較的無甚意味故不具論茲從傷寒論金匱要略中舉其治咳之方一十八種於下苓甘五味姜辛湯沖氣即低反之咳更甚者豬苓湯少陰病下利六七日咳而嘔渴者小青龍湯乾嘔發熱而咳咳而微喘者越婢加半夏湯咳則氣上此肺脹也其人喘小柴胡湯或者咳桔梗湯咳而胸滿真武湯此有水氣者其人或咳或小便利或下利或嘔者十棗湯久咳家其脈弦有水氣者或繫好飲家咳煩而胸中痛者桔梗白散咳而胸滿葦莖湯咳而有微熱胸中煩滿四逆散其人或咳或悸或小便不利射干麻黃湯咳而氣上葶藶大棗瀉肺湯咳逆氣上喘鳴迫塞皂莢丸咳逆上氣時時唾渴生薑甘草湯咳唾涎沫不止栝蔞薤白白酒湯喘息咳唾小青龍加石膏湯肺脹咳而上氣煩躁而喘厚朴麻黃湯咳而脈浮者統觀以上各方咳多起於上氣上氣者即氣之上衝也今從苓甘五味姜辛湯觀之氣不上衝則咳反之則斷此為特有之現象而配以特有之藥方者也越婢加半夏湯射干麻黃湯葶藶大棗瀉肺湯皂莢丸小青龍加石膏湯等皆治咳而上氣或咳逆上氣者也越婢加半夏湯小青龍加石膏湯者中有石膏與半夏也射干麻黃湯者中有大棗與半夏也葶藶大棗瀉肺湯者葶藶與大棗也皂莢丸者皂莢與大棗也考此等藥物之效能而瞭解咳之性質者即可無誤厚朴麻黃湯無上氣之語只言浮脈故上氣者不宜方中有石膏與半夏即類似小青龍加石膏湯此應明曉桔梗湯桔梗白散葦莖湯治咳時容易喀出如膿之停痰者但在咳時有力鎮其上氣者為宜如用於咳而上氣時反增病豬苓湯治下痢與咳與嘔者也真武湯亦治下痢與咳與嘔者也兩者一見類似其實正完全相反前者構成之藥物悉為冷藥或平藥後者為附子之熱藥與生薑術等之溫藥所構成豬苓湯以治炎症或興奮性緊縮性之症狀真武湯以治弛緩性沉里性非炎症性之症狀二者表裡不同也喘衛生寶鑑云喘者上氣急促而不能息之謂也傷寒論金匱要略中有喘喘息喘滿等之語其治方如下麻黃湯無汗而喘者喘而胸滿者麻黃杏仁甘草石膏湯出汗喘大熱者小青龍湯或小便不利小腹滿或喘者越婢加半夏湯咳而上氣此肺脹也其人喘目如脫狀葛根黃連黃芩湯喘而出汗者大承氣湯短氣腹滿之喘桂枝加厚朴杏子湯太陽病微喘者栝蔞薤白白酒湯喘息咳唾木防己湯膈間阻飲其人喘滿葶藶大棗瀉肺湯喘鳴迫塞竹葉湯喘而頭痛統覽以上治喘之方不必限於麻黃或杏仁如麻黃湯麻黃杏仁甘草石膏湯小青龍湯越婢加半夏湯桂枝加厚朴杏仁湯葛根黃連黃芩湯竹葉湯等以治屬表之喘如大承氣湯栝蔞薤白白酒湯木防己湯葶藶大棗瀉肺湯等以治屬裡之喘屬裡之喘應除去其腹內或胸內之食毒或水毒減其腹壓或胸壓而至於消失里證之喘與表證之喘之緩急常異大抵多有持續性而常少消長備考傷寒緒論大抵外感之咳嗽當發汗以解之然亦有不發汗者經曰喘而小便利者及小便頻數者不發汗發汗則厥逆又咳時出汗倦伏苦滿者均可以小建中湯與之蘭軒醫談咳逆上氣致面部浮腫者世間醫者往往投以利水劑然無效也若與小青龍加石膏之類則氣腫因氣降而退水腫因溫散而自通利以愈矣雜病紀聞心下因滯水氣而起咳用小青龍湯半夏瀉心湯半夏厚朴湯小半夏加茯苓湯二陳湯等治之因外邪鬱結致陽氣難於表達而從心下推上後由於推上之水氣而起咳又因外邪難於表達而鬱於胸中致氣道之津液黏濃而起咳此種治咳之藥宜先用治邪之藥邪去則里陽從三焦而達於表水氣與疼自除而咳自止矣第七章胃內停水留飲心下痞胃內停水胃內停滯水毒之謂也此有名為心下痰飲者亦有名為心下水氣者更有名為心下留飲者意味皆同也其治療方針據金匱要略云病痰飲者當以溫藥和之是溫散之藥即為此病之藥無疑溫藥何藥朮生薑細辛之類是也苓桂朮甘湯心下有痰飲胸脅阻滿目眩澤瀉湯心下阻飲其人苦目眩茯苓散心胸中有停痰宿水枳朮湯心下有如盤之堅物飲水則作以上四方有術小青龍湯心下有水氣乾嘔發熱而咳桂枝去芍藥加麻黃附子細辛湯氣分心下有如盤之堅物飲水則作以上二方有細辛生薑瀉心湯脅下有水氣以上一方有生薑治胃內停水其方劑不止以上七方為說明上便宜計將上列方劑分為三組即有術者有細辛者有生薑者有術之方劑使用於痰飲留飲停痰宿水水飲等證有細辛之方劑用於水氣或云氣分今從脈證方面觀之有術之方劑中言脈證者大半為脈沉而用越婢加朮湯附子湯芩甘術桂湯脈浮者有五苓散一方有細辛之方劑中脈沉者用麻黃附子細辛湯脈細而欲絶者用當歸四逆湯脈浮者用厚朴麻黃湯脈緊弦者用大黃附子湯而不言及小青龍湯之脈證者以表不解者當然脈浮也本草中言術逐痰水細辛行水氣之語可以深思矣易詞以言之細辛多治表水為主術多治里水為主余曾對於脈浮數之患者以苓桂朮甘湯服後非特胃內停水不去反招上半身之浮腫人參湯亦起浮腫於此可知術雖為利尿劑而力不大也生薑治水與治水氣者也其收水富於動搖性術與細辛比較的非動搖性在配劑中與術辛均為必要之方生薑與半夏同用可以止嘔吐乾薑與附子同用可止完穀下痢此即富動搖性而能收水之故心下痞痞者噎之意俗稱胸噎無食欲傷寒論金匱要略中言及治痞之方有七五苓散未嚼碎之全粒咽下後成心下痞與以瀉心湯而痞不解者其人渴而口燥煩小便不利者小半夏加茯苓湯卒然嘔吐心下痞膈間有水大黃黃連瀉心湯心下痞按之濡瀉心湯婦人吐涎沫服藥後心下即痞者附子瀉心湯心下痞後惡寒出汗者半夏瀉心湯嘔而腸鳴心下痞者甘草瀉心湯醫見心下痞之病未盡再與以藥其痞益甚者以上七方中前二方有茯苓後五方有黃連可知茯苓可治心下痞黃連亦可以治心下痞又從五苓散條下觀之凡全粒咽下成痞瀉心湯不能解者五苓散可解之查近世有以黃連茯苓合組成方者遍覽傷寒金匱方中一方無以茯苓與黃連為伍者要知二者之間藥能不同茯苓之味淡黃連之味苦此為其最大之相反點藥物編云古人謂苦者能瀉能燥能堅淡者能利竅能滲泄此定則吾人固可以無條件承認者也瀉心湯一類必配以如黃連之多量苦味劑利水之流去血之滯開精神之鬱積者必多配以茯苓之劑其間效用之途正不可以道里計也心下痞之外又有治心中痞者三方桂枝生薑枳實湯心中痞諸逆心懸痛枳實薤白桂枝湯心中痞留氣結在於胸胸滿從脅下逆搶至心人參湯同上從上方觀之可知心中痞者氣上逆鬱塞於胸而成為痞也與心下痞之狀異枳實薤白桂枝湯證與人參湯證就文字觀之為用相同但從人參與枳實術與薤白乾薑與桂枝之藥效比較考之則就想像上可知凡屬緩而病情深者宜用人參湯也心下痞者以手按之軟而不覺其硬者也又有所謂心下痞鞕者按之其硬如鞭然其處方亦有六桂枝人參湯痢下不止心下痞鞕甘草瀉心湯心下痞鞕而滿大柴胡湯心下痞鞕嘔吐下利旋覆花代赭石湯心下痞鞕木防己湯心下痞堅小柴胡湯脅下痞鞕此外尚有瓜蒂散者治胸中痞鞕而病勢沉重從胸下至胸中者通覽上列六方除大柴胡湯外其他五方均有人參但大柴胡湯中之枳實亦如其他方劑中人參之役務東洞翁云人參治心下痞鞕但逆之心下痞鞕未云以人參主治也統觀以上心下痞心中痞心下痞鞕言及處治之方劑屢用人參枳實黃連黃芩茯苓半夏之類云備考蘭軒醫談治痰飲者始用溫散其次疏通其次燥痰先燥者則不適溫散用敗毒散小青龍疏通用柴梗半夏湯或加大黃少許燥痰用苓桂朮甘湯之類金匱云病痰飲者當溫藥以和之信確言也但痰飲如有蛔蟲之見證者宜先用滋潤溫劑以擾亂之然後用下劑以除之以去其沉痼之疾是為至要譬諸去煙管之煙膏者必先用捻紙之類稍稍通之而後用火與熱湯通之其理正同也第八章心悸亢進動悸心悸亢進心悸亢進即動悸也悸者心動之謂或動氣之總稱故如單言悸即不限於心尖之動悸而有心悸臍下悸等之名稱鳩尾之動悸心下悸也臍下之動悸臍下悸也傷寒論金匱要略中關於悸之處方十有一舉之如下桂枝甘草湯發汗過多其人叉手則心自冒心下悸按之可得者茯苓甘草湯厥而心下悸者半夏麻黃湯心下悸者小柴胡湯心下悸小便不利真武湯心下悸頭眩炙甘草湯脈結代心動悸小建中湯心中悸而煩苓桂甘棗湯臍下悸五苓散臍下悸小半夏加茯苓湯眩悸以上諸方中計有桂枝者六有茯苓者五桂枝茯苓均無者為四逆散小柴胡湯半夏麻黃丸三方而除五苓散外凡有桂枝之方必伴以甘草由此可知悸之大半之方意胚胎於桂枝甘草湯不過茯苓亦得治悸而已桂枝甘草證之悸究竟如何乎余敢為之說明曰桂枝甘草湯之悸者氣急迫的沖逆之時因衛氣弱而無抑制之力現悸之症狀者也發汗過多雲云即指示同時衛力損喪之意故兩手交叉則心臟及胃部不能鎮其悸也由此類推可以推知炙甘草湯小建中湯之悸之模樣矣苓桂甘棗湯茯苓甘草湯中亦有桂枝甘草同時配伍以茯苓此其為悸必兼有桂枝甘草湯與茯苓二者之見證也茯苓證之悸為體液即血液與淋巴液之循環障礙而起譬之水流在激湍之時遇岩石衝突則生波浪振動其周圍然不若桂枝甘草湯證之起於氣之沖逆也此將於結論中詳述之此處徒增繁雜恕不具論用茯苓之意甚多治痞條中有淡者能利竅能滲泄此說亦可適用半夏麻黃丸證之心悸適反於桂枝甘草湯證之表虛而為表實半夏之作用與桂枝異治一種之沖逆症狀此在有半夏之各方劑中可以觀察而得之余對於半夏麻黃丸究以治何等之心悸為宜久久有疑問積而不解後診察越婢加半夏湯證之患者後始能想像而得半夏麻黃丸證之心悸焉最後應注意者配用柴胡甘草之四逆散證及小柴胡湯證之悸均為小便不利故用柴胡等疏通之劑此其為悸與茯苓證類似宜參照其他症狀而識別之備考本間棗軒之說治法第一宜鎮悸第二為清血第三用滋養法鎮悸用針砂湯兼用鎮悸丸清血用黃連解毒湯合四物湯或用甲字湯合四物湯滋養用炙甘草湯或八珍湯但此症若為先天遺毒者不治原著者按不治之證未見說明但臨床之際就一二三次中可以區別之針砂湯者苓桂朮甘湯加針砂人參也甲字湯者桂枝茯苓丸加甘草生薑也八珍湯者當歸芍藥散加地黃人參甘草去澤瀉也八珍湯與炙甘草湯均為滋養之法鎮悸丸者緑礬茯苓朮桂枝甘草也即茯苓桂朮甘湯加緑礬也第九章浮腫水腫浮腫水腫浮腫俗名也素問傷寒論金匱要略等書中稱水氣後世稱水腫金匱要略水氣病脈證辨及治法條中有風水皮水正水石水黃汗等名稱正水石水證治未見風水者其脈自浮骨節疼痛惡風之外證也而寸口之脈沉滑者中有水氣也顏面腫大而有熱者曰風水眼瞼微腫頸動脈能見其動時咳按其手足直陷而不上起者風水也又曰在太陽病脈浮緊者骨節疼痛者或身體不疼而覺重痠口不覺渴者風水也出汗可愈其發汗過度體液虛耗而發惡寒之態者極虛症也以上所言風水僅言水之表而不及里皮水者其脈浮有胕腫之外證者也按之沒指不惡風腹如鼓之膨脹口不渴又曰口渴而不惡寒者皮水也此時身體腫而冷真元之氣已失全身知覺麻鈍矣間嘗考之風水者水毒與外邪之結合也皮水者水毒停留於表而不伴以外邪者也茲舉言風水及治水之方如下防己黃耆湯風水脈浮身重出汗惡風者越婢湯風水惡風一身悉腫脈浮不渴續續自汗無大熱防己茯苓湯皮水之病四肢腫水氣在皮膚中四肢聶聶動者此外有里水者在先輩中往往誤為皮水夫里水不必水毒停滯於裡然較風水皮水所停之水確有較里之傾向治里水之方有越婢加朮甘湯與甘草麻黃湯上舉風水皮水里水之外尚其相似之證此又可分以麻黃為主藥與以防己為君藥之二大別此外又有血分之文句金匱要略中有婦人經水不通即經血不利則為水名曰血分此因月經閉止或因體液之障害而起水腫之謂也婦人良方中對此又有血分與水分之區別婦人經水不通則化為血血不適則復化為水故先因經水斷絶而後四肢浮腫致小便不通者名曰血分先小便不通後身體浮腫而致經水不通者名曰水分在臨床之際余曾屢遇此種患者余又曾診斷一心臟瓣膜症之處女全身現強度之水腫皮膚悉呈緊張狀態按之以指毫不凹陷大小便亦不利月經亦自浮腫以來而見少心悸亢進呼吸困難胸內苦悶投以大柴胡湯兼用桂枝茯苓丸數次瀉下尿量隨之增加前後數十次浮腫全去經過兩周以後月經恢復如平常以後完全恢復健康至今亦無何等之病所謂血分之腫者如投以木防己湯或防己茯苓湯或越婢加朮湯大黃青龍湯等非特不能稍見其效且往往引起其他諸病之苦焉金匱要略中對於氣分之說明文字艱澀譯者按日人多中國古文宜乎有此語請讀者勿誤會後世人言者不多就余之見解當如下解釋之氣分重者陰證之水腫也陽氣不足則陰氣內盛寒邪相聚而起浮腫患此腫者所謂冷性者居多脈沉細沉遲或遲弱等之無力狀態浮腫亦軟以指壓之容易凹陷指痕多永留者治氣分腫之劑有用桂枝去芍藥加麻黃細辛附子湯者余則覺大建中湯亦可治之黃汗狀似風水其病身體腫發熱出汗而渴汗滴沾衣色黃如蘗汁栗園淺田翁注云黃汗本屬濕熱故身體腫發熱出汗其狀如風水其汗沾衣則色黃如蘗汁而身反不黃云治黃汗者當用黃耆配劑為黃耆芍藥桂枝苦酒湯桂枝加黃耆湯等方劑以上述浮腫療法之概略所謂雜病中水病之證尤富變化且系雜治故不憚援引二三先輩之經驗於備考中備考和田東郭之說水腫之病無病症而審其脈症不過三候識此三候施藥可無大過是為療治水腫之一大要領此不第療治水腫而已雖謂萬病中皆有此三候亦無不可三候者何一曰實腫之候一曰虛實間腫之候一曰虛腫之候是也實腫者其腫多治療易間腫次之虛腫又次之識此三候施藥可治惟極虛之腫難於見效然此名不治之腫可不加以療治也實腫之腫勢堅手按之則凹陷手雜則仍復故態類似肉脹虛腫之腫無勢其腫和手按之其跡留而不急復其原狀是為順症之腫狀此辨虛實之梗概也亦有虛腫之腫硬似石而易認為實腫者亦有實腫之腫其和大類虛腫者此二症之辨別次診察其腫之虛實皮膚之虛實舌色之虛實參以腎間之動而後可知吾道中故名此為六診六診之中對於腎間之候與舌色之候暨皮膚之候皆另有口傳又有一種之腫其水不達於皮膚之表面皮膚現皺態者是為大虛之腫又有一種其腫之形狀與前症相似或堅如石腫在腹腰以下在腹腰以上不論臂肩胸背皆呈羸瘦狀態是亦為大虛之腫兩者多屬不治然實腫中亦有腫在腹腰以下而上部不腫者但其臂肩胸背唯不腫耳非羸瘦也此則大宜注意而辨別者也水腫有虛實然實腫之病亦起於脾胃之虛故不可用攻利之劑致損脾胃用之不特無益於病且損人實甚此層尤為療治水腫者所宜深戒余往年未能深考此因凡遇滿腫之症必用巴豆甘遂桃花牽牛之類逞肆瀉下在病者甚感苦惱而全治之效甚稀即幸而得效亦往往再起滿腫此時再投瀉下之藥其效與前正同而漸漸異症蜂起終於莫救此時余滿懷積結欲尋另一手段以糾從前療治之誤經一歲余之時間研究施治水腫之方術終於束手無策內心殊不自安於是更博讀古人方籍始了悟其病因於是更而取捨其方法徵諸病而推其實效乃知取用方藥至為簡約而與無數之症相應縱橫施治迄今已五年於茲矣除極虛之症不驗外竟施無不效者焉總之水腫在小水不利者從大便瀉下亦無益原著者按瀉下卻能通快小便但此正所謂欲入南風而開北窗之意須勉力用對症之藥以通其小水為要但在實腫之勢甚盛大小便均閉塞投以利水之劑仍涓滴不利腹脹如鼓呼吸逼迫苦悶欲死者始不得不用甘遂末野薔薇實桃花之類瀉下之然亦不宜多用在下利後病勢已有轉機即宜對症而轉用和平之行氣利水劑此實為無法之法奇策而非常法也凡水腫之脈沉實有力者為實吉脈沉微沉細而無力者為虛凶虛浮浮大按之無精神有如風散木葉或如木之浮水者虛像也慎防其凶腫狀舌色與其他諸候均為虛候而脈反弦緊洪大按之其勢強盛如丸粒之像者此猶之指頭彈極薄之竹篦極虛不治之脈也凡水腫之舌為甚薄之白胎而有潤澤者實腫之輕症也厚白胎較重黃胎更重然虛腫之舌亦有白胎黃胎此宜參考腫狀而辨其虛實倘胎白而呈枯骨狀之乾燥占多者大虛之症也黑胎亦有虛實二種此非口授可明故從略厚之白胎或黃胎而舌之四邊鮮紅如緋帛之鑲邊者或舌上無胎而乾燥如火者皆虛候也又無胎而色殷然如干燥之火之甚者或白灰色而甚乾燥者俱為極虛不治之舌又白胎黃胎或無胎而色赤左右邊緣有紫黑色之斑點者系虛候而有結毒之舌也無論何病凡舌旁生紫黑之點者皆繫結毒之候此外舌候尚多往往形色相似而症紛易不易具載要之舌候脈候為診斷諸病之標準不獨水腫為然水腫而大便祕硬者實吉下痢者虛凶大便不下痢一日通五六次或一晝夜發氣急五六次發則每催大便此二症者皆大虛之兆也又因尿量少而致大小便不分離大便中多水分而成下痢之狀者實腫也大便祕澀者虛腫也宜仔細參考其腫狀與六診不可混同水腫之症而嗜食者實吉無食欲者虛凶然亦有虛腫而貪食者此為胃脾皆已虛損非吉兆也亦有實腫而心下甚痞塞不思飲者此症亦宜參酌腫狀與六診以審辨其虛實為要凡水腫而兼吐血痰血下血者多屬不易治之症然十中亦有一二可救者此在乎能否細細審辨其患候而已凡病水腫之人宜絶對禁食鹽味在麥飯中和以水煮海帶之汁食之最佳汁內如加蘿蔔紫菜亦不惡或入海帶之鹽於冬瓜赤豆中煮而食之亦佳鳥類魚鱉不可食膏粱之飯更不可食總之食淡泊之品則佳有飽滿之時者脾氣不轉也脾氣不轉則水道不通故宜食淡泊之物而禁鹽味以利水道也此為治療水腫之一大手段凡病水腫者宜禁沐浴一入浴湯其腫愈甚即其水氣全消而病愈亦勿早入浴湯若早入浴湯其腫往往有再發者大凡水氣盡後輕者三十日重者六十日許然後可以入浴不可忽視凡病水腫者最宜謹絶房事彼無呼吸逼迫等及無苦惱之病人在閒暇無事之時往往行動欲情而犯同房之事者正多正多此層宜諄諄告誡千萬莫犯犯則水道不通利矣大約在無水氣之後須謹守半年否則仍有再發之虞東郭翁更揭示各種用方茲亦附於後可以參照有持桂里之說水腫之疾古來名目甚多但要不外二大類曰陽水曰陰水凡脈浮大數尿赤口渴按其腫處則有窟鬆則隨手而起者陽水也脈沉小遲便溏尿清口不渴按其腫處則有窪手離猶不起者陰水也此外雖雜症變化繁出畢竟不出此二道千金云水有十種其中不治者五第一唇黑者傷肝第二缺盆鎖骨上窩也不平者傷心第三臍突出者傷脾第四背不平者傷肺第五足下平滿者傷腎此五症者實不治之凶症也水腫病者身有瘡癰其瘡處流水者凶即其瘡處並不自流而醫者或用針刺之使之流水逮夫水出腫消然其人亦隨之斃矣原著者按今日之大病院中此種光景屢屢見之千金方云水病忌從腹上出水水出則一月之內外死矣故大忌之且不止限於腹上也即一身中皆忌之腫之俄然消退者禍在眉睫間此不可不留意也越婢湯麻黃附子湯桃花湯桃花大黃郁李仁湯茯苓杏仁橘皮防己蘇子郁李仁或加桑白皮檳榔此方專治上體之腫以心腹脹滿或氣短為目標凡藥之烈者治病亦速如甘遂之煩桃花之渴營實之下重是也郁李仁能瞑眩然逐水則勝於諸藥云蘇子降氣湯參考喘息條備考部導水茯苓湯茯苓麥門冬澤瀉白朮桑白皮柴蘇檳榔木瓜腹皮陳皮砂仁木香燈草水氣病遍身洪腫反喘滿者連服此藥則小便利而病漸可愈腳氣腫亦用此方治水之方中配合麥門冬者甚少往年有一男子通身洪腫諸藥不應有一奇士以生麥門冬一物為大劑濃煎與之則小便快利而病全愈奇士云麥門冬者逐水之神品也原著者按與以麥門冬則大便通利小便快利麥門冬非逐水之劑然有潤滑組織之效從證運用使大小便均通利病當然愈矣禹水湯赤小豆大麥王篲豬苓澤瀉茯苓牽牛子實脾飲蒼朮白朮厚朴枳殼陳皮茯苓砂仁木香香附子豬苓澤瀉腹皮生薑燈草陸豆湯商陸赤小豆麥芽蒼朮厚朴梔子陳皮甘草用此方者宜慎飲食否則無效浪華有一有名之烏藥其方僅用赤小豆大麥地膚子三味而用時以禁食為第一凡湯汁與一切下飯之物均所禁止僅食赤小豆與麥此其理甚大也金苓散蒼朮厚朴陳皮半夏藿香甘草豬苓澤瀉桂枝茯苓生薑大棗此為草醫所傳之方平易簡妙曾試驗於一二腫脹之兒果見奇效澤漆湯澤漆鯉魚赤小豆生薑茯苓人參甘草諸凡腫脹屬虛者用此方有奇效産後水腫腳氣腫滿等用此方愈者數人矣方見千金真武湯虛寒之腫脹世醫無不用之壯原湯人參白朮茯苓破故紙桂心附子乾薑砂仁陳皮痢久下則脾虛脾不能制水因成腫脹多服此方有效加味腎氣丸八味丸加車前子牛膝胃氣虛衰不能收攝水氣致腰腳泛腫此丸可以治之麻黃連軺赤小豆湯諸瘡毒內攻變腫者用此湯及連翹湯連翹湯連翹黃芩麻黃升麻川芎甘草大黃枳實毒盛者加犀角反鼻其功更超絶凡瘡疥上因淋洗塗搽攻毒歸內而起腫脹者大抵不外古之二湯二湯猶無效至喘滿氣急者用建瓴丸紫丸之類以制之又此際已成越婢湯麻杏甘石湯等之症矣勝勢飲當歸香附子川芎茯苓蒼朮桂枝沙參木通丁香甘草婦人因積冷結氣而腫脹者用此方極妙防己散防己桑白皮茯苓紫蘇木香生薑妊婦腰腳微腫為安産之佳兆不必服藥如小便不利周身浮腫可服此方原著者按妊婦之浮腫有陽水有陰水宜時時從證用方常用一方者每難奏效琥珀湯五苓散加琥珀反鼻産後水腫以琥珀為專藥但反鼻亦有效凡瘡毒內攻之腫加反鼻於赤小豆湯中或連翹湯中其應若響故反鼻實可謂攻毒之奇藥又産後水腫於服藥之外食水禽亦佳因水禽有利水之功此中尤以蒼鷺之功為最大此係友人屢試屢效之經驗赤小豆湯防己桑白皮茯苓葶藶子杏仁赤小豆此方用於諸般之水腫脹滿婦人胎水為小林翁屢試屢效之方另有一方用百部根商陸菟絲子蒼朮接骨木葉赤小豆者此係吉益南涯家藏之方與前方之功堪為難兄難弟禹水丸針砂禹餘糧蛇含石為主從證而加諸種之藥桂里翁盛推獎此方謂誠治水腫膨脹之神方也凡治腫脹水腫之意以圖利尿為上法攻下者為不得已之下策然觀今時醫生之醫腫脹者往往率意用下劑不愈時則云自力已竭欲圖下泄已屬不及此天命也逞一時之能促人於死猶委之天命不知其心中能自安否至於小兒之腫脹尤不得不慎用原著者按桂里翁時代盛行所謂東洞流之治術有濫用下劑之癖故桂里東郭二大家均諄諄以此為戒千金方久患氣急呼吸促迫而不愈則成水腫其皮中之浮水攻面目身體從腰上腫用甘草麻黃湯以發汗可愈千金翼麻黃湯麻黃甘草湯主治風濕水疾身體面目腫脹不仁醫宗金鑑小青龍湯對於雜病之膚脹水腫者用以發汗利水有效療治茶談水腫之症兼咳嗽腹中之動氣甚者為必死之證類聚方廣義妊娠每現水腫因而有流産者不用逐水之劑而以葵子茯苓散煎服之挾喘咳者合甘草麻黃湯服之苓薑朮甘湯中加杏仁名腎著湯治妊婦之浮腫小便自利腰髀冷痛喘咳者有效産後現水腫而有腰腳冷痛小便不仁小便不利之狀者八味丸可愈稟性薄弱之婦人妊娠每現水腫因而有流産者如用越婢加朮附湯木防己湯等即有墮胎之虞此宜用麻黃加朮湯或合葵子茯苓散亦佳妊婦浮腫喘咳息迫或身體麻痹或身體疼痛者麻黃杏仁薏苡甘湯可愈建瓴丸甘遂黃良二味成為藥丸有治一身洪腫之效用此丸時宜量其形勢氣力而有多少黃良者大黃之別名也第十章熱熱熱為陽證但亦有陰證之發熱者大凡陽證及實證者易伴熱陰證及虛證者易伴寒皇漢醫學要訣云所謂熱者不必達體溫計之標準始謂之凡局部之有熱感者亦可謂之熱同時熱之云云即寓今日炎症之意西醫別為熱型熱勢熱型分稽留熱弛張熱間歇熱熱勢分亞熱輕熱中等熱高熱過熱但此等分類法與直接治療法無關反之皇漢醫學上將辨為陽證之熱乎陰證之熱乎實熱乎虛熱乎更進一步如已認為陽證之熱者又將從何審辨為太陽病之熱乎少陰病之熱乎抑或陽明病之熱乎傷寒論金匱要略中關於熱證之用方甚多茲從證歸納而採擇之如下發熱桂枝湯嗇嗇惡寒淅淅惡風翕翕發熱頭痛發熱發熱出汗頭微痛惡寒時時有熱桂枝麻黃各半湯發熱惡寒熱多寒少桂枝二越婢一湯發熱惡寒多熱少寒黃耆芍藥桂枝苦酒湯發熱出汗口渴桂枝加黃耆湯發熱五苓散發熱頭痛發熱豬苓湯脈浮發熱麻黃湯頭痛發熱無汗發熱身疼痛麻黃附子細辛湯少陰病始得之反發熱脈沉小青龍湯心下有水氣乾嘔發熱而咳咳而微喘發熱不渴大青龍湯發熱惡寒身疼痛小柴胡湯嘔而發熱者傷寒瘥後更發熱者柴胡桂枝湯發熱微惡寒支節煩疼厚朴七物湯病腹滿發熱十日脈浮數大黃附子湯脅下偏痛發熱其脈緊弦此寒症也下溫藥治之調胃承氣湯太陽病三日汗發不解蒸蒸發熱者屬胃也大黃牡丹皮湯時時發熱自出汗復惡寒四逆湯吐利出汗發熱惡寒四肢拘急手足冷厥者真武湯太陽病發汗汗出不解但仍發熱梔子蘗皮湯身黃髮熱者麻黃杏仁薏苡甘草湯發熱日晡更劇消石礬石散黃家日晡所發熱惡寒大承氣湯發熱多汗往來寒熱小柴胡湯往來寒熱胸脅苦滿柴胡桂枝甘薑湯往來寒熱心煩者大柴胡湯往來寒熱潮熱柴胡加芒硝湯潮熱大承氣湯短氣腹滿而喘潮熱日晡發潮熱不惡寒讝語潮熱不能食者小承氣湯讝語發潮熱脈滑者大陷胸湯日晡稍稍潮熱煩熱小建中湯手足煩熱八味丸飲食如故煩熱不得臥小柴胡湯四肢苦煩熱梔子豉湯煩熱胸中窒者溫經湯手掌煩熱瘀熱茵陳蒿湯渴欲飲水者此瘀熱在裡也麻黃連軺赤小豆湯瘀熱在裡身必發黃熱入血室小柴胡湯熱入血室其血必結故發作時如瘧狀身熱小柴胡湯傷寒四五日身熱惡風梔子豉湯傷寒五六日大下之後身熱不去心中結痛者梔子乾薑湯傷寒醫用大下之丸藥身熱不去微煩者熱白虎加人參湯熱結在內表裡共熱白虎加桂枝湯身不寒但熱調胃承氣湯不惡寒但熱四逆湯出大汗後熱不去者通脈四逆湯裡寒外熱梔子豉湯熱在外者微熱五苓散微熱消渴小柴胡湯身微熱大承氣湯時微熱四逆湯治身微熱見厥者葦莖湯咳微熱此外尚有越婢湯及麻黃杏仁甘草石膏湯以治大熱之語大熱者體表之熱之意非熱大之說也通覽上列表實證之熱用麻黃湯表虛證之熱用桂枝湯陽明病之熱用調胃承氣湯大承氣湯治少陽病之熱用小柴胡湯均發熱之症也而用熱認定為陽熱更觀陰虛證之發熱用四逆湯或真武湯其發熱也咸惡寒發熱如太陽病之熱狀極不能一般的定方余於臨床時曾屢見陽明病或少陰病者亦惡寒發熱或往來寒熱或潮熱此種病症欲擬對症之方不得不先明脈狀矣傷寒雜病辨證曰蓋發熱一證頗多類似脈浮而緊發熱惡寒者傷寒之候也脈浮而數發熱惡寒或有痛處者現癰癤之兆也脈浮而按之反澀發熱惡寒或膈內實而嘔吐者傷食也脈浮而滑或頭眩嘔吐者風痰也脈浮而弦發熱惡寒或思飲食者化為瘧疾之徵也能辨此脈又能辨驗其證者方可無誤往來寒熱者寒與熱相往來也寒去則熱現熱往則寒來雖如發熱惡寒但熱與惡寒不同時此往來寒熱者示邪在少陽部位也柴胡劑可治之故小柴胡湯為少陽病正面之治方傷寒雜病辨證曰小柴胡湯用於往來寒熱柴胡桂枝幹薑湯用於但頭汗出之往來寒熱奔豚湯用於往來寒熱是皆專治邪在少陽者也一主胸脅滿微結一主胸腹之痛但俱無下之之法大柴胡湯之用於往來寒熱熱結在裡者也往來寒熱屬少陽為柴胡之正證若表證則多加桂枝里證則多加大黃是其大法也潮熱者如海水之潮來時身體手足胸腹中無不充滿其熱故曰潮熱此為邪氣熾盛於陽明部位之徵應用大黃芒硝之配劑傷寒雜病辨證曰潮熱者邪氣入胃而現之證也若脈浮而緊潮熱下痢或小便難出大便溏者邪氣入胃而猶未入之兼少陽證者也先當和解其外若小便利而大便鞕者攻之但癆瘵肺結核而潮熱者必屬虛證煩熱者用小建中湯八味丸小柴胡湯梔子豉湯溫經湯以上五方前已分列主治病症則煩熱與潮熱之相異自明即潮熱者概為陽實證煩熱者悉為虛證有手足煩熱者有四肢苦煩熱者有手掌煩熱者手足煩熱者多為陽虛有時陰虛亦有此苦傷寒雜病辨證曰煩熱者熱之苦煩者也其症在心胸之間如蒸如焮熱氣怫鬱煩擾不能安靜也有手煩熱有足心煩熱蓋煩擾者無奈何之義也又有僅僅足下熱或足心熱者此皆系胃中蓄血所致與手足煩熱相似但不可混同煩熱而胸中窒塞者用梔子豉湯煩熱而心亂者用三黃湯指金匱中風歷節病編之千金三黃湯煩熱不得臥者用八味丸是皆在心胸之間其因有三一因下汗後虛邪湊於心胸一因風氣侵心一因氣上而不能下通故治法亦有陰陽之別手足煩熱者用小建中湯四肢苦煩熱者用小柴胡湯手掌煩熱者用溫經湯皆屬四肢血熱之所致也瘀熱者用茵陳湯麻黃連軺赤小豆湯此二方治黃疸均有效蓋黃疸者瘀熱在裡而發者也瘀熱鬱於裡故發瘀穢之熱也熱入血室者所謂血熱也熱與血之結也身熱者用小柴胡湯梔子豉湯梔子乾薑湯潮濕可下而去之身熱則雖下而不能除故雖大下之後身熱不去因身熱系裡熱非表熱也故不當與以瀉下之劑傷寒雜病辨證曰身熱者大大者大表之大非大小之大熱也太陽上篇云身大熱者其病屬陽明與微熱相反微熱者熱潛在裡也身熱者熱顯於表也中西深齊云身熱者胸腹常熱熱在肌膚其人身重而微煩云身熱者邪氣傳於裡而未實也表裡俱熱但純裡熱甚輕耳此外尚有表熱外熱之名亦屬身熱均不用下法熱之含義甚廣不能一例而論宜考其前後而後能判其為何種之熱白虎湯證之熱熱結在裡表裡均熱之身熱也白虎桂枝湯證之熱身不寒而但熱之身熱也梔子豉湯證熱於外之身熱也四逆湯證之熱出大汗而熱不去陰證之發熱也通脈四逆湯證亦陰證之熱也微熱者有五苓散小柴胡湯大承氣湯四逆湯葦莖湯諸方柴胡桂枝湯用於寒多微熱微熱者無熱之謂有陰有陽有虛有實參考其他之症候始能知其如何之種類焉傷寒雜症辨證曰微熱亦屬裡熱微即幽微之微隱邃而不大顯之義熱微如無之謂也第十一章不眠讝語狂癇不眠不眠有努力不眠無心眠及不能眠因疼痛瘙癢等眠之不能久者多為狂者之症狀當於次條論之因疼痛瘙癢等而不能眠者亦有種種傷寒論金匱要略中言及不眠之方有五梔子豉湯發汗吐下之後虛煩不得眠劇者必反復顛倒心中懊憹酸棗仁湯虛勞虛煩不得眠乾薑附子湯下後復發汗晝間煩躁不得眠夜間安靜不嘔不渴無表證脈沉微身無大熱者豬苓湯少陰病下痢六七日咳而嘔渴心煩不得眠者皂莢丸咳逆上氣時時唾濁坐不得眠上列五方中末二方因咳而嘔渴或咳逆上氣而不得眠在本章之範圍外通觀其他三方為發汗吐下之後云云虛勞云云下之後虛煩云云對於最初或汗吐下者排除病毒不留體內反覆丁寧要之從證驅逐病邪實為當務之急也讝語傷寒論云實時為讝語虛時為鄭聲鄭聲者反覆重言其聲無力而低精氣虛也活人書云病人有讝語有鄭聲鄭聲由於虛宜用溫藥白通湯主治之讝語者為實調胃承氣湯主治之此不過一例耳茲舉傷寒論金匱要略中言及治讝語者共六方如下柴胡桂枝湯發汗多亡陽讝語者與柴胡桂枝湯以和其榮衛通其精液後自愈柴胡加龍骨牡蠣湯傷寒八九日胸滿煩驚小便不利讝語周身覺重不能轉側者白虎湯三陽合病腹滿身重難於轉側口不仁面垢讝語遺尿發汗則讝語下則額上生汗手足逆冷或自汗者小承氣湯陽明病其人多汗以津液外出故胃中燥大便必鞕鞕則讝語此以小承氣湯為主大承氣湯陽明病讝語有潮熱不能納食而胃中必燥屎五六枚或有能納食而屎鞕者調胃承氣湯或胃氣不和讝語者調胃承氣湯與之統觀以上柴胡桂枝湯與白虎湯亦可以治讝語則讝語一症即非實證矣此點先醫論點亦稍有矛盾矣狂癇狂癇大概起於氣與血之變傷寒論金匱要略中有治方二桃核承氣湯太陽病不解熱結膀胱其人如狂血自下則愈抵當湯太陽病六七日表證仍在脈微而沉反之不結胸而其人發狂以熱在下焦故少腹當鞕滿小病自利血下乃愈太陽病身黃脈沉結少腹鞕小便不利者非血證也小便自利其人如狂者血證也除上二方之外又有防己地黃湯亦系驅瘀血之劑大有注意之價值此外可參用讝語條下所揭之方劑及治心氣不定之瀉心湯等因讝語亦屬狂之一症而心氣不定亦現狂人之徵候也桃核承氣湯抵當湯均為驅瘀血之劑前者用於輕症後者用於重症似狂者用前者發狂者用後者余嘗診一二十九歲之婦人産後八個月此期間無月經而發狂入精神院而不效逮後亦經過不少醫師終於無效余先以抵當湯與之不效轉而用桃核承氣湯腹證上無桃核承氣湯之證存在即見輕快從此一例可知發狂者用抵當湯似狂者用桃核承氣湯之區別矣至於患者大便鞕小便自利云云可不拘泥於文字云備考本間棗軒之說狂為癇之變證即腦病也故多難治者此有緩急二症急發之證及似甚重者大抵可治其緩證而似輕者能治者甚稀治後亦有一旦復發者狂者初雖不死但稀有不死者熟察其脈證即可判斷其生死急發者名陽狂其初因思慮過度日夜不眠遂致精神錯亂此證行走漫無定則有時逾牆越窗有時登屋身體輕便自在若走獄飛鳥力倍於平常二三倍往往兩三人不能制止見人時不論親疏往往肆詈漫罵強制之則或唾人面或咬其衣狀類風犬有時或歌或笑或哭或泣或現恐人捕捉托手防禦之態或發被人殺害之疑有時亦有安靜者但不能保持其較長之短時間飲食倍於平常往往放飯流啜對於藥品每認為有毒不敢嘗試強與之則以後雖遇無毒之飲食亦噤口不敢嘗食矣眼生稜角之光舌上作白胎或黑胎乾燥而煩渴虛里之悸動高脈弦數大便祕結小便遠者二三日不出其初小便不祕下腹亦不急脹凡悸動高之氣上衝之病人其小便稍遠因其一身中之水分盡被氣化而表散不到膀胱故也柴胡桂枝幹薑湯柴胡加龍骨牡蠣湯條云不腫之證小便不利者用牡蠣龍骨鉛丹等鎮墜之劑此亦因上衝而小便不利也凡陽狂之證治宜先與吐劑中略服藥用柴胡加龍骨牡蠣湯三黃加辰砂湯大柴胡湯黃連解毒湯等渴者用參連白虎湯中略緩發者即陰狂其證好閒居獨處不願近父母妻孥終日默默若有所思心氣不定言語錯亂有時聞輕微之音即驚而或躍或走又處處有慮人誹謗自己之疑自身作羞愧無可處置之狀詰之則恨不能刺咽截腹有時恐人來捕捉有時懼被人殺害此名陰症中略陰狂禁吐下二法及灌水等之攻擊思慮反覆不止者用半夏瀉心湯加茯苓有神驗驚怕甚者兼用柴胡加龍骨牡蠣湯與寧心膏夜間眼氣清朗不能稍睡者用酸棗仁湯溫膽湯竹茹溫膽湯加減溫膽湯中略女子戀愛男子不能達意至於發狂者名為華瘋亦名花癲華與花通其證亦有陰陽可用前之治法又妊娠中或産後發狂者其治法亦可用前方血熱不解者用加味逍遙散惡露不盡而發狂者可用桃核承氣湯甲字湯加大黃或哭或笑或歌或悲者用甘麥大棗湯下略按溫膽湯者半夏枳實甘草竹茹生薑橘皮茯苓也竹茹溫膽湯者柴胡橘皮半夏竹茹茯苓香附子枳實黃連人參桔梗麥門冬甘草生薑也加減溫膽湯者竹茹枳實橘皮半夏茯苓酸棗仁黃連遠志菖蒲丹砂甘草生薑也逍遙散者柴胡芍藥茯苓當歸薄荷白朮甘草生薑也有持桂里之說按桂里翁之論癇中有癡狂驚悸不寢健忘奔豚故其所謂癇非今日狹義解釋之癇癇之症狀千端萬倪不能一一縷舉其大者有六其中奔豚一病古來雖自別為一病要之亦癇之一症此非余之管見先達之士已辨之審矣參連湯俄然直視煩悶者先投此湯或加吳茱萸或加熊膽汁瀉心湯癲狂癇凡熱實者總用此方吳山甫云治心火胸膈實熱而面赤狂躁者黃連解毒湯無可笑處而頻頻為可笑之狀者癇也此心火也用此方以撲其焰其病自止大黃一物湯江州民間所賣之狂藥即是此藥此藥非多飲不效故宜多煎以代茶飲余嘗得自江州鄉之澤村氏其後涉獵醫籍不見是說最後在邵氏明醫指掌訂補中得見一語云大抵狂病宜於大吐下而吐下之效莫如大黃一物湯云云又虞花溪亦有癲者吐狂者下之語因恍然於二症療治之梗概且悟到癲亦可下狂亦可吐之理是在因時制宜而已柴胡加龍骨牡蠣湯此方以胸滿煩驚為主症其餘皆為客症鵲石散治傷寒發狂或棄衣奔走或逾牆越屋之病用黃連寒水石各等分細末濃煎冷卻後以甘草湯飲服之每次二錢麥門冬癇疾其人不實難於用瀉心湯鵲石散者用之此有止逆下氣之效風引湯大黃乾薑龍骨桂枝甘草牡蠣寒水石滑石赤石脂白石脂紫石英石膏各六兩熱癱癇奇疾也然亦有奇藥可以療之所謂詹公之釣千載之鯉不能避也余嘗治一洛西人年弱冠久患此症頭面欹斜手足攣縮其狀恰如異形奇態之傀儡群醫用盡其技莫之能愈為期經過二三年最後求治於余余以此湯與之一服即治其半四五旬後諸症盡去復態如常人咸驚歎不置小兒之驚癇瘛瘲驚癇者搐搦症也瘛瘲者手足牽引為或伸或縮之顫振也以上如腦膜炎之病狀每日發作數十次者或亦能用此方救治之瓜蒂散桃核承氣湯抵當湯鷓鴣菜湯治蛔蟲之劑酸棗仁湯酸棗湯酸棗仁桂枝生薑石膏茯苓知母甘草人參見千金方甘草瀉心湯竹茹溫膽湯柴胡香附人參黃連甘草桔梗陳皮半夏竹茹茯苓枳實大棗生薑治傷寒日數過多其熱不退夢寐不寧心驚恍惚煩躁多痰不眠者高枕無憂散陳皮半夏茯苓枳實竹茹麥門龍眼石膏治心膽虛怯晝夜不睡桂枝去芍藥加蜀漆牡蠣龍骨救逆湯不寐之人徹夜一目不眠如及五六夜必發狂如恐其發亟以此方服之甘麥大棗湯茯苓甘草湯心下悸者大率屬癇與飲此方中加龍骨牡蠣絶妙此方又可治不寐之症又凡用酸棗仁湯或歸脾湯不愈者用此方屢奏奇效此係余之經驗茯苓桂枝甘草大棗湯苓桂朮甘湯真武湯歸脾湯人參茯苓龍眼肉黃耆酸棗仁白朮木香炙甘草生薑大棗人生經多年之苦志辛勞而致健忘者此方大有效驗牡蠣奔豚湯牡蠣桂枝李根白皮甘草可療奔豚氣從小腹起直撞於胸手足逆冷者奔豚湯桂枝生薑人參半夏甘草吳茱萸蝮蛇起廢丸因蟲咬或觸毒而起癲癇者若其人未滿三十歲者用此方得效尾臺榕堂之說發狂之陽證者濕布水有奇效無濕布之處可用四斗之桶吊於高棚之上桶中盛滿以水將桶慢慢傾側使水從桶嘴漏下人下水水由頭頂灌至兩肩胸膈可愈心胸閉塞之症以瓜蒂散吐之有奇效煎藥可用甘連大黃加石膏湯石膏黃連甘草湯白虎加黃連湯瀉心加辰砂湯大柴胡加針砂湯大承氣湯柴胡加龍骨牡蠣湯等急病者其治亦速緩症者則反費工夫其經有年有月之滯患者多不治婦女因經閉而起者可用桃核承氣湯抵當丸類聚方廣義桂枝加龍骨牡蠣湯桂枝去芍藥加蜀漆龍骨牡蠣湯桂枝甘草龍骨牡蠣湯三方所謂治癇家之藥凡上衝眩運耳鳴胸腹動悸夢寐驚起精神恍惚等之症或無故悲愁者亦可從證擇用蘭軒醫談産後不眠百治不效問之病人覺胸中煞剌煞剌而空虛以致不眠者名曰痰飲系蛔蟲之所為可與黃連阿膠湯每藥一碗用雞子半個三碗即得安眠此方用在下血多而不眠者亦有效但未試過第十二章胸痛腹痛胸痛傷寒論金匱要略中言及治胸痛胸痹脅痛心痛心下痛心中痛之方有二十二列舉之如下小柴胡湯脅痛脅下滿痛十棗湯脅下引痛胸中痛當歸生薑羊肉湯脅痛大承氣湯心下必痛大陷胸湯心下痛按之如石硬小陷胸湯在正心下按之則痛栝蔞薤白半夏湯心痛徹背者胸痹甘草粉蜜湯心痛發作時大建中湯心胸中大寒痛桂枝生薑枳實湯心懸痛走馬湯心痛赤石脂丸心痛徹背背痛徹心九痛丸治九種心痛大黃附子湯脅下偏痛調胃承氣湯胸中痛栝蔞薤白白酒湯胸背痛胸痹大柴胡湯心中結痛橘皮枳實生薑湯從脅下逆搶至心人參湯胸痹茯苓杏仁甘草湯胸痹枳實薤白桂枝湯胸痹薏苡附子散胸痹以上諸方劑與次舉腹痛條下諸方劑比較之兩方共通者有二三此外又有柴胡桂枝湯之治心腹卒中痛備急丸之治心腹脹滿卒痛如錐刺等又心與胸之部位完全同歟抑不同歟若謂同則何以又有心胸中大寒痛云云豫抱此疑問數年來迄不得解釋或繫心之病位深胸之病位淺即或胸近於表心近於里歟然經種種考慮亦迄未能釋然也此則只好姑置之耳通觀上方如大黃芒硝之配為冷性下劑巴豆之配為溫性下劑芫花甘遂大戟之組合為利水效藥附子乾薑蜀椒吳茱萸之為熱藥甘草蜂蜜飴之以治急迫等在文字上對於心痛亦各有不同之目標在實際臨床時亦應審辨其痛究為陽性抑為陰性為實證抑系虛證痛之放散自胸至腹乎抑自腹至胸乎抑或常限於一局部乎不拘泥於部位實招誤治之基也腹痛烏頭桂枝湯腹中痛小建中湯腹中痛小柴胡湯同上黃連湯同上芎歸膠艾湯同上當歸生薑羊肉湯寒疝腹中㽲痛腹中痛當歸芍藥散腹中㽲痛腹中痛當歸建中湯腹中刺痛烏頭湯腹中絞痛寒疝土瓜根散少腹滿痛大承氣湯腹中急痛大黃牡丹皮湯少腹腫痞按之即痛枳實芍藥散腹痛下瘀血湯同上通脈四逆湯同上真武湯同上桃花湯同上大烏頭煎腹中繞臍痛附子粳米湯雷鳴切痛大建中湯出見於皮頭足上下不能觸近之痛烏頭煎寒疝奔豚湯上衝於胸之腹痛紅藍花酒腹中血氣刺痛腹痛與腹中痛異此與咽痛咽中痛之異點相同但吾人於臨床之際對此區別之點每每發生矛盾云疝痛用當歸生薑羊肉湯烏頭煎烏頭湯㽲痛用當歸生薑羊肉散當歸芍藥散蓋疝痛之痛其痛之局部如山之膨出寒疝起於水毒或水毒與瓦斯相混而常移動腸疝則瓦斯排出即消散如釋故寒疝遇溫則輕快遭寒則憎惡是以配以熱藥溫藥之方劑也㽲痛則在塞處無理押進時所起之痛也起時每每伴以寒疝不過可區別者為狹處似有何物欲為無理之通過之感而已傷寒論金匱要略中只言寒疝而不言及治熱疝不過在膽囊炎或膽囊結石之際所見之痛即熱疝也屢屢伴以㽲痛故配用冷藥及寒藥之方劑參照膽囊炎膽囊結石條後世之疝與今日西醫之神精痛洛伊麻基斯相等有持桂里心痛之說心痛胸痹結胸其脈其症雖有異同然皆心胸之病也脅痛亦不外是故茲包括為一門尋胸脅痛之源有從痰飲來者有自痃癖起者有起因於蛔蟲者又有真心痛者此係另一種之劇症靈樞厥篇云真心痛手足清至節心痛甚旦發夕死夕發旦死此症雖亦有綿延二三日者但危急之症其痛異常往往輾轉床第痛之地位大抵在膻中間亦引擴至左右凡脈結代者極惡之候也大冢曰真心痛等於今日之狹心症胸痹之病輕者僅胸中氣塞而不痛金鑑云胸中急痛者胸痹之重者也胸中氣塞者胸痹之輕者也又曰胸痹之病輕者即今之胸滿輕者即今之胸痛此非奇異之病能自在運用藥方不多勞作病自可愈結胸者其痛從心下而迄少腹也主在心胸故不結胸桂枝生薑枳實湯心中痞諸逆心懸痛心中痞即胸痹也諸家學說或云水逆火逆或云上逆吐逆嘔逆上逆者以桂枝治之吐逆嘔逆以生薑治之又有以逆注釋為痰飲客氣者余未認為的確蓋逆之云云義即上犯譬諸懸物必從上懸其向上者方可稱逆故凡逆於心脅者不論何病總稱諸逆也苓桂朮甘湯治心下逆滿者也枳實薤白桂枝湯治脅下逆搶心者也唯此方不必定拘於痛心胸痞塞即可用之凡心胸痞塞者與以此方得忽覺寬鬆焉小陷胸湯千金陷胸湯栝蔞實大黃黃連甘草此在大小陷胸湯間之症用之極效主治胸中心下結積又飲食不消而痛者亦有效大陷胸湯甘草乾薑湯疝症水飲之症心胸痛服苦味之藥不解者用此甘味之藥有意外之效枳實薤白桂枝湯此方治心中痞氣結胸滿自脅下衝至心者茯苓杏仁甘草湯治胸痹之輕症小柴胡湯薏苡附子散九痛丸九痛之用詳於千金金匱程注云九痛者分為九種之痛也不外積聚飲痰血結蟲注寒冷此說於療治尤為的切其方在外臺中引千金之附子丸附子者能治胸痹心痛者也有持桂里腹痛之說腹痛病症也非病名也系兼諸病之症候不能別設門類然先哲之方書中咸為特立篇目余亦只好顰而效之耳小建中湯腹中急病者小建中湯主治之凡小建中之腹候治之甚易但稀有無柴胡者小柴胡湯凡腹痛之於左脅者柴胡主治之但宜參酌用大柴胡湯心下滿痛四逆散腹中痛柴胡桂枝湯心中卒痛之類大冢曰柴胡治左脅之痛對於右脅之痛則不效此係桂里翁之說自此以後咸奉為定例矣然余對右脅之痛屢屢用柴胡劑治之也桂枝加芍藥湯桂枝加芍藥大黃湯此係桂枝加芍藥症內實之治方痢病初起腹痛甚者用此方隨手可愈又疝症之腹痛或外邪兼宿食之痛或發瘡疹之腹痛者用此方皆有效黃連湯此方用於心下中腕間之痛有嘔氣者為良大建中湯大建中湯之痛從腹而至胸者附子粳米湯腹中寒氣者病因也雷鳴於下者病症也今觀此病多因於水飲與寒疝可名為腹中寒氣云甘草粉蜜湯此本為治蟲痛之方其因飲水而腹痛者活用之亦甚有效此藥用後即手足身體發腫胃氣快復者佳兆也其所現之浮腫不宜遽用利水之劑經日自能消散倘經日不消始可與腎氣丸大凡一經發腫而愈者以後永不再發矣此真百試百效之神方也大承氣湯備急丸第十三章腹滿腹滿腹滿亦有陰陽虛實陽實之腹滿不似陰虛腹滿之隱見出沒且按之緊張而有抵杭者也陰虛之腹滿則忽而膨隆忽而輕減按之抵抗弱而無底力者也陽實之脈緊遲或沉實而有力陰虛之脈則現遲而微弱或浮而微弱等陽實之病當下之則腹滿減陰虛則雖下而不減或更增大恰如陽實證之腹痛下則輕減陰虛之腹痛下則增劇同出一軌傷寒金匱之方中言及腹滿者有下列二十五方大承氣湯腹滿腹滿痛腹中滿痛腹脹不大便調胃承氣湯吐後腹脹滿小承氣湯腹大滿桃核承氣湯少腹腫痞大黃甘遂湯少腹滿抵當湯少腹鞕滿厚朴七物湯腹滿桂枝加芍藥大黃湯腹滿大實痛者大黃消石湯腹滿茵陳蒿湯腹微滿走馬湯腹脹不大便己椒藶黃丸腹滿大黃䗪蟲丸腹滿消石礬石散腹脹如水狀少腹滿三物備急丸心腹脹滿桂枝加芍藥湯腹滿時痛者四逆湯下痢腹脹滿小青龍湯少腹滿土瓜根湯少腹滿痛白虎湯腹滿梔子厚朴湯腹微滿小半夏湯腹滿而喘厚朴生薑半夏甘草人參湯腹脹滿枳實芍藥散腹痛煩滿溫經湯腹滿以上十六方之中有芍藥者五方有厚朴者二方通例下痢則腹滿減然四逆湯條下有下痢腹脹之語此想系陰虛之腹滿也友人某氏其叔父就余診療謂下痢與腹滿腹痛已有數月經西醫診治漸次增惡初診之日咽乾舌強燥口不渴脈微弱而遲腹滿尤在臍下為甚時時疝痛瓦斯之排泄多大便如泥狀量微一日數十回而不間斷無食欲食味之變化食後腹滿增加呼吸迫促尿一日從三百竰至五百竰屎道微痛余始與以大建中湯服藥一二日疝痛咽乾舌燥腹滿不減而尿不利者一日繼與豬苓湯僅一帖而尿量減而為閉尿狀態腹滿更強時訴苦悶有至急宜處置之必要急以電話通來余亦自詫為粗忽即用大建中湯四逆湯半夏厚朴湯合方與之即見尿量增加腹滿減大便呈黃色之整形次數減其後全身浮腫心下部尤甚轉與以桂薑棗草黃辛附湯即全愈此患原來為純然之陰虛證故投以熱藥溫藥為主之劑而尿量少再投以冷藥則更不治也備考有持桂里鼓脹之說孫思邈云蠱脹者腹滿而不呈腫狀者也水脹者四肢面目俱腫脹也醫者不察診候用治水之藥以治蠱或治蠱之藥以治水或治水之藥以治脹滿是真仲景所謂愚醫殺人也明孫一奎曰臍腹四肢悉腫者水也只腹脹而四肢不腫者蠱也蠱即鼓脹古人蠱鼓通後世方書稱氣虛中滿者即鼓脹也因其外堅內空故名千金脹滿門云病者腹滿按之不痛者虛也按之痛者實也凡腹脹凸滿者吉平滿者凶腫毒之漫腫者其病重鼓脹之滿臂細臍凸手心足心及背平滿青筋繞腹等種種惡症齊現者不治厚朴七物湯主治詳於金匱但不必待此症悉備千金七物湯方下云治腹滿氣脹但以脈浮散者為用此方之真面目按先哲鼓脹之脈說浮大者可治虛小者危急此其大法也又脈似虛小而實沉小者此往往為下藥之症金匱水病篇云腹大小便不利其脈沉絶者可下按凡病脈之見絶者決無攻下之理由此沉絶之絶實系沉伏之解云厚朴生薑半夏甘草人參湯厚朴三物湯大承氣湯大黃甘遂湯少腹滿者瘀血也小便微難亦與水有關係故水與結而入血室則周身腫脹小腹尤滿用桂枝茯苓丸或與琥珀湯而力不及者可用此方鱉甲湯抵當湯方中之水蛭虻蟲代以虎杖加鱉甲不論男女凡瘀血脹滿者均用之瘀血脹滿此方甚佳凡百疾患腹中有形塊按之不移動口不惡食小便自利大便黑面黃手掌有赤紋者肌膚甲錯等皆瘀之候也輕症不盡現醫者宜細細診視之加味腎氣丸八味丸加車前子牛膝治脾腎虛腰痛腳腫小便不利或肚腹脹痛四肢浮腫或喘急痰盛已現蠱證者腰痛腳腫小便不利者腎氣丸之本症人所熟知也喘急痰盛已現蠱症則用此者甚稀後篇病證各論第一章風邪風邪古名中風意即中於風之病也感冒傷風冒風等皆其異名也定義寒冷侵人為諸種病狀之動機其一般所知者為呼吸器系統之疾患今日醫學之範圍其發病之原因甚屬不明普通之見解則謂寒冷侵入時人身之防禦力弱身體之某部因抵抗力低下於是某種之感染乘機而來則疾病起矣因抵抗力減而受寒冷之損傷者曰感冒因感染而起疾病者曰感冒病而實際上感冒與感冒病則多混同焉原因考感冒之成立由於次之三要素即一周圍之氣溫低下二傳染三身體感受性之鋭敏一氣溫之低下吾人之身體一方由筋肉腺等作體溫他方則裝置皮膚之血管由擴張發汗等以發散體溫體溫常保一定之度倘寒冷侵入時體表之血管先起收縮而體內之體溫活潑皮膚之血管擴張致起充血倘此反應之力不充分則感冒起矣氣溫之低下全起於急激時例如灌冷水等之時或起於漸來之時例如從秋至冬之移行罹感冒者甚少外界之溫度為惡急性之下降時例如天氣之激變因發汗後裸體而受冷風之時侵晨薄暮接觸冷風之時最易起感冒要之在比較的短時間內不知不識之中體溫下降之時四季約有罹感冒之危也二傳染寒邪動時因身體之防禦力不充分身體某組織之抵抗力衰弱種種微菌遂乘機侵入居住於健康之體內後乘機活動而起流行性之感冒病矣起感冒病之菌時時處處種種不能枚舉重球菌連鎖狀菌葡萄狀菌以及其他之菌究為單獨之原因物抑為多數之原因物則尚不明瞭也三感受性人身所受之寒冷雖同而感受性則因個體或身體之狀態如何而異即同一感冒病也而痰病之局所亦有異焉甲起於呼吸器之黏膜乙起於消化器黏膜之加答兒丙起洛伊麻基斯性疾患丁起神經系統之疾患甚或同起於一家族也而甲為加答兒性乙為洛伊麻基斯性丙為神經系病性又同一年齡之個體也而甲為加答兒性乙為洛伊麻基斯性丙為神經病性亦有同時種種疾病混合襲來者又凡易起腎臟炎與心臟炎之個體此等感冒病亦起焉後天性之感受性亦有注目之價值凡身體衰弱疲勞過勞睡眠之間易罹感冒又凡屢屢感冒之人結核病之人罹微毒之人亦易犯感冒至於塵埃煤煙有毒物質等之物或化學的刺激亦為感冒之補助原因症候風邪之症狀普通始於噴嚏惡寒其次發熱頭痛鼻塞或伴以咽喉痛咳嗽小兒屢現消化器方面之病大多嘔吐下痢或全身之筋肉與關節疼痛大概多為輕症狀惟流行感冒者往往呈重篤之病態療法惡寒發熱大多在三十七八度之間鼻鳴不塞寢時微汗食欲不變口不渴頭痛而項稍強大小無異咽喉不痛不咳脈浮弱舌無苔聽診打診無變化腹部無特別徵候者宜與桂枝湯惡寒發熱頭痛鼻塞咽喘鳴汗不出腰痛身體動時手足筋肉關節感痛口微渴衄血則頭痛減輕食欲大小便與平時無甚相異脈浮緊而有力舌無變化稍覺乾燥聽診上有響性腹部覺變異者與以麻黃湯發汗則愈桂枝湯證與麻黃湯證之鑑別要點在乎汗之有無脈之浮弱與浮緊葛根湯證之風邪為惡寒發熱頭痛鼻塞不出汗與麻黃湯證相同但患者多項背強急時感口渴若感冒初期腹痛下痢者多為本方證或黃芩湯證若尚有嘔吐症狀者則又不得不參照其他症狀以鑑別之究系葛根加半夏湯證乎抑小柴胡湯證乎又本方證之患者鮮有麻黃湯證之喘鳴焉葛根湯證之脈浮緊舌不大變聽診打診上無變化小柴胡湯證較諸桂枝湯證葛根湯證麻黃湯證更進一步此時不復惡寒發熱而變為往來寒熱食欲疲乏舌現白苔大便不規則或便祕或下痢咳則嘔吐噁心耳塞手足熱口渴此時易與五苓散證混淆宜十分鑑別凡小柴胡湯之證脈失浮之性質弦細或弦數有時近似於滑有時浮數脈狀無確定熱不與惡寒同時存在惡寒去則熱現熱去則惡寒來有時現所謂微熱或身熱而不全然惡寒非從他覺胸脅苦滿以證明而不能全然知曉小柴胡湯證更進一步則為大便祕結小便減量心下脅下如有物然不思食物脈較普通更沉一步舌現黃苔而乾燥口苦胸脅不苦滿心下堅在觸診上多覺胸脅下有抵抗壓重之感此種患者宜與大柴胡湯以通其大小便而後發汗自能輕快此外尚有麻黃附子細辛湯證凡生來虛弱冷性之人或老年人遭遇風邪有惡寒之感而體溫不升觸遇冷物如頭被雪而感冷痛食欲非特不變反較平時為盛不喜行走而多欲橫臥口不渴大小便無變化屢屢流出清水狀之透明鼻汁在桂枝湯證葛根湯證麻黃湯證等之鼻腔感熱分泌物多黏稠而在麻黃附子細辛湯證之病卻感冷而在不知不識間流出鼻汁脈多細沉或沉遲舌濕濡一切均熱狀少而寒狀多平素心下停氣水之人因冷性而易感風邪一犯風邪則因喘咳激而排泄多多之稀薄清冷鼻汁或泡沫性之痰沫若其脈浮細或浮弱或頭痛或輕熱者可與小青龍湯若煩躁而上氣者宜加石膏虛弱之婦女老人等在發病之初其邪已有一部分侵入少陽者柴胡桂枝湯之證也邪全入於少陽惡寒多而熱少小便不利口渴脈沉細或遲弱者柴胡桂枝幹薑湯之證也反之頭痛發熱甚身痛口渴煩躁脈浮緊者宜與大青龍湯以發汗乳兒犯風邪起鼻加答兒苦於鼻閉時麻黃湯與之有神效幼兒犯風邪伴以胃腸加答兒之症狀飲食與咳共吐或渴欲飲水飲即吐出或尿量減而起水瀉下痢者宜與五苓散五苓散服後尿量增加熱下降嘔吐下痢均止則身體即輕快矣備考雜病紀聞古書稱中風之風後世醫書稱感冒後世醫書之中風指偏枯半身不遂之病而言即今俗稱之中風傷寒論之中風即系傷寒之輕者最初惡寒發熱頭痛鼻洟人人所知其理與傷寒同邪甚輕故稀有陽明裡症而用大承氣湯者亦稀有少陰病而用附子人參者最初多服桂枝湯葛根湯之類以發散之其感冒之輕微者往往啜稀熱粥一碗覆以被而取汗或吞生薑酒或食豆腐湯大抵可愈故後世之醫亦有用荊防排毒十神湯參蘇飲芎芷香蘇散藿香正氣散之類大抵而愈考之藥性病理是等藥劑對於感冒多不適當其所以能愈者病輕則藥到自愈也又後世有勞役感冒病者此因腎虛之人或勞心之後外邪侵入之故宜在初時速速治之莫使延長時日致因種種變化而發為重症入手即宜發散如其邪難於急去時可用建中湯之類發表之過數日而熱仍不去時用補中益氣湯以清解之益氣湯者小柴胡湯之變方也第二章氣管枝炎原因本病為世上最頻繁之疾患不問老幼男女均有罹過之患而尤以羸弱貧血者為甚其病原由於身體組織之抵抗力弱其發生以天候不定之季節為多本病大體區別為二種一曰原發性一曰續發性前者為單獨之痰病後者起於其他諸病之續發續發性氣管枝炎一因於鄰接器官病之蔓延如咽頭喉頭氣管肺臟等疾病之蔓延一起於種種之急性傳染病如流行性感冒疫咳窒扶的里麻疹腸窒扶斯等之傳染本病之原因可分傳染性中毒性器械的血行性四種傳染性之病起於細菌之感染中毒性之病起於刺戟性瓦斯吸引或其他藥品器械的之病起於器械的刺戟如吸引塵埃等所謂職業的加答兒是也血行性之病起因於鬱血主因在心臟疾患及慢性呼吸器病之續發或因腹部疾患靜脈血循流於心臟起障礙之時症候氣管枝炎局處的症候中最緊要者厥惟刺芝叟兒之聽取此刺芝叟兒在分泌物之性質中有乾性與濕性二種氣管枝黏膜腫脹排泄黏稠之分泌物時則聞乾性刺芝叟兒此即乾性氣管枝炎若生液性而易移動之分泌物時則聞溫性刺芝叟兒即水泡音此即濕性氣管枝炎通例本病以乾性刺芝叟兒始以濕性刺芝叟兒終者為多咳嗽為本病必發之症候患者甚感痛夜間防其睡眠加之胸廓之筋肉緊張過大胸中劇痛咳嗽甚時每兼嘔吐或喀出血痰此外往往頸部及前額靜脈怒張頭部之靜脈鬱血以致眩暈頭重頭痛有時咳嗽甚劇小尿失禁高年婦女尤多但大便之失禁者甚少在頑固之咳嗽往往脫出直腸急性氣管枝炎初期喀痰之量極少質黏稠呈透明玻璃狀及黏液狀此名生痰在疾病近終末時喀痰之量增加但呈液性類於透明黏液性物質混以緑色不透明之膿塊此名熟痰炎症在廣泛之際呼吸迫促而困難脅間在吸息時陷沒副呼吸筋現收縮呼吸困難甚者皮膚及黏膜之紫藍色愈益顯明但伴以靜脈鬱血之症狀此際頸靜脈屢屢腫大現手指大之孛索物吸息時收縮呼息時充盈唇口腫脹而呈藍色眼球因眼球后靜脈之鬱血而突出於前方聲音斷續往往嘶嗄則因喉頭之鬱血之故氣管枝炎因經過之長短又可分別為急性及慢性二種急性氣管枝炎雖屢屢伴以發熱但稀有達於高熱度者咳嗽頻發呼吸迫促吐出喀痰一如前述若大氣管枝起炎症時往往胸骨下有感覺創傷之狀細小之氣管枝起炎症時此名毛細氣管枝炎在小兒及高年之人患之決不可以輕視因其每致併發氣管枝肺炎容易促起窒息也毛細氣管枝炎之特長在聽診上有小水泡性刺芝叟兒打診上無何種變化此病之不良轉歸為炭酸大多集積於血液中全身呈基阿拿遂呼吸頻數而困難意識朦朧並起全身之搐搦而死者甚多慢性氣管枝炎因喀痰之多少與性狀區別為下之數種甲乾性氣管枝炎此症頻發咳嗽雖經患者極努力之結果僅能稍稍喀出透明玻璃狀之黏稠痰乙單純性氣管枝漏此症出多量黏液膿狀之喀痰混以灰白緑色不透明之膿塊即球狀痰丙漿液性氣管枝漏此症喀痰極稀薄恰呈稀薄之橡皮溶液丁氣管枝漏膿此症喀痰呈膿性容易流動戊腐敗性氣管枝炎此症喀痰腐敗而放惡臭此症因慢性氣管枝炎而起氣管枝擴張氣管分泌物儲留於其擴張部分而起其喀痰與肺壞疽患類似所異者缺少肺壞疽片耳患者當呼吸氣時口臭特甚自己亦感居室汙毒摧人噁心遂致食思減損喀痰之量多者每日達五百立方仙米以上暫時喀痰放置可以分為三層最上層為泡沫含灰白之膿塊第二為灰白色之漿液層最下者為沉澱部此沉澱部中有類黃色或類褐色之一種塞子名奇脫里希氏塞子或曰菌性氣管枝塞子試壓之其硬度如糜粥狀且放極甚之惡息慢性氣管枝炎往往誘起肺胞性肺氣腫此際呼吸困難增劇右心室擴張肥大故若右心室之力萎弱時肺循環之範圍呈鬱血症狀初起時與以興奮劑雖能圖一時之恢復但其症狀反有進無已至於鬱血而死腐敗性氣管枝炎有起敗血症狀之變且有續發而成肺壞疽之虞療法急性氣管枝炎之初期不必用鎮咳祛痰之藥其治方可仿風邪表證用麻黃湯葛根湯大小青龍湯以去其表邪則咳自收而痰自散表證既去猶默默不思飲食而身熱者可運用小柴胡湯或小柴胡湯合橘皮竹茹湯腹筋之拘攣甚咳時覺痛者用四逆散大便祕脈沉實舌苔黃者用大柴胡湯口渴甚喀痰黏著咽喉難離者此因喀痰黏稠之故可多用石膏之配劑如越婢加半夏湯小青龍加石膏湯白虎加人參湯竹葉石膏湯之類咽乾口燥喀痰黏著咽喉難離或聲音嗄者用麥門冬湯麥門冬湯之目的在咽喉不利此方對於滑利潤澤去痰均有效石膏劑之目的在口舌乾燥而訴口渴喀痰黏稠此方有稀薄喀痰之效身無熱不見表徵而咳嗽不止者用苓甘五味姜辛湯及其加方病陷於陰位身上無熱惡寒脈沉微或沉遲弱者應用真武湯以上二方應用於老人氣管枝炎者為多咳嗽甚聲音嗄者用半夏厚朴湯麥門冬湯腐敗性氣管枝炎用桔梗湯排膿湯葦莖湯毛細氣管枝炎用還魂湯屢收偉效如用桔梗湯桔梗白散或瓜蒂散亦能一舉而收奇效余嘗用當歸芍藥散治一羸瘦而貧血甚之慢性氣管枝炎所謂虛勞狀之一婦人一月餘而根治此婦因最愛之幼兒染疫痢而亡終日悲悶漸次喘咳食氣不振夜不能眠體溫常在三十六度二三分以下聽診打診上認為肺浸潤之徵候為當歸芍藥散之症狀此外復見脈之沉遲弱直腹筋之攣急下腹腰部之冷感小便不利耳鳴頭重蓋均當歸芍藥散之證也備考類聚方廣義老人在秋冬之交咳嗽胸背脅腹攣急惡寒桂薑棗草黃辛附湯治之第三章氣管枝喘息喘息之義古今相同上氣而呼吸促迫之謂也原因氣管枝喘息者呼息的呼吸困難發作性出現之症也由於細小之氣管枝一時性之狹窄而起此氣管枝狹窄之原因有二一則細氣管枝之漏斗上移行之部分因周匝括約致起細氣管枝之痙攣一則由於氣管枝黏膜之腫脹前者名神經性氣管枝喘息又名氣管枝括約筋上分布之迷走神經之神經病後者名加答兒性氣管枝喘息有人云神經性氣管枝喘息由於橫膈膜之痙攣但徵諸經驗在喘息發作之際橫膈膜亦能營呼吸運動也本病往往為遺傳的疾患發生於其一家族中此外具有神經的素因之人亦屢罹之後天性神經質亦為其一種原因加答兒性氣管枝喘息僅基因於氣管枝黏膜之變化神經性氣管枝喘息可細別如次甲因延髓出血軟化灶腫瘍形成等刺戟迷走神經致招所謂中樞性氣管枝喘息此為無疑之事實乙中毒性氣管枝喘息此亦為中樞性氣管枝喘息之一起於鉛水銀等之中毒及尿毒症之際因其原因而有鉛毒性喘息汞毒性喘息尿毒性喘息等之名稱丙末梢性氣管枝喘息此由於頸部之腫瘍及淋巴腺之腫脹等刺戟迷走神經而起丁反射性氣管枝喘息此為最頻繁之症因其他臟器之疾患而起反射性之病者也概舉之如下一呼吸器疾患之際如鼻殼黏膜之病的腫脹鼻茸慢性鼻加答兒聲帶茸腫喉頭及氣管枝黏膜慢性加答兒而為本病之原因者此因人體嗅入薔薇槿花等香氣而發二消化器疾患之際如因咽頭茸腫扁桃腺肥大慢性咽頭加答兒便祕腸寄生蟲等致惹起本病者有時因攝取乾酪等食物而起三泌尿生殖器疾患亦招反射的本病如子宮之位置異常等致起本病者四心臟疾患時亦屢屢發作喘息然不可即誤認為心臟心喘息也症候氣管枝喘息有突然起於健康之時患者在夜間就褥之際不呈何等變狀逮夫半夜醒來忽然發作而不能預知發作之初感呼吸困難胸部放咿軋音及笛聲聲高者隔數室能聞之顏貌呈恐怖之狀前額被冷汗眼目因眼球后靜脈有鬱血故向外方突出口唇腫脹而帶藍色頸靜脈怒張體溫大抵無變化脈搏頻數其充盈僅微發作時呼吸困難者因其時吸息筋之力須大障礙氣道呼息筋弱動作困難也故此時副呼息筋甚需努力此際腹筋甚形板堅尤以直腹筋為甚又下部筋骨因損腹筋之收縮因向內方牽引發作之時間短則一二小時長則亙數十小時亦有每日反覆或發或止者發作之終每喀出少量之黏液膿痰療法喘息用麻黃劑如麻黃杏仁甘草石膏湯甘草麻黃湯越婢加半夏湯小青龍湯等麻黃配劑之藥方最能見效喘息用麻黃劑而不治者可用大柴胡湯大承氣湯半夏厚朴湯發作激烈時西醫注射阿獨里那林或賁篤棒其不能鎮靜漢醫用麻杏甘石湯亦不能抑制者此時余曾用甘草麻黃湯而頓挫其發作曾記有一某西醫之婦人苦喘息就余診治余先用甘草麻黃湯以鎮其發作其次與以半夏厚朴湯而痰咳不止乃與小青龍湯三日而愈統計一周之間病已全治此婦曾云服過麻黃有效成分之歐夫歐度林及其他西醫用之諸種藥劑迄未見效云齧嚼麻黃味覺辛而澀者為有用齧后辛而不澀者無效甘草麻黃湯證之病為喘鳴急迫非口渴或發汗之症狀若上半身被冷汗口渴而喘急強者當用麻杏甘石湯主治之眼球突出頸靜脈怒張流冷汗者應用越婢加半夏湯喘息而伴肺氣腫呼吸困難吐出泡沫狀之痰者多為小青龍湯證或用小青龍加膏湯麻黃湯所以治喘息發作時喘鳴促迫發作止即歸平靜者多用之平生不絶發作喘鳴者多為大柴胡湯大承氣湯木防己湯等證其原因為反射性氣管枝喘息因腹壓或胸壓高而起之喘鳴余曾用疏通劑或瀉下劑或利尿劑以減輕腹壓頗收意外之效茲舉實驗例二三如下實驗例一崎玉縣大里郡町女年五十八二三年前起喘息發作時苦不堪言不能橫臥身體肥滿腹部膨大便祕肩凝脈沉實最高血壓百七十無口渴頭痛食欲等之變化小便一日六七次因投與大承氣湯服藥第一日之夜發大汗翌日下痢八回自後喘急半減前後經二十天之服藥喘急消散身體輕快矣二芝田區村町原郎男年四十一數年前得喘息之病約在半年以前病狀日益增惡歷訪東都有名病院咸不能奏效僅在伊豆之溫泉遊覽中稍較輕快歸京復發夜間不得安眠身體稍肥滿血色佳良脈緊實舌有淡黃之苔微覺乾燥聽診時胸廓全部有笛聲呼吸音極微弱左右之胸脅苦滿直腹筋攣急胃內證明僅僅停水大便二日一行食欲少因與大柴胡湯夕間頓服甘草麻黃湯據患者語余飲大柴胡湯已經四十次左右不料此次飲後即能一夜安眠兩個月之後遂恢復健康云凡麻黃劑證輕快之患者用阿獨里那林或夫歐夫獨林等亦有效果即激劇發作時亦能稍稍抑制惟在上之治驗中所謂大承氣湯或大柴胡湯證時倘用阿獨里那林等注射則反起頭痛及其他之副作用為效亦少云心臟疾患而起之喘息多用木防己或木防己去石膏加茯苓芒硝湯備考本間棗軒之說從感冒起者用小青龍湯合麻杏甘石湯桂枝加厚朴杏子湯華蓋散酒客者用增損木防己湯虛陽上攻者蘇子降氣湯津液枯竭者與定喘湯滋陰降火湯動悸高而脈結代者針砂湯一時救急者有阿芙蓉液用三十五滴至五十滴病已難治而能節攝飲食並禁滋味膏粱則服增損木防己湯一年或二年可以全治定喘湯亦佳大冢按本間棗軒先生治療喘息之病極能自信推獎阿芙蓉液亦毫無謙遜之詞增損木防己湯者木防己湯中加紫蘇子桑白生薑也華蓋散者麻黃湯之桂枝以紫蘇子茯苓桑白陳皮代之也有持桂里之說哮以聲響名喘指氣息言喘息者痰之患也其源多來自毒幼時頭面瘡毒用外傅速愈之藥致變他病其例甚多故此病不可不從瘀毒之處下工夫此篇所載乃治之大法亦間録一二奇藥桂枝加厚朴杏子湯小青龍加石膏湯麻黃杏仁甘草石膏湯越婢加半夏湯千婚湯半夏皂肉甘草生薑喘不得臥外有寒熱之證者可用此方木防己湯平野屋某之內人患哮喘數年每發時用小青龍加石膏湯或麻杏甘石湯四五日而得安近來前症發動亦用前湯四五日不治氣促倍於前因仔細摸其腹心下痞堅宛然即投以木防己一二日間心下痞散諸症亦消蘇子降氣湯蘇子半夏陳皮厚朴前胡桂枝當歸甘草生薑大棗此方治痰喘氣急或小便不利而腫然在哮喘變為水腫者多難治真良湯茶實南星薄荷治小兒喘急有神驗續方射干麻黃湯哮吼發咳不解之兆者用此方有效厚朴麻黃湯以上二湯症候大略相似以主治藥品比較之前者為淺症此為深症此湯活用於水腫亦能見功喘四君子湯人參甘草茯苓陳皮厚朴砂仁蘇子桑皮當歸白朮沉香木香大棗生薑生脈散麥門冬人參五味子此方治哮喘之壞症虛候大冢曰華岡青山翁用麥門冬湯加沒食子以治喘息其取意正同六君子湯附子理中湯地豆兒鼴鼠霜十五歲以內之兒有效燒梟霜此係川島氏實驗而得相傳謂系三角法眼之力原南陽哮喘之說哮喘古但稱喘今別為二證仲景用桂枝加厚朴杏子湯之喘即哮喘也此證中有竹瀝用以祛痰其病多為長期病有年發三四次者有月月突發者有一二日或三四日一發者有夜發晝安者大概起於秋冬春夏之交時候不正之節或陰雨非時之冷氣其因系疝治疝宜通察腹候治喘亦然喘息兼胸痛者用栝蔞枳實湯上氣強者用蘇子降氣湯頸背強急者用葛根湯心下急迫者用甘草乾薑湯中兼用底野迦類聚方廣義哮喘症大抵一年一二發或五六發亦有每月一二發者其發也大抵由於外感與過食從外感來者用麻黃湯麻杏甘石湯大青龍湯等因過食或大便不利而發者先取陷胸丸紫丸等吐下之劑以疏蕩宿滯然後用對證之方焦窗雜話長病之喘喘而甚者每不治然始終用大柴胡湯加以灸治者可治長病患喘四逆散中加麥門冬石膏用之第四章肺炎甲加答兒性肺炎原因本病常為續發性疾患多繼發於小氣管枝炎故又稱氣管枝肺炎本病因氣管枝之炎症直接傳播於肺胞或氣管枝炎之病原菌於吸息時吸入肺胞之內而起小兒或高年者易罹此病此病亦續發於諸傳染病如麻疹百日咳流行感冒猩紅熱腸窒扶斯等病後往往有續發者亦有因唾液飲食等物竄入氣管枝內達於肺胞致誘起炎症者而在重症窒扶斯患者衰脫之癌腫患者咽下筋麻痹之症者亦往往見之凡一經患過加答兒性肺炎者愈後每不易再發症候肺臟上發見加答兒性殊為困難因其病灶狹小故理學的診查法亦難證明大多為氣管枝炎之症候所掩理學的診查法中以聽診為本病最重要之診斷法氣管枝肺炎往往能聽得氣管枝呼吸音及有響性之刺芝叟兒有時濁音亦因發炎灶多數融合現五仙米之廣二仙米之厚但此時若行輕打診不能得陽性之成績本症之濁音同時常帶鼓音體溫亦為本病診斷上緊要之症候基麻隨氏以為氣管枝炎之體溫不超過三十九度故凡超過三十九度之氣管枝炎持續數日者不可疑為本病也本病之體溫與纖維素性肺炎之體溫同樣無一定之熱型大多呈不正之弛張性恢復之時不現分利的症候肺臟中顯現瓦斯之交換障害呼吸促迫間歇不正呼息時呈呻吟之狀脅間於吸息時陷沒副呼吸筋收縮呈蒼身症大多伴咳嗽之頻發喀痰在小兒及高年者每多咽下故所見甚稀所喀之痰呈黏液膿狀外無特異之點此外在咳嗽及深呼吸之際屢屢胸痛乙纖維素性肺炎原因本病名克洛芝浦性肺炎為日常頻繁遭遇之傳染病發病素為夫倫克兒氏肺炎球菌但必伴以感冒狀之補助原因本病之傳染或直接或間接介行於人體壯年男子易罹一經犯病時有反覆之傾向本病為急性熱性傳染病之一有整然之經過二周內以分利性現象而結了本病之症候可大別為局處的變化與熱性全身症狀一熱性全身症狀起於肺炎菌製出之毒素與其他之急性傳染病所謂潛伏期者是也此期間不過一二時間亦有亙及二日至四日者本病在就業之際或睡眠之時俄然起戰栗尋來稽留性熱候達三十九度至四十度亦有達四十度之上者脈搏頻數而緊張強大多呈重搏性顏面潮紅舌苔生白色或灰白色眼目放光輝甚覺煩渴食欲全無尿量減少脾臟屢屢腫大如此全身症狀持續五日至七日高熱俄然發於皮膚更加發汗為分利性之消散比分利尤多起於夜間但有時亦有遷延性分利徐徐熱下者又在分利之前反見體溫上升惡寒戰栗及譫語者亦有名假性分利者此在真分利之前一時見其熱下者之謂也二局所的症候之中先現胸部患處之刺痛咳嗽及喀痰其他之症與炎症之時期相異今摘要如次灌溉期即初期中打診上呈鼓音輕打時稍有濁音此因肺臟組織之緊張力微弱且乏空氣之故也聽診上在吸息時有捻發性之刺芝叟兒喀痰多帶黏稠性呈玻璃狀血點及血線交見一到變肝期則聲音之振蕩高打診音變為強度之濁音如氣管枝呼吸音喀痰呈新鮮之鐵鏽色所謂銀鏽色痰者是也從變肝期移於融解期時喀痰呈枸櫞色或芙蘭色此時濁音漸次消失再呈肺胞性呼吸音及捻發性刺芝叟兒其後此刺芝叟兒隨胞內液性滲出物而完全消失本病患者之顏貌潮紅往往呈紫藍色肺之患部亦顯潮紅患者多仰臥而不能向疼痛之一面側臥呼吸困難促迫脈頻數患部之呼吸運動緩慢且有斷續性之肋膜炎性疼痛言語亦斷續不能出高聲此外又有各種之異常症如頓挫性肺炎一日性肺炎無熱性肺炎遷延性肺炎無力性肺炎等症療法加答兒性肺炎續發於氣管枝炎者亦甚多其方劑揭示於氣管枝炎條中可以參互選用此外有病邪從少陽更進入陽明者大承氣湯類適用之急性肺炎於發病初期已呈大青龍湯證者亦多症候條云熱而戰栗達四十度以上脈數而緊顏面潮紅舌白苔煩渴者大青龍湯證也本病病邪之轉變甚速從太陽忽而少陽從少陽忽而陽明或從太陽直接轉入陽明多為大柴胡湯白虎湯大小承氣湯調胃承氣湯或桃核承氣湯之證本病以身體強健之壯少遭遇者為多故呈陽實證是以初期以發汗劑為適應數日之後大抵呈瀉下劑之病狀余於昭和三年末至四年之春在土佐漁村開業之際該處青年罹本病者甚多除一日性肺炎無定型之外大抵發譫語潮熱或呈惡寒大便祕結妄行妄走初期與大青龍湯或大柴胡湯後用大承氣湯桃核承氣湯調胃承氣湯等亦多有用瀉下之方者其妄行妄走者以白虎湯則輕快亦有用桃核承氣湯而收意外效果者小兒肺炎用小青龍湯越婢加半夏湯小柴胡湯排膿湯等為最多老人多易陷於陰虛證多用附子配劑之方劑如真武湯桂枝加芍藥加麻黃附子細辛湯麻黃附子細辛湯等第五章肺壞疽肺壞疽當即古人所謂肺癇今人之肺膿瘍原因本病因肺臟組織死亡起腐敗性分解其死亡之起因由於釀膿性球菌侵入肺臟之內而尤以諸種之釀膿性葡萄狀球菌為甚罹此病者以十六歲至四十歲間之男子為多症候本病在診斷上所必要者為喀痰之性狀凡患此症者其所喀之痰臭氣特甚刺戟性如山椒大蒜或帶腐敗性之甘臭患者周圍臭氣瀰漫令人不耐對座喀痰之量一日不過百立方仙米亦有達千立方仙米者痰為稀薄之液呈黏液膿狀其膿為透明灰白之球塊將喀痰放置則可見其分為三層第一層汙穢灰白色之中富黏液膿狀之物質第二層灰白色稀薄之漿液最下層為顆粒狀垽渣此外混血色素時喀痰類黃赤色但此喀痰之性狀非本病所特有如腐敗性氣管枝炎之喀痰亦同一狀態所不同者本病之喀痰中必含有肺壞疽片其片為黑色或烟灰色細者如小點大者如拇指其數種種並無一定此為診斷上重要之點本病對於患者之體位亦宜注目當患者向患方下臥時其分泌液必瀦留於壞疽空洞內不達於氣管枝分歧部倘分泌物接觸於氣管枝分歧部時必忽然起劇繁之咳嗽肺之局處的變化有浸潤症狀與空洞症狀二種此種患者顏貌每呈腫白色體力衰弱大多伴以消耗性之體溫升騰食欲減少喀痰咽下之時容易引起下痢之傾向療法本病奏效之方有桔梗湯桔梗白散葦莖湯薏苡附子敗醬散凡初期發病體力未衰弱者用桔梗白散桔梗湯體力已衰弱者或虛弱者用葦莖湯已陷於陰證者用薏苡附子敗醬散其形空洞而達喀血之傾向者雖用桔梗配劑仍甚危險備考有持桂里之說桔梗湯此湯平易金匱所謂救肺癰始萌之方也但其主治與桔梗白散一字不易然方後云服之則吐膿血而白散條則云此方下後吐膿血有力一二字之間分別至此焉古今録驗桔梗湯桔梗白朮當歸地黃甘草敗醬薏苡仁桑白皮紫菀散紫菀知母貝母人參桔梗茯苓阿膠甘草五味子生薑以上二方均本於桔梗湯而組立之方劑也葦莖湯黃昏湯黃昏手掌大一片葦莖湯在金匱中引用千金今閲千金則未載此藥只與方名外臺中引古今録驗有葦莖湯之名而在黃昏湯方下有療肺癰一語葦莖湯主治亦療肺癰三字故今人互用此二方云黃昏者合歡木也可用其皮柴野栗山先生壯年病肺癰諸藥不效服黃昏湯而愈云桔梗白散葶藶大棗瀉肺湯肺癰丹方肺癰潰後排膿者熱服薏苡根搗汁本間棗軒肺癰之說初發惡寒發熱者先與小青龍湯發表之可愈已成膿時與肺癰湯則治此方為先師南陽翁之組方有百發百中之效此外葦莖湯桔梗之類亦能奏效肺癰湯者甘草桔梗貝母栝蔞根杏仁白芥子生薑七味也第六章肺氣腫原因本病起於諸種之呼吸障礙氣壓持續的亢進肺胞內但此種障礙在呼吸時則頻繁吸息時則稀本病多與諸種之咳嗽性疾患併發就中尤以與慢性氣管枝炎併發者為最多其他職業的努責作用如吹奏吟詠演講負重登山等之日久努力或喘息發作等亦為本病發作之原因症候胸廓擴張如洋瓶狀呼吸運動甚少打診上呈輕度之鼓音即紙匣音此因肺組織缺乏緊張之故聽診上肺胞音減弱心臟濁音部狹小或完全消失心音幽微本病進行時靜脈之鬱血著明起浮腫腹水鬱血肝尿利減少胃腸之鬱血加答兒等療法有肺氣腫之表證者用小青龍湯小青龍加石膏湯桂枝加厚朴杏仁湯無表證者用茯苓桂枝五味甘草湯苓桂五味姜辛湯或苓甘姜味辛夏仁湯苓甘姜味辛夏仁黃湯現浮腫者可別其陰陽用木防己湯木防己去石膏加茯苓芒硝湯桂薑棗草黃辛附湯八味丸等起鬱血肝而訴胸脅苦滿者可從證用大柴胡湯柴胡加芒硝湯或柴胡加龍骨牡蠣湯實驗例一患者六十四歲男性住所姓名等省略數年來苦肺氣腫脈浮稍緊大口渴舌白苔乾燥無滑澤咽喉不絶感乾燥喀痰黏著難離體動時呼吸促迫增進言語斷絶不能流暢上眼瞼下垂肺之下緣在三橫指經下打診呈鼓音聽診之呼吸音嗒嗒然證明胃中稍有停水胸脅不苦滿左右之直腹筋強攣急及於脅下腹部一體堅硬如板大便一日一行小便普通有食欲因與小青龍加石膏湯續服一年餘自覺的痛苦漸次消失目下猶在服藥中第七章肋膜炎原因本病起於細菌之發生至於因化學的刺戟物而起者則無其實例細菌之種類以釀膿性連鎖狀球菌及葡萄狀球菌為主有時亦有特殊的分裂菌存在於肋膜滲出物中如夫倫克兒氏肺炎球菌結核桿菌窒扶斯桿菌麻毒球菌普通大腸菌等此外如感冒外傷急性傳染病肋膜結核肋膜癌及消削性慢性病等亦為誘發本病之補助原因又有從鄰接管器波及肋膜而起本病者如肺炎肺結核肺壞疽心囊炎肋骨膜炎腹膜炎等但不能發見其誘因焉症候一乾性肋膜炎本病在聽診上有肋膜炎性摩擦音此摩擦音之音調極為不同存在時期亦有長短最精密之聽診其初不過證明有幽微之抓爬者有時亦能極容易聽得高調之爆鳴音有時音調硬固似摩擦靴革之音故名新革擦鳴音有時又聽得如掌握雪塊之音故名握雪音擦摩音旺盛時以手掌安置於胸部亦能觸知之肋膜炎性摩擦音直徑只一二仙米一小局部能聽得之但有擴及胸腔全産者此種摩擦音或小時消散或持續亙數周數月而在反覆行深呼吸時摩擦音即一時消失療法不問乾性濕性均以柴胡為主藥小柴胡湯大柴胡湯四逆散柴胡桂枝湯等應用最多高熱口渴舌苔白而乾燥者與白虎人參湯胸痛不堪者用甘草湯芍藥甘草湯四逆散小陷胸湯等能奏效余曾診察一婦人左肺下葉結核浸潤右側有濕性肋膜炎而兼麻痹性腳氣初診之日噁心嘔吐不論藥與食物入口即吐不能入胃其原因據患者語云西醫因欲從小便除肋膜之水與服利尿藥因此非常痛苦致起嘔吐云云余因告其此宜以鎮吐為先急之務遂與小半夏加茯苓湯翌日噁心嘔吐已愈食欲亦來驚喜之至不意翌日之夜排尿十數次其量實太多余越三日往診時濁音已減成為呼吸音示肋膜腔內之滲出物顯然減少於此可知小半加茯苓湯不必全為鎮吐從證運用能收意外之效更可見漢醫學之微妙而具哲理也肋膜炎性愈著亦用大柴胡湯四逆散或小柴胡湯苟永永服之可以漸次輕快濕性肋膜炎用柴胡加龍骨牡蠣湯去鉛丹亦能奏效實驗例一男年三十六年前罹濕性肋膜炎勉力醫治約經一年漸漸輕快自後健康至今不自知其有病也本年三月上旬耽於麻雀徹夜留戀次日右腋下至背部感輕微之鈍痛漸覺倦怠至四月二十三日覺頭痛與右胸部壓重氣分不勝檢溫三十七度五分以上此患者絶對信任余之技倆翌朝來院求治經診察為濕性肋膜炎脈弦而稍散微有舌苔食欲不振體動時有呼吸迫促之感覺胸肋有苦滿之證明大便一日一行直腹筋亦無攣急之證明投以小柴胡湯逾七日再診時自覺的痛苦已全消失滲出液亦已消散更七日再診時在聽診打診上均恢復常態服藥因此中止一日出釣於東京灣操舟中流遇強風以全力支持得慶登岸來院再訴胸痛診察時又非肋膜病矣經數日之休息即復健康云二女年三十去春罹肋膜炎已經一年診時脈搏九十六至有動悸胃內無停水左背下部呼吸音微弱聽診打診上無大變有食欲大便一日一行月經正調與以小柴胡湯合桂枝甘草湯服藥三周微熱與動悸均去漸次得復健康三男年二十三罹肋膜炎已經歷十閲月左胸壓迫之感不去他無所苦體溫平常有食欲亦動悸無汗大便三日一行心下部及脅下有抵抗之感直腹筋不攣急腹部一體緊張不軟弱與以小柴胡湯合小陷胸湯服藥三周左胸輕快知得全治之喜矣此患者所謂肋膜炎性愈著也短時日中能奏偉效實深自喜備考張氏醫通凡咳嗽面赤胸腹肋常熱惟手足時涼其脈洪者熱痰在膈上也小陷胸湯治之第八章肺結核肺結核性疾患在漢醫學上有種種病名如勞瘵骨蒸肺痿肺勞勞咳勞症痰勞蓐勞風勞傳疰勞疰傳尸勞花顏勞奔馬勞桃花蛙等原因本病之病原菌為結核桿菌但多數為釀膿球菌之混合傳染而尤以連鎖狀球菌為甚本病有一定之補助原因促其傳染大概如次一體格短矮方形之人罹肺勞者少身長纖弱蒼白胸廓長狹及其擴張少者即所謂勞瘵質體質之人易罹本病也此體質由於家族遺傳者也二空氣新鮮空氣之缺乏者易促本病之發生也如終日密閉於工場或生活於作業之室或呼吸塵埃之人以罹肺勞之傾向多耳三身體之抵抗力減弱之狀態營養不給長時間之疾患焦心苦慮憂鬱及精神興奮者亦易增傳染之危險四因肺疾患或其他之疾患亦容易為結核菌所傳染五年齡十七歲至三十歲之間多易罹本病之傾向本病之原因可分為原發性與續發性二種甲原發性肺勞者獨立的發於肺之自臟也可區別為如次之原因一空氣傳染空氣與肺結核菌同行吸入而起二遺傳往時所謂遺傳肺勞非直接遺傳病菌乃系遺傳體質即癆瘵之遺傳也三食物性肺結核此因攝取有結核菌之食物而起四交媾或接吻之傳染乙續發性肺癆者續發於其他臟器之結核也如因骨關節皮膚淋巴腺腸管喉頭泌尿生殖器結核之續發而起肺結核者是也而氣管枝淋巴腺之結核往往為肺結核之前驅尤堪注意此外因肋膜炎之續發而起者亦多雲症候肺結核確實之診定為證明喀痰中有結核菌此外彈力纖維存在於喀痰之中亦不可不注意此彈力纖維因本病而致肺組織崩壞而其抵抗之力比較強大故其他物質雖已潰滅而此彈力纖維猶存其形而出於喀痰中也是故喀痰之中彈力纖維愈見其多者可以測知肺組織之崩壞愈盛若肺已形成空洞時期則可以見貨幣狀痰球狀痰但此甚少亦有不吐出喀痰者此時則不得不診定其他之症候矣本病之經過有種種摘其要者如次一大多為潛進性徐徐而起發病之初期往往看過未能注意女子初發此病往往誤認為頑固之萎黃病其一例也此外如慢性喉頭加答兒慢性胃腸加答兒洛伊馬基斯性筋痛關節痛等皆為肺癆初期之一症也有時呈神經衰弱狀之症狀對於事物處處倦怠睡眠不安食欲不振此際倘輕忽於診察往往亦誤認為單系神經衰弱之症而不知實系本病之初期也亦有其初不能證明其原因其後漸次瘦削成潛進性之肺癆者其始早晚咳嗽初為乾性每咳嗽之後僅隔極短時間則復續發漸次咳出喀痰稍稍運動即覺心悸亢進呼吸迫促全身違和輕度發熱夜間尤甚時時盜汗妨礙睡眠其實亦系本病之初期也二反於上述之潛進症突然發病者亦有之即向來健康而就職業或因身體過勞或因過酒或罹感冒或以精神之大興奮俄然喀出血痰者是也但為數甚稀大抵在喀血之前肺上總有多少變化患者雖有自覺的症狀而不思就醫逮至突然喀血始驚而乞診者故此時往往發見肺已達中等度之浸潤者焉三初發期於甚重篤之熱性其全身症候則是頭痛高熱舌乾食思缺乏便通不整睡眠不安其狀酷似腸窒扶斯之初期當此之時診查胸廓往往不能認識為肺癆之徵候須經一定期間後始見出本病本病之理學的檢查先為望診觀其有無一種特有之體質即所謂癆瘵質者凡有此質之人大抵身長而高骨格細筋肉瘦削皮下脂肪組織僅微顏面蒼白豚管運動神經系統有容易興奮之傾向稍稍勞動或精神稍稍興奮即顏面潮紅皮膚亦呈蒼白色軟弱而且菲薄背部毛細管透映頰部呈限劃性潮紅此名為消耗性頰紅此消耗性頰紅往往現於肺之患部與患部之一面與他一方面比較之能顯然區別此因頸部交感神經壓迫而來故從頰部之望診亦可以推知病之犯肺也又患部方面之瞳孔開大亦可為診斷之一助其理由與前同此外毛髮顯著乾燥而且纖細背部纖毛茂生眼目放一種特有之光輝鞏膜呈帶青白色眼球往往凹陷眼瞼多印暗青色之暈翳胸廓異長之長而扁平前後直徑甚小脅間腔顯然之廣胸骨體與把柄部之結合部之角度向前方突出作成所謂罹特維芝克氏角心窩之季肋角大多成鋭角肩胛骨之內緣與胸廓之背面顯著離開其狀恰如天使之羽翼故名翼狀肩胛骨痹間廣者脅間筋羸弱之所致也肩胛骨離開者鋸齒狀筋軟弱之所致也此名癆瘵性胸廓亦曰麻痹胸如此胸廓其所營之呼吸運動甚少須在深吸息時方能呈健康時呼息時之觀肺結核之局處理學的徵候因病期之早晚而有千差萬別大略可分下之三時期一初期肺癆其徵候大多現於肺尖就中來自右面者最多此種患者之望診為呼吸時患部之運動遲徐打診上音之相差甚微往往難於聽取非熟練者不能聽診上呼吸音微呈弱或呈粗裂或呈不定性有時呈斷裂性呼吸音當咳嗽之時大多在瞬間呈無響性之小水泡音此所謂肺尖加答兒之徵也但亦有異於上述情形而起於肺之下葉之肺結核者此則於診查上不可不精密者也二確定的肺癆初期肺癆之局處加答兒症狀已判然者即可確定為肺癆其病狀更進一步即能明白其為肺癆疾病此時患者之肺組織陷於結核性浸潤疾病若在一面者在深呼吸時呼吸運動較諸健康之一面為緩慢呼氣延長屢現氣管枝音且能聽取得中等大或小之水泡音患部之聲音振蕩旺盛三完成期肺癆此時期肺已形成空洞故患部陷沒呼吸之際呼吸運動全無打診上帶鼓音一種特有之所見即打診的音響變換聽診上有高調之氣管音及屢發空甕性呼吸音吸氣往往鋭利有多數之煮沸性大水泡音或大水泡音與中水泡音交發體溫無變化大多上升朝晨正常或在正常以下薄暮達三十八度乃至四十度名曰消耗熱此熱在確定及完成期之間最顯著屢屢始於惡寒發熱終於發汗又有朝間與夕間之體溫相差一度乃至一度半者此種之熱名曰亞消耗熱此熱見於初期肺癆者為多亦有在消耗熱亞消耗熱之中間呈幾多不定型之熱候者此外有一日間最低三十六度六七分最高三十七度三四分者非用檢溫器不易明瞭因患者決不自訴熱感也此熱初期肺癆之際見之來於肺尖加答兒徵候之時機者為多此際患者大多神經過敏些細小事即易興奮且自己常有罹重篤病症之苦慮多數惱恨盜汗盜汗從夜半至天曉者為多因之妨及睡眠心神甚形困憊此外胃之障礙訴食欲不振噁心嘔吐肺癆之經過以上述弛張性熱型緩慢進行者為多但亦有一種名奔馬性肺癆者乃從急性之經過中伴以稽留熱患者多系衰弱者或併發症一經遭罹至多二周即死但如此者亦甚稀云併發症分限局性轉移性及衰憊性三種述之如下一限局性併發症中最頻繁者為喀血喀血有初期喀血與空洞喀血之分初期喀血對於生命尚少危險空洞喀血而血量較多則易致失血而死或血液填充於氣管惹起窒息而死又在本病之經過中所起之喀血其量之程度亦有種種限局性併發症有與纖維素性或漿液性脅膜炎併發者出血性脅膜炎則在脅膜結核時見之本病之患者五分之一必發氣胸而水氣胸尤多其滲出之物以漿液性為最多氣胸原因於劇甚之咳嗽身體之過勞亦有起於安靜之時者此因脅膜內皮之直下有乾酪性樣病灶穿通脅膜腔而起其穿通之部位大多起於肺上葉之下緣或肺中葉之上緣乳腺及腋窩之間此時患者突然覺劇烈之胸痛與呼吸困難但穿通則由漸漸而起者不伴顯著之痛苦二轉移性併發症發於諸多之臟器或起於含有結核菌之喀痰或起於結核菌從肺臟輸送至血管及淋巴管名為栓塞性者喉頭咽頭口腔黏膜及舌之結核性疾患大多因喀痰瀦留於該部致起結核傳染而來因喀痰誤咽犯及腸黏膜之淋巴濾胞故形成結核性潰瘍也血塞性續髮結核除前述器官之外尚有現於其他諸臟器者如腦膜泌尿生殖器腹膜等肺癆患者因結核性腦膜炎或全身粟粒結核而死者甚多雲三衰憊性併發症中厥為惡液質浮腫及衰憊性靜脈血塞此靜脈血塞每發於股靜脈內尤以左面股靜脈為多至其他諸種臟器中乃由起澱粉樣變性所致倘起腎臟之澱粉樣變性則下肢起強度之浮腫若腸黏膜起澱粉樣變性不能制止時則誘發下痢療法肺尖加答兒之時期中應用小柴胡湯及其加減方者最多貧血甚呈萎黃病狀之症狀者當歸芍藥散黃耆建中湯黃耆桂枝五物湯亦兼用之但黃耆建中湯若久用之反有病勢增惡之懼慢性喉頭加答兒之症狀從證可用半夏厚朴湯橘皮竹茹湯麥門冬湯等慢性腸加答兒之症狀除柴胡劑之外亦可用生薑瀉心湯甘草瀉心湯黃芩湯人參湯大建中湯等如患洛伊馬基斯性筋痛關節痛者應用柴胡桂枝湯四逆散或桂枝茯苓丸當歸芍藥散攣急狀之疼痛而激者可用一時權宜之計與黃耆建中湯或桂枝加芍藥湯余曾診一右肩背有強急之狀右腹直筋攣急而有疼痛之肺結核患者與以黃耆建中二帖而見效此不過一時權宜用之耳不宜永久服用也呈神經衰弱症之症狀中以胃阿篤尼症者為多屢屢證明胃內停水此種患者宜用茯苓飲胃內不停水易疲勞盜汗而兼不眠之苦者應用酸棗仁湯酸棗仁湯不限於結核余對於盜汗不眠者屢屢用此方而屢屢收奇效但有下痢之傾向者若與此方反增下痢也至於分量方面用時亦宜注意初期喀血者用瀉心湯黃連阿膠湯桃核承氣湯此外亦可從證選用麥門冬湯炙甘草湯苦參湯人參湯甘草乾薑湯柏葉湯等余曾診一病喀少量之血西醫用手術不能止診時發熱三十九度余咽乾枯燥有上氣之證與以麥門冬湯僅二日而血即止又凡發作性劇甚之咳嗽全身流冷汗手足厥冷喀痰有紅絲者與以甘草乾薑湯症狀可以速治喀血可參照症候篇喀血條往來寒熱者以用小柴胡為定則日暮時達三十八九度日晡亦有潮熱者應用小柴胡湯或柴胡去半夏加栝蔞湯其他如麥門冬湯苦參湯亦可用之身熱或煩熱者可用以上方劑及其加減方結核熱者脅膜炎性者用石膏配劑之方劑可奏效肺結核用石膏劑與梔子劑者比較為少云又初期喀血之際用白虎人參湯亦可奏效已經形成空洞而喀血者如用石膏劑則見效者甚稀盜汗除用酸棗仁湯之外可應用小柴胡湯及其加減方前輩醫家凡遇咳嗽之病往往配用桔梗或五味子配劑之方劑但桔梗往往妨害食欲而誘起噁心或招喀血濫用者不可不慎也病症進行中從柴胡劑應用麥門冬湯及炙甘草湯之時機為多凡頰上有限局性之潮紅赤舌或無苔乾燥咽喉部有枯燥之氣味腹部一體無力大便多而不通快軟便少日一二回有殘剩之意味感壓出之力不足者麥門冬湯證也以上證狀之外兼動悸強呼吸在淺表者甘草湯之證也以上二方證對於熱之高低血痰之有無可不必顧慮但二方證亦為陽虛證非陰虛證也凡有熱狀而無寒狀者用之實驗例本病為人人所忌故患者姓名從略下揭諸例均為西醫所難治者至於輕度之加答兒因無引例之必要故亦從略一男年三十數年前罹輕度之肺尖加答兒約在二個月前忽然惡寒戰栗發近四十度之高熱請附近醫家診斷之結果認為流行感冒與以發汗劑以圖下解不料高熱依然在三十九度以上經過十日猶為腸窒扶斯用烏伊達兒檢查反應為陰性經過十四五日始出血痰此時始診斷為肺炎開始用肺炎之注射與濕布然而血痰不止體溫依然加以一方漸次衰弱於是有人勸入本院乞治於余初診在昭和七年十月四日脈稍浮而底無力近脈不頻數體溫三十九三分脈搏八十二至無結核性疾患特有之速脈舌鮮紅中有干固狀態濕不足因之唾液黏著於舌致言語不能流暢喀痰多泡沫稍稍多量則出血痰右上葉微有小水泡音呼氣延長則右上葉發嗘咖聲腹部稍陷沒而少抵抗直腹筋左右均不攣急大便每日浣腸則通所下者為軟便每夜必盜汗食欲少余與以麥門冬湯翌日血痰止便自然出漸次口內濡全身有元氣十日之後體溫降至三十八度下漸次有食欲一個月之後降至三十七度六七分盜汗亦止但入於十二月三十七度五六分之熱不去咳嗽不止聽診上仍為小水泡音因在小柴胡湯中兼用橘皮竹茹湯前後七個月漸次體溫恢復常態咳嗽大半去體重增加漸漸能起步自行來院此時起下痢腰椎覺痛已屆肺癆去之時期其肛門起炎則用權宜處置投與黃芩加半夏生薑湯柴胡桂枝湯桂枝茯苓丸二女年二十四年前因肺結核病名而就醫約一年前訴腹痛與一日二三回之下痢醫者診斷為腸結核每一年中發一二次之大喀血發高熱平素則有微熱之程度在余初診昭和七年十月二十一日之前約二周間曾大喀血心臟衰弱浮腫高熱嘔吐醫師宣告絶望放棄投藥注射家人亦相圍以待其死鄰人有勸就本院乞治初診之日顏色帶熱氣之潮紅而不蒼白全身有輕度之浮腫脈搏為二十五至而細心悸亢進舌鮮紅色濕而不口渴右胸下部證明有輕濁音發見呼吸音極微弱之部分右腋下淋巴腺腫有一個腹部無軟弱之態胸脅苦滿在他覺的不能證明直腹筋攣急大便二三日一來喀血已止咳嗽殆無右背之肩胛間部發見水泡音胸部亦有水泡音月經已二個月不通余對於此患者先用麥門冬湯次轉方用柴胡去半夏加栝蔞湯服後尿利增加全身之浮腫去食欲有大便一日一行元氣次第出來但夕刻仍有近三十九度之熱顏面潮紅恰如酒醉之狀因從十一月十三日始兼用桂枝茯苓丸翌日下痢四次熱亦急下最高者三十七度二三分入於十二月最高三十六度五六分全身肥滿一見如健康之人於次年一月之下旬見月經自後每月整調此患者月經年無二三回月經來時必起大喀血然自每月見經血後喀血全無輕熱亦無反覺身體健旺矣月經不順與肺結核兩者有微妙之關係罹肺結核者在病狀進行中月經屢屢但反之月經逆顯出肺尖加答兒之症狀者用桂枝茯苓丸多有效又此種患者月經時期與推定每月交移者桃核承氣湯證也經血下則病自頓挫矣三此例已命迫旦夕從昭和七年一月至十一月十七日受西醫之投藥其後修得西式強健術在醫學之手中而漸次登上鬼籍入余手時已達結核末期諸症蜂起然幸能救起殊足自快其間經過復雜詳細記述殊覺不勝其煩茲述處方之異度並述當時之症狀七月一日投與黃耆建中湯二帖頓服此時患者訴臥不得臥呼吸咳嗽均不能右面從肩胛部至腰部疼痛晚汗甚右直腹筋攣縮只能行潛在呼吸言語斷續西醫診斷為心臟衰弱故注射噴篤棒因之更形危險自服黃耆建中湯二帖後呼吸已不感困難但同時咽乾口燥甚發熱越三十九度此亦黃耆建中湯之所致翌日投與麥門冬湯服後喀痰之排泄亦不感困難體溫亦往來於三十七度三十八度之間七月十六日訴不眠因兼用酸棗仁湯七月十八日心悸亢進呼吸迫促甚家人認為轉歸之期已屆鹹苦悶不堪招近鄰之醫師注射康浦兒是日與以熊膽末自後時時有此種情形發作每發作時與以熊膽末必奏效從此日起中止麥門冬湯而與炙甘草湯七月三十日兼用三物黃芩湯因有蓐瘡故也續服不滿一月蓐瘡大半快愈此時已在八月之末熱度降至三十七度三四分左右食欲亦有一般狀態頗呈平安之象九月十三日又投與黃耆建中湯因從七月一日起至現在胸背起痛故也九月二十日來一種無名狀之急迫性之咳嗽咳嗽與噦逆症狀有區別發作時全身厥冷流冷汗不能發言語亦不能飲水口腔內有微細之泡沫此日與甘草乾薑湯自後凡發作時投與甘草乾薑湯則輕快此患者左肺浸潤右肺上葉亦浸潤從九月上旬起病狀非常輕快或能得慶全功惜乎十一月十七日服藥中止又乞西醫治療以後則未知其如何結局也備考本間棗軒之說最初日夜咳嗽見感冒之狀者宜用小青龍湯合麻杏甘石湯長服之雖不能根治但可止一日之咳日日往來寒熱咳嗽氣急脈浮數見微痰之症狀者柴胡桂枝湯之證也胸脅掣痛起居中覺氣息之閉塞者柴胡枳桔湯為宜此種情形類似肺癰不可不熟察儒門事親中有勞行吐法之語查疲勞非吐劑之證惟胸痛甚者用吐酒石得效而此徑云吐法可知肺病實為最有趣味之病矣胸痛喘咳痰多者可用栝蔞枳實湯竹茹溫膽湯或在痛處貼發泡膏亦宜多出盜汗者柴胡桂枝幹薑湯可得奇驗血虛熱多出盜汗者與當歸六黃湯最初無寒熱而喀血者涼膈散為宜勞證已備而吐血者三黃湯加犀角犀角地黃湯柴胡四合湯之合方為宜長久不止者用斷紅飲花蕊石散阿芙蓉液之類潮熱盜汗咳嗽脈散等諸證備者選用緩痃湯解勞散蓁艽扶羸湯等治癆之良劑不過此三方耳鱉甲為治勞聖藥楊氏家藏方中治勞之方多有鱉甲組入之實驗患勞者多食鱉自能自愈蝦蟆亦可食用食蝦蟆可愈疳勞其效能甚著潮熱咳嗽聲嗄咽乾身體羸瘦津液枯竭者養肺湯之主證也清肺湯亦宜如前證而咽喉微痛吐白沫甚多時時不能離痰盂者加麥門冬湯或桔梗或合用瀉血散亦宜又用四陰煎甘露飲等亦宜疲勞甚而五心煩熱舌胎黑而乾燥衣被盡欲退者是極虛中似實之證所謂真寒假熱也竹葉石膏湯為宜亦可用滋陰降火湯久患勞而不欲飲食者補中益氣湯為宜氣血虛耗者人參養榮湯為宜大冢按以上揭內科祕録中虛勞勞瘵骨蒸編之說據今日諸家之議論虛勞即今日之肺結核余亦不贊成以虛勞與骨蒸勞瘵併為一談棗軒翁云勞之別名雖多古名虛勞金匱載其治法云云夫虛勞之虛文字上之通稱也若不別其病名如何將金匱之方劑運用於實際而不問其為虛勞肺勞同一視之不已矛盾矣乎柴胡枳桔湯者小柴胡湯方中去人參大棗加桔梗枳實栝蔞仁也瓜蔞枳實湯者當歸砂仁木香甘草梔子黃芩陳皮瓜蔞仁枳實茯苓貝母生薑竹瀝也竹茹溫膽湯者小柴胡湯合橘皮竹茹湯方中去黃芩大棗加茯苓香附子枳實黃連桔梗麥門冬也當歸六黃湯者當歸生地黃熟地黃黃柏黃芩黃耆黃連也涼膈散者大黃朴消甘草連翹山梔子黃芩薄荷桔梗也三黃湯者瀉心湯也犀角地黃湯者犀角生地黃芍藥牡丹皮也柴胡四物湯者小柴胡湯加地黃當歸芍藥川芎也斷紅飲者大麥地黃玫瑰花甘草也花蕊石散者花蕊石入於童便與酒或醋而飲之也緩痃湯者柴胡桂枝幹薑湯加鱉甲芍藥也解勞散者四逆散加鱉甲茯苓也秦艽扶羸湯者秦艽鱉甲人參當歸半夏柴苑甘草柴胡地骨烏梅大棗生薑也養肺湯者人參阿膠桔梗甘草五味子貝母杏仁茯苓桑白枳實大棗柴胡也清肺湯者桔梗茯苓陳皮桑白貝母當歸杏仁山梔子天門冬麥門冬五味子甘草黃芩大棗生薑也瀉白散者桑白地骨皮粳米甘草也四陰煎者生地黃麥門冬芍藥百合砂仁茯苓也甘露飲者枇杷葉熟地黃天門冬枳殼茵陳生地黃麥門冬石斛甘草黃芩也滋陰降火湯者當歸白朮熟地黃天門冬麥門冬生地黃陳皮黃柏知母甘草生薑大棗也補中益氣湯者黃耆甘草人參升麻柴胡橘皮當歸白朮也人參養榮湯者人參白朮茯苓甘草乾薑大棗當歸芍藥地黃桂枝黃耆遠志橘皮五味子也雜病紀聞勞咳之病因三焦之膜原年久損壞不表不里無上部亦無下部病在半表半裡少陽之部位故其藥之立意非疏通三焦不可以治三焦疏通之藥本草千七百餘種中僅有柴胡升麻之類數品病至重而藥至輕是為治勞咳之第一義傷寒論藏結條中舌上白胎滑者難治其理同也彼因寒邪不過表而入於裡時其舌白胎而滑邪不入胃陽氣不入於表也然則邪何處曰入於臟腑中入於胃則舌上現黑胎而乾燥病雖重然能般下劑可以攻擊而勝邪在表則可以發汗治之發汗吐下之藥中多大力猛駿之品病重者猶能施療治之道但入於臟腑或三焦者其力已不足難於當大敵故不得不用消化疏通之法凡勞咳而脈數潮紅盜汗咳嗽等之症醫家多常用小柴胡湯四逆散麻杏甘石湯麻黃升麻湯麥門冬湯竹葉石膏湯白虎加人參湯竹茹溫膽湯生脈散逍遙散益氣湯柴胡養榮湯清燥養榮湯人參養榮湯柴胡去半夏加瓜蔞湯四物湯之類所謂應勞咳脈症之方也此外脈症之方其奇驗者尚多雜見於傷寒金匱肘後方外臺千金以及近世單方彙編等等民間之草藥亦有合理者但不知其理而漫用奇方或高價之藥徒足害病人耳此尤不可不知者也第九章心臟瓣膜症原因後天性心臟瓣膜障礙為心臟疾患中之最頻繁者其症狀有種種總括之分為下之二種甲心臟瓣膜閉鎖不全乙心臟瓣膜孔狹窄此兩症屢屢併發於同一之瓣膜且大多不甚顯著不能辨其是甲是乙後天性心臟瓣膜障礙發於左心室瓣膜者最多尤其在僧帽瓣上屢屢見之本病之原因有種種其主要者為心內膜炎與動脈硬化症最頻者為來於心內膜炎之後而從急性傳染病來者亦多此中尤以急性關節洛伊馬基斯之經過中為甚此外瓣膜瘤腫瘍形成瓣膜破裂過度之心筋緊張等亦為本病之原因症候甲局處的心臟症候大動脈瓣閉鎖不全之主徵為舒張期的大動脈雜音左心室擴張肥大橈骨動脈上有速脈與硬脈本病患者在數年之間不訴痛苦其外之快活不異於常態此因左心室之筋肉鞏固容易調節血液之障礙而能保持血液循環之故自覺症為不快之心悸動體動則增劇與眩暈顏貌多蒼白色屢屢反覆衄血大動脈孔狹窄則起收縮期的大動脈雜音左心室擴張與肥大橈骨動脈上顯徐脈遲脈小脈顏面是蒼白色往往陷於腦貧血而致不省人事僧帽瓣之閉鎖不全則當左心室之收縮期中血液不能循流於大動脈管內一部向左心房內逆流此際左心房受容之血量非常之大一因肺靜脈血一因逆流之故致血液充盈左心房因之擴張而其壁菲薄但不顯者耳因肺靜脈及左心室兩方所來之血流相合於左心房內形成旋渦故聽診上現收縮期雜音其性平等且如吹鳴又因左心房之壁菲薄致收縮力乏而又容受肺靜脈及左心室所來之多量血液致起鬱血症狀此鬱血症狀延及肺靜脈之範圍達於肺毛細管及肺動脈遂致波及右心室於是右心室亦因鬱血而起擴張又欲努力抑制遂起肥大也右心室擴張在打診上心臟濁音部增大其右界超過胸骨左線此際第二肺動脈音旺盛胸骨體上起強盛之振顫但右心室之擴張與肥大在代價之機能盛時往往不見左心室因本病而努力血液在左心室收縮期中從左心室向左心房逆流在其舒張期時一面容受左心室正常之血液同時又容受逆流之血液於是多量之血液鬱積於左心室而起擴張矣又在收縮期中此多量之血液奔出之際血液不向大動脈內順流而向左心房逆流左心室又不得不努以輸送此血量故結局至招左心室之肥大本病在保持代價機能之間脈搏正常僧帽瓣孔狹窄之主徵為收縮期前雜音或舒張期的雜音並右心室之擴張與肥大此外則為心窩搏動心窩搏動之範圍甚為廣大本病在左心室舒張之際血液從左心房經僧帽瓣之狹孔向廣大之左心室逆奔形成旋渦至發舒張期的雜音此雜音通例能在心尖部顯然聽得右心室移動於前方之時在心尖部稍左上方可以著明但音調雖有高時而傳播於其他部分者則僅微亦不傳達於動脈瓣孔欲僅於左方之背部本症之雜音粗糙而不軟純呈轉輪狀或凹凸狀左心室之血液為狹窄之僧帽瓣孔所隔致肺靜脈肺毛細管肺動脈起鬱血狀態波及於右心室右心室因含容多量之血液而呈擴張打診上濁音界廣延於右方右界超過胸骨右緣而至左方橈骨動脈搏小而緊張力弱且多不正三尖瓣閉鎖不全之主要症候為三尖瓣孔之收縮期的雜音右心室之擴張肥大此陽性靜脈搏等陽性靜脈搏在診斷上殊有價值陽性靜脈搏者當收縮期間從右心室逆流於右心房之血液因心筋收縮之力不衰致入於兩大靜脈故現靜脈搏也橈骨動脈搏細者其緊張微弱也此外尚有三尖瓣孔狹窄肺動脈瓣閉鎖不全肺動脈瓣孔狹窄等因其稀有故省略乙全身靜脈鬱血心筋衰弱代價機障礙心瓣膜障礙者因心臟之擴張與肥大至一定之度而止則血液之循環適宜代價亦適當但心筋之力一有萎縮之時而不能適應於是代價機能亡失矣此之謂代價機障礙代價機一有障礙遂呈全身靜脈鬱血之症狀矣丙拴塞性症狀本病患者於代價機障礙之外又形成血拴屢屢陷於重篤血拴形成之特徵為俄然發生痛苦此血拴由於瓣膜之增殖物崩潰混於血液而入動脈管因輸送於遠隔之器官致作成拴塞也脾臟動脈形成血拴則當脾臟部發劇甚之疼痛起戰栗患者之顏貌變蒼白色甚苦悶伴以發熱嘔吐脾臟腫大壓之訴疼痛腎臟動脈之血拴亦誘發嘔吐戰栗及發熱訴激甚之腎臟痛屢屢漏血尿肝臟動脈之血拴甚稀其主要症狀為強度之黃疸急激之肝臟縮小腸間膜動脈中作血拴則俄然發腹部疼痛起腹膜炎排泄便血四肢動脈中作血拴則位於閉塞的動脈管部之末梢的肢部失脈搏而厥冷若副行循環之形成不充分時則該部起壞疽腦動脈之血拴起於左頸動脈之枝流者最多且常惹起奇兒皮斯氏窩動脈之閉塞此種患者多失神卒倒恰如腦出血發作之狀醒覺之後右側來偏癱多陷於失語症網動時之血拴則俄然起失明療法心悸動眩暈衄血顏面蒼白者用當歸芍藥散苓桂朮甘湯桂枝茯苓丸之類現鬱血症狀浮腫喘鳴訴尿不利心下部證明有痞堅者與以木防己湯肝臟肥大大小便不利者用大柴胡湯柴胡加芒硝湯之類又肝不肥大而訴胸脅苦滿大小便不利者亦應用前方或從證明苓桂朮甘湯桃核承氣湯桂枝茯苓丸當歸芍藥散之類或兼用或合方亦可此外柴胡加龍骨牡蠣湯可以去浮腫動悸神經過敏小便不利此際若胸脅苦滿或胸腹須動呼吸迫促者亦可用桂枝甘草龍骨牡蠣湯茯苓甘草湯之類參照症候與治方第八章第九章及動脈硬化症條第十章心囊炎原因本病為分裂菌侵入心囊內逞發炎作用時所起而誘助分裂菌傳染之誘因為一諸種之傳染就中如急性關節洛伊馬基斯或結核猩紅熱敗血症二寒冒外傷及消耗性疾患三鄰接器官之炎症四本病以外之心囊炎等症候本病之症候以局部之理學的變化為主全身症狀缺如或甚不定纖維素性心囊炎以心囊性摩擦音為主徵心囊摩擦音之特性為表在性其性帶爬抓狀在心囊搏動期大多斷續完全一致者甚稀心囊性摩擦音有時甚為顯著手掌可以觸知甚至患者自己能感觸其在胸腔之內云心囊性雜音大多限局於心囊濁音部出於此部之外者甚稀其音幽微用聽診器壓之方能聽得高調之音又患者之體位變化其音調亦變化若患者前屈則聽診時其音明瞭而調高濕性心囊炎者心囊內瀦留液體致心臟濁音部增大且其形變化也其病為心臟濁音部上下左右增大其左界超過心尖伸至外方常呈三角形其尖端向上方基底部位於下方因此心囊內之液重而下降超過心臟之邊緣瀦留於左右經過久液體之量增加時則心尖搏動漸次消失心音亦幽微矣上述本病有乾性濕性二種其症狀現時大多為液性滲出物瀦留於心囊內同時形成纖維性滲出物臨床的檢查之際能證明心臟濁音部增大同時有心囊性摩擦音但液性滲出物量多之時摩擦音不聞全身症狀體溫屢屢上升心臟部中訴苦悶壓迫之感又往往訴疼痛脈搏頻數而不正甚至失其緊張療法余對於本病治驗例之一十九歲之處女已於半年前罹本病入某醫院醫師云無相當之辦法各種用藥不效於是來本院求治主證為心臟部感苦悶壓迫脈搏頻數呼吸困難有食欲不口渴月經自發病之後為量至少尿量亦減少體溫無升降打診上心臟濁音部顯著增大觸診於左右之下顯然有胸脅苦滿之證明直腹筋左右均攣急以指壓於左腸骨窩之部分發見頗敏感之部分有縱之索條物長約三橫指徑闊不滿二橫指徑所謂桃核承氣湯之正面腹證聽診上不聞摩擦音心音達極微之程度舌有淡黃之苔見於根部脈沉細數而結代大便隔日一回形硬余以大柴胡湯合枳朮湯為主方兼用桃核承氣湯投後連服一周患者自覺的痛苦已輕快尿量非常增加胸脅苦滿輕減心臟濁音亦縮小脈搏之頻數漸去一個月之後自覺的呼吸迫促及其他之症狀完全消散此時全身現浮腫下肢尤甚於是時行一權宜之計投與木防己湯二周之後更續服前方於是月經恢復如常自覺的一切異常症亦全無矣第十一章脂肪心臟原因脂肪心臟來於肥胖者為多過食與運動不足亦屢為本病之誘因症候有脂肪心臟之患者心臟部訴狹窄壓迫之感常惱胸內苦悶又在輕度之身體運動及精神興奮之際心悸亢進呼吸迫促眩暈及一時性失神病勢進行則夜呼吸迫促打破好夢苦惱不可名狀所謂心臟性喘息也心臟濁音部增大尤以向右方為著疾病增惡則呈心臟衰弱之徵起全身之靜脈鬱血症狀而死療法脂肪心臟之患者大部分為實證如脈沉微而見陰虛證者用藥大抵失敗其實證可從證用大柴胡湯大小承氣湯木防己湯及其加去方桃核承氣湯大黃牡丹皮湯大小陷胸湯等第十二章食道炎及食道狹窄甲食道炎症狀臨床上殆不示何等之症候但或在咽下之際訴胸骨部之疼痛有時感灼熱有時呈咽下困難療法撰用梔子豉湯梔子乾薑湯生薑瀉心湯旋覆花代赭石湯小陷胸湯等飲酒甚豪之人往往感食道灼熱及咽下困難此際大抵可用梔子豉湯治之嘗有一十二歲之少年於正月中吃燒餅因吞食非常灼熱之一片致起食道炎咽下作痛與以梔子豉湯二日而全治若伴以吞酸嘈雜等胃之症狀時可用生薑瀉心湯旋覆花代赭石湯小陷胸湯等乙食道狹窄附食道癌症候有良性惡性二種良性者由於食道之慢性潰瘍藥品之腐蝕異物之誤咽及從食道外之壓迫而起如起於甲狀腺腫或動脈瘤等是也惡性見於食道癌之際本病狀態則咽下困難吐逆或食道之一定部感食品之介在等狹窄甚時僅得通流動食物癌腫時往往患部訴疼痛或壓迫回歸神經而起麻痹致來聲音之障礙此外陷於惡液質者衰弱日加者以及他部之癌腫者同此療法在食道癌之患者與以旋覆花代赭石湯可得非常良效之成績余曾診一五十八歲之男子往診時已呈衰弱漸漸不能起床之狀態主證為劍狀突起之下端感疼痛且覺咽下困難可成噫氣之狀便血已不止半年貧血甚有心悸亢進與息切時時吐出黏稠之黏液吐時食物往往隨之而出自投旋覆花代赭石湯之後翌日而疼痛去三日而血便止一月之後得在庭中散步矣目下僅有時感咽下困難別無他苦但後果已全治與否則將俟諸異日而知矣備考道友木村長久君對於西醫診斷為食道癌之症引用名古屋玄醫之利膈湯短時日中完全治愈利膈湯者半夏附子山梔子甘草生薑之方也楊氏家藏方中有二氣散之方二氣散者即傷寒論之梔子乾薑湯也此方之主治云二氣散者治陰陽痞結咽膈噎塞狀如梅核妨礙飲食久久不愈而翻胃者其病證實相當於今日之食道癌也第十三章胃加答兒一急性胃加答兒原因本病為日常頻繁之疾病其主要之原因為飲食不攝生也如過量之飲食冷熱失度之食餌咀嚼之不充分腐敗食物之攝收等均為本病之主要原因症候本病之症候中最主要者為食思缺乏與心下部感壓重膨滿患者頻頻欲食香氣高之鹽味或鹽味之食物口渴甚目擊食物心中已發生某種想像而噁心起矣此外為屢發嘔吐甚至有吐出膽汁者中等度之加答兒症則屢屢發噯氣吃逆排泄酸味之瓦斯此外酸性之胃內容物有時逆流於食道內胃部或食道下部起灼熱之感此之謂嘈雜局部之觸診覺胃部膨滿壓迫之發疼痛且往往訴該部之緊張感與壓迫感胃液中鹽酸缺如含有多量之黏液胃之運動力減弱食物久久停滯其內舌現舌苔放不快之口臭患者訴糊狀之味覺便通不正或祕結或下痢尿利殘少疾病之中等者不見全身症狀患者感全身倦憊訴輕度之頭痛體溫三十七度五分左右重症則全身感強度之倦怠頭痛眩暈發三十八度之熱二慢性胃加答兒原因本病之原因有種種約其要不過次之五項一食餌攝取之不長二不良之齒牙三濫用酒精吃煙過度四來胃之鬱血狀態後諸種之疾患五其他之胃疾患症候本病之症候與急性胃加答兒同但其狀不急激耳大多為食思缺乏但有時起極甚之善餓症且屢屢欲食有香氣之刺戟性食物口渴之來亦較諸急性症為稀舌多被灰白色或褐色之苔患者訴屢屢有糊狀或腐敗狀之味覺又屢屢放不快之臭氣唾液分泌往往亢進此外訴不快之噯氣厄逆嘈雜噯氣從胃中出瓦斯中有酸味之臭氣患者胃部訴膨滿緊張之感時時覺痛甚者起激烈之疼痛嘔吐亦較諸急性症為稀吐物放酸性反應之臟臭此與其謂為由來於鹽酸毋寧謂為來自乳酸飲酒之人屢屢在晨間惱嘔吐吐出唾液狀物質從望診上覺胃部膨滿壓之發疼痛亦有不少放輕度之振水音者胃之運動力減退因之食物久久停滯胃中胃黏膜之吸收作用亦緩徐便通不正大多祕結下痢者甚稀尿之量減而濃厚患者之營養狀態漸次減退若不與胃弛緩症併發者則保存營養之時間比較稍久尤其在飲酒之人因脂肪沉著外觀不甚羸瘦此外患者往往起精神之異狀嫌忌與他人談話思考力缺乏不欲就業自己對於生趣絶望強迫觀念屢屢襲來其他則頭痛頭部之搏動及頭內朦朧之感尤其屢屢有眩暈之苦惱此種苦惱特稱之曰冒性眩暈又或發心悸亢進心臟運動不正心窩苦悶狹心症或起喘息之發作療法不問急性慢性凡無食思心下症有壓重膨滿之感有嘔吐之傾向者與半夏瀉心湯吞酸嘈雜時用生薑瀉心湯噯氣甚時與旋覆花代赭石湯舌上現舌苔大多灰白色或淡黃色而放不快之口臭者撰用以上之方劑及甘草瀉心湯等發熱而訴全身倦怠者用小柴胡湯大柴胡湯瀉心湯承氣湯類飲酒之人早晨嘔吐者多用生薑瀉心湯小陷胸湯若振水音著明伴胃阿篤尼症或胃擴張之症狀者用茯苓澤瀉湯茯苓飲等起精神異常者從證用以上方劑之外並可用苓桂朮甘湯苓桂五味甘草湯半夏厚朴湯嘔吐激劇飲食物不能受入時先用小半夏湯小半夏加茯苓湯若宿食充滿胃中不下呈微微欲吐之狀時與瓜蒂散即可吐出若進食魚肉停滯胃中而不消化又不能吐出時與橘皮大黃朴消湯實驗例急性症容易治愈亦可引用症之治驗下舉之例曾登載於古醫道雜志茲再採録之一小石川表町某氏夫人年三十一數年來在慢性胃加答兒診斷之下歷訪帝都之病院荏苒光陰迄不能根治千思萬想思及漢法醫藥其夫嘗憶牛込區橫寺町有淺田氏因往訪之人云淺田氏早已物化其邸亦已化為灰燼近鄰只有德宗乃西醫非漢醫也惟逢阪下有漢醫但不甚知其技倆於是伴同夫人叩余寓居昭和七年八月十四日初診全身稍淡黃褐羸瘦脈沉舌根部有淡白之苔稍乾燥上腹部陷沒腹部一體有膨滿之感壓之訴鈍痛同時訴噁心食思殆無好冷飲頭重極大便三日一行尿量亦少胃部證明有輕度之振水音心悸眩暈之症狀無月經整調因投與半夏瀉心湯同年十月二十四日復診前投與半夏瀉心湯每日服之迄今從未有一日之間斷以上之症狀患全愈體重增加一如昔日二芝區新橋某男年四十三歲頭重多夢不眠心悸亢進感疲勞脅迫等之神經症狀於昭和八年二月十四日叩余門求治診其脈沉中帶弦舌為厚之白苔無食思胃部有壓重之感下腹有鈍痛大便不正胃中證明有振水音此君自訴在京帝國大學真鍋內科診治半年餘其間有黴毒之疑曾在槐氏反應器檢查之終為陰性目下就山下紅療院之治術頭痛稍稍輕快但其效果只見於當日終不能根治云余因與茯苓飲合半夏厚朴湯服後數日大便調整食思稍有頭部亦見爽快繼續服至同年七月十二日以上諸證得完全消散備考本間棗軒之說內科祕録傷食之條曰治法仲景之療法其毒在上焦者與瓜蒂散在下焦者用大承氣湯豫從先師南陽之遺法專用中正湯若毒深者投草兵丸備急丸紫丸之類先取其快利然後與以前方吐下之後右脅下急結者用柴胡湯為宜發黃者加茵陳湯傷食之後脾散而消化不良微微飲食便覺心下飽悶而無飢餓之感致出噫氣吞酸等者加味平胃散為宜中正湯者半夏朮藿香橘皮乾薑厚朴大黃黃連木香甘草也加味平胃散參看胃擴張條草兵者巴豆杏仁百草霜也即走馬湯加百草霜也有持桂里傷食之說傷食之治法只有吐下二法其中加以消導消化之意平胃散與枇杷葉湯之類消導之藥也行吐下之二道中從吐之變變而為下或行吐而仍不吐時則行下但決無從下而變為吐者若傷食而與下劑仍屬不下致煩悶極甚者用針灸尉法為宜尉法有種種凡腹內鳴噫氣或矢氣瀉下為始之疾患者尉法於回春中行姜尉之法即煎生薑之汁以尉之法也又日本有蔥尉之法即蔥之汁以尉之法也蔥尉姜尉俱有功效豫因節省麻煩用滾沸湯尉之亦收同一效果此等尉法不但可用於尋常之傷寒在霍亂時與以備急丸走馬湯之類而猶下所謂揮霍撩亂之際行此法亦可以助藥力之速下大凡傷食者已於吐瀉後發熱大渴引飲者宜與平胃散之類不可用解毒劑中之白虎湯或豬苓湯之類大冢曰如此情形之下豫等大抵運用小柴胡湯瓜蒂散鹽湯凡多食而不消化心腹堅滿而疼痛者可與鹽湯此方之成分每鹽一合入水三合先將藥鍋置於火上使熱氣通徹然後將鹽塗於鍋內乘熱投水煮之一二沸之後鋭意頓服以得吐為度若不吐則用手指探入喉中必吐出矣千金方云此法大有效果為俗人淺近之法鄙而不用者待死之道也凡逢此病即刻先用之為宜凡倉卒之間難於辨藥之時頓服極咸之鹽湯一盞其效較瓜蒂散為捷而甚方便云大承氣湯枳實大黃湯小承氣湯加檳榔甘草桂枝藿香湯桂枝藿香檳榔木香縮砂茱萸莪朮甘草傷食之症輕無吐下之必要者以不用此方為宜平胃散蒼朮厚朴陳皮甘草大棗生薑此方為消導之劑或可加莎草縮砂木香藿香之類倘水穀停滯可加神麯麥芽魚肉傷可加山楂子面類傷可加杏仁生冷瓜果傷可加桂枝乾薑附子之類按此方為宋代以後之新方然凡造詣古聖之方域與古方柴桂湯為用之廣堪稱伯仲此方之症食不消化心下痞塞者用之又吐下之後食毒未全盡者亦用之香砂六君子湯人參蒼朮茯苓甘草半夏橘皮香附子藿香砂仁大腹上腹有伏筋之狀筋通任脈者脾胃虛也此其人者必平生泄瀉下痢或不食或飲食過度者也宜調理脾胃其中有建中理中六君子之類此症切忌攻擊若誤攻擊則咽喉乾燥或渴諸症從此生矣養脾丸理中湯加茯苓麥芽縮砂大棗生薑附子理中湯理中湯加附子生來羸弱之人食毒未達內不吐下則痛者此時若用下劑痛反加劇與以此方則愈方可吐下而食毒去此活變之法也大冢曰此時與大建中湯則吐下屢屢輕快此為余之經驗四順湯四逆湯加人參四逆湯加豬膽汁湯吳茱萸湯良方吳茱萸湯吳茱萸木瓜食鹽以上四方為治霍亂即吐痢之劇者及霍亂轉筋之劑其詳細參照霍亂條人糞汁土漿同地漿也掘地作坎其中沃以水攪濁之待其澄清而飲之大豆濃煮汁以上三方治食諸菌之中毒悶亂欲死之方葛根黃連黃芩湯能解酒毒玉穗湯荊芥橘皮山楂子食鰹之類而中毒頭痛寒熱面紅腫或身生赤斑蓐麻疹者用此劑治之龍生丸石硫黃胡椒用以上二味糊為丸白湯送下每服五七粒此為魚村翁之試用方余亦屢屢試用甚有功效用此丸則吐可早第十四章胃潰瘍原因考本病之病理的原因有種種不同大凡健康之時胃組織之抵抗力強且血液有阿爾加里性反應能中和鹽酸胃黏膜上不起變化但一旦黏膜之一局處蒙侵害血行障礙鹽酸在該局部逞其作用以致胃組織之抵抗不足遂為本病幼兒罹本病者甚稀茲舉本病原因中之重要者如次一萎黃病及貧血屢屢為本病之一原因萎黃病者胃組織之抵抗力弱之故也由此而呈胃酸多之症又有血色素障礙而起之說二攝取過熱之食物亦為本病之誘因三胃部之外傷亦屢屢為本病之原因如打撲之傷強度之嘔吐多易起本病四傳染病尤以肺結核及黴毒最易發本病五從大火傷而來之本病此恐系赤血球之分解或血小板之拴塞或胃黏膜血管之閉塞而來六攝取有害食物之食餌亦促本病之發生例如澱粉性食物之攝取過度酒精之濫用等症候本病之症候中之最緊要者為胃出血起胃出血時大多吐血其吐出之物質呈褐赤色一部分混凝固之殘餘食物呈酸性反應其吐出之量有種種量微者患者無異常之經過量多者患者之顏面變蒼白色脈搏微弱呈重搏性心音幽微呈收縮期的雜音心室擴張此外有排泄蛋白尿下肢或顏面現輕度之浮腫又腦貧血之結果來眩暈耳鳴難聽黑視眼火閃發心悸亢進呼吸迫促人事不省等甚者起間代性痙攣遂至於死有時在胃出血之後起盲目其他在胃出血之次排泄黑色之糞便胃痛亦為本病重要症候之一大多來自發作性限局於一局所食物之後驟然而起而在攝取消化食物之後其痛尤甚觸診胃部在發作性疼痛部位訴限局之疼痛但本病之疼痛起於胃內容物之存在之時倘胃中完全空虛則潰瘍並不發痛僅胃部感覺有不快之鈍痛狀態胃痛之性狀亦有種種或如灼熱或如刺或如鑽又其痛雖限局於一局部但亦放散至胸部上膊脊部嘔吐亦屢屢頻發大多與胃痛之發作同起噯氣嘈雜亦為往往兼見之症候食欲大多無障礙但因恐怕攝取食物後起疼痛遂致嫌忌食物口渴增進舌呈滑澤之赤色療法胃出血者選用人參湯柏葉湯瀉心湯桃核承氣湯炙甘草湯參照吐血下血條本病患者於吐血之外大多嘔吐訴胃痛厚味之藥物胃中大多不能容受在嘔吐之時先用甘草湯或大半夏湯若嘔吐與胃出血同來舌呈赤色而滑澤胃部膨滿感輕度之胃痛吞酸嘈雜強者用旋覆花代赭石湯屢屢能奏偉效第十五章胃癌原因胃癌之原因今尚不明而胃黏膜之刺戟如慢性胃加答兒胃潰瘍濫用酒精等實為本病之誘因本病在癌腫之中約占半數尤在四十歲至七十歲間最易犯本病症候自覺的局所症候為癌腫之所在部其大之程度特異初期胃癌不過呈輕度之消化不良症狀即患者訴食欲不振稍進食物胃中即感膨滿壓重之苦惱發噯氣吐出之瓦斯放腐敗性之臭氣或食後嘔氣時時胃痛但痛之程度不及胃潰瘍之劇甚癌腫從幽門出來時胃部感痙攣性之蠕動殊覺不安嘔吐屢來吐出之物初期不過為不消化食物之殘片病勢進步則呈汙穢之暗赤色甚至放不快之臭氣腫腸顯然增大其時大之動脈管破裂致起大出血倏忽致死食欲隨病勢之進步而日益減但有時反食欲亢進大便多祕結但在末期反起頑固之下痢他覺的局所症狀初期中不呈特別之變狀病勢進步在望診上能望見菲薄之腹壁有限局性之隆起此即癌腫也當呼吸之時則上下動若胃之小彎上起癌腫則在吸息時季脅下顯然可見幽門癌則同時呈胃擴張其時見心窩部一體膨大胃之下界有弓狀現出於臍窩之上方或下方舌現灰白色或褐黃色之苔常乾燥有時完全無舌苔病勢進行則全身營養障礙漸次增進患者衰弱之度逐日增加皮膚呈蒼白色而乾燥皮膚之彈力減殺皮膚上生多數之小皺襞皮下脂肪組織亦瘦削筋肉之營養亦大損害呈所謂癌腫性惡液質之狀療法恩師湯本求真翁嘗於古醫道雜志上報告診斷南大曹博士之胃癌用小柴胡湯大建中湯當歸芍藥散之合方於短期間完全治愈余亦曾診斷南大曹博士之幽門癌始與茯苓澤瀉湯而胃擴張之症狀去後與旋覆花代赭石湯而一切自覺之症狀消失一個月餘體重增加此時患者口渴強有胃內停水之著明便祕尿量減少屢屢吐出飲食物呼吸訴迫促幽門部訴壓痛觸之有腫瘤余先考主訴胃痛嘔吐屢屢與半夏地榆二味之煎劑此法在藥物之厚重中卻不受容而愈且時時奏效備考左項引用內科祕録膈噎條之治法因當時之所謂膈噎與今日之胃癌或食道癌名稱雖異而實相同其間雖稍有差異然大體則同本間棗軒之說此固為不治之病藥餌當然亦不奏效但如其原因為癇及起於四十歲以前者百病之中往往能救二三名古屋玄醫之利膈湯在傷寒論梔子豉湯條中雲胸中窒者以此為本是主藥為梔子也先師枳園高階先生用利膈湯或梔子豉湯均有奇驗豫用半夏瀉心湯亦常收效但亦有不能全治暫苟延其命者豫雖常欲推究古方奏神驗而終不可得故後世有人逢到膈噎難症往往謹投古方堅守百中求一生之議者焉名古屋玄醫之利膈湯為半夏山梔子附子甘草生薑而枳園之利膈湯為茯苓半夏橘皮甘草蒼朮乾薑吳茱萸牡蠣生薑梔子識病捷法桃核承氣湯治噎膈與膈噎同積血有效錦囊祕録周揚後云余每借用代赭旋覆湯旋覆花代赭石湯治反胃噎食飲食後嘔吐之病氣逆不降者有神效第十六章胃擴張金匱要略云朝食暮吐暮食朝吐宿穀不化者名曰胃反胃反正與胃擴張相當又翻胃反胃之義與胃反同原因胃擴張者胃腔後天性擴大之症也常伴以胃內容物之蓄積與發酵其原因類別為下之五種一幽門狹窄二食物過大之充盈三胃壁之疾病四由於神經作用之胃筋纖維之衰弱五鄰接器官與胃愈著之時症候本病檢病方法中最簡便而正確者為用炭酸瓦斯膨脹胃之一法其法將酒石酸一茶匙以一盞盛之水溶解之將此咽下之後即用重炭酸那篤里烏麻一茶匙溶解於一盞之水中攝取之經過一二秒時胃部膨滿望診上既能見本病之存在而在打診上則發空氣枕狀之鼓音大彎達於臍下聽診上沿大彎能證明有小水泡性刺芝叟兒又患者當朝晨空腹時起立飲二杯或三杯之水則打診上見有胃弛緩症其濁音界每移動於下方胃擴張患者之胃之境界一般增大健康之人其大彎在臍上一橫指至二橫指之間有胃擴張病者則大彎達臍部以下甚至有達膀胱部者胃之左界達於左側前腋下線右界越右側副胸骨線而及於右方胃之小彎向下方沉下肉眼能目擊之胃之大彎雖達於臍下而側部之胃界則無異於常時者此非胃擴張乃胃下垂症也又胃部之境界左右上下均擴張而為先性之巨大者則不能認為胃擴張症本病用指頭衝擊患者胃部時證明有著明之振水音嘔吐不頻頻但一次吐出之量帶多量之強酸性更帶刺戟性之臊臭此外患者往往訴酸性之噯氣及吃逆嘈雜胃之運動微緩舌無苔多帶赤色屢屢訴煩渴尿量減大便多祕結療法茯苓澤瀉湯證最多其他如茯苓飲五苓散吳茱萸湯生薑瀉心湯等亦可用之實驗例一患者五十八歲男子二十九歲時罹脘疸入病院為生活者前後八年失去數個趾指漸次病苦自後罹胃擴張因氣候之變或飲食之消長依然不能全愈每年初夏時候病勢增惡屢屢併發腳氣病主證腹滿與呼吸迫促口渴甚舌白苔大便祕尿量亦少吐一日一二回其量頗多每次近一面盆吐後腹滿去呼吸平靜胃內著明停水噯氣腹中雷鳴耳鳴不絶低聲不聞腳力頗弱甚疲勞尿中證明有糖醫師云胃擴張中併發糖尿病之症也投與茯苓澤瀉湯患者不努力進藥稍稍輕快藥即暫停緩一二日再投藥荏苒二年近訴耳鳴尚有至其他症狀已大半消散矣備考本間棗軒之說反胃之症重者第一用減谷法少進飲食則脾胃雖衰弱尚能消化也又腹中不慣之食物珍奇之物消化較難故宜專食稀粥等易消化之物品多飲藥則起藥煩故一帖之藥宜於一日中分二次服之藥方先用生薑瀉心湯理中湯不效時用化食養脾湯香砂六君子湯加味平胃散若吐稀粥者可以上列諸方吐其有不納而微渴者用茯苓澤瀉湯五苓散小半夏加茯苓湯所謂香砂六君子湯者人參朮甘草半夏橘皮六君子香附子藿香縮砂也化食養脾湯者六君子中加砂仁神麯麥芽山楂子也加味平胃散者朮厚朴橘皮甘草神麯麥芽山楂子也時還讀我書續録苓桂甘棗湯治澼囊證胃擴張纍年不愈心下痛吐宿水者甚驗第十七章胃下垂及腸下垂症原因有先天性有後天性先天性者生來虛弱有細長之胸廓即上腹角之鋭角之強者或貧血性同時胃之運動力薄弱者為多後天性因分娩後之腹筋弛緩或腹內臟器起慢性之疾患而發本病單屬胃之下垂者甚稀往往同時伴以腹內其他臟器之沉降症候無一定之症候自覺的症狀中而最多者為便祕與神經性狀即頭重眩暈耳鳴心悸亢進不眠疲勞倦怠等胃部有壓重澎滿之感食氣不振噯氣嘈雜等症此因榮養障礙之故療法本病訴便祕者所謂陽實證之便祕非下劑之適應症卻先用收斂藥如芍藥或止瀉有效之黃芩以為配劑便通自佳又胃阿篤尼症同時來者用所謂溫藥自能便通本病之患者屢屢訴小便頻數苟大便變為整調則以上自覺的症狀自能漸次消散也本病常用之方劑為小柴胡湯半夏瀉心湯甘草瀉心湯生薑瀉心湯茯苓飲大建中湯等胃阿篤尼症併發者用胃阿篤尼症條所揭之方劑第十八章胃緊張力衰弱症胃阿篤尼症原因來自先天性與續發於其他之胃疾患症候自覺的症候感胃部膨滿者最多食欲雖有但稍稍攝取食量即有充滿之感此外感噯氣腹部無力頭重眩暈耳鳴他覺的症候證明胃部有振水音療法本病於診斷上重要之手段為患者之脈搏凡阿篤尼之病狀顯著者其脈散弱輕者脈亦較良故在切脈時已可預知胃內之有無停水矣阿篤尼症者胃內停水之症也本病在傷寒論為痰飲用溫藥以溫通之與溫藥以刺戟則胃之筋肉有緊張力胃內停水可以驅逐故從證宜用苓桂朮甘湯茯苓澤瀉湯吳茱萸湯茯苓飲大建中湯真武湯人參湯等第十九章胃酸過多症原因本症為日常屢屢遭遇之疾患二十四歲至四十歲之壯年罹之尤以男子為多誘因為精神之過勞或憂鬱等此外如慢性腸疾患膽汁分泌障礙生殖器障礙等反射的或過飲酒精吃煙過度多食香料等多易起本病症候本病通常發於徐徐自覺症為胃部感不快壓重吞酸嘈雜大多訴疼痛疼痛起於食後二三小時或空腹時攝取少量之食品則暫時緩和嘈雜與疼痛尤多起於攝取硬固之食品及野菜與失鹹味之強者殘渣之多者口內上升酸性液此外訴便祕口渴療法生薑瀉心湯旋覆花代赭石湯柴胡加龍骨牡蠣湯小陷胸湯等從選用之第二十章腸加答兒甲急性腸加答兒症候本病之症狀視所犯之局所炎症之廣狹而異大腸上起炎症則起下痢小腸上起炎症則不下痢又回腸與結腸同時冒者曰回結腸炎因回結腸炎而致腸管之運動旺盛腸內容物速速輸送於腸管內同時腸內容物因分解而發生之瓦斯蓄積於腸管內致腹部膨大成為鼓腸故起腸鳴此瓦斯之排泄即為甚臭之放屁在放屁之先大多腹痛下痢時屢屢伴裡急後重糞便呈褐色黃色緑色或灰色帶極稀薄之水性其臭氣亦強糞便中混黏液或血液下痢一日十數回或數十回患者訴全身倦憊增口渴壓其腹部則覺疼痛尿量減少直腸炎則便意頻數裡急後重排便時訴疼痛與肛門之灼熱乙慢性腸加答兒症候慢性炎症最常現之部分為回腸及結腸慢性回結腸加答兒便通多不整屢屢起便祕及下痢便中混多量之黏液此外訴腹鳴鼓腸腹痛等與急性症之情形同本病之經過中大多無熱但其營養顯然障礙筋肉瘦削形容枯槁又往往精神異常或訴眩暈心悸亢進等慢性直腸加答兒與急性之情形同亦訴裡急腹重大便往往失糞性以黏液為主有時挾血液療法急性大腸加答兒之初期與葛根湯發汗後大多頓挫習慣性每年起一二回大腸加答兒西醫用腸洗滌之手術最短期間亦非一個月以上不能全治若與葛根湯以發汗則數帖之藥即可氣振而全愈出汗能愈腸加答兒實屬不可思議此近人之語也其實非不可思議也漢醫往往用側面攻擊或背面攻擊之術以沖病敵之虛一舉而殲滅群魔與西醫之專用正衝突毫無奇策者不同中神琴溪曾用治一般風邪之藥之桂枝湯以愈腸加答兒淺見莫知其所以竟有認為迷信的行為者其中可以深長思也回結腸加答兒訴腹鳴鼓腸腹痛下痢者與甘草瀉心湯若腹痛強而下痢亦甚者用芩湯嘔之狀增加者與黃芩加半夏生薑湯若不裡急後重呈所謂水穀不分離之水瀉下痢者可用豬苓湯五苓散人參湯等腹痛裡急後重強便中有膿血示狂煩之狀者用桃核承氣湯裡急後重肛門感灼熱者用白頭翁湯虛甚者與白頭翁加甘草阿膠湯病久體力虛衰肛門不收大便流下者可用赤石脂禹餘糧湯桃花湯之類若脈沉微沉遲弱或浮虛而微惡寒不熱完穀下痢者與真武湯此外急性加答兒之際宿食殘留於體內者亦用大柴胡湯大承氣湯等參照下痢赤痢霍亂等條第二十一章盲腸炎漢醫之腸癰與西醫之盲腸炎相對原因本病大多俄然而起右腸骨窩上形成劇痛與急性之腫瘍其炎症單在盲腸者名盲腸炎在蟲樣突起上者名蟲樣突起炎又限局於盲腸及蟲樣突起之漿膜上者名盲腸周圍炎蟲樣突起炎者糞便堆積於蟲樣突起內而硬固形成所謂假性糞石刺戟該部之壁則其上起炎症及壞死但此炎症若傳播於鄰接腹膜則起盲腸周圍炎盲腸周圍炎最頻繁之原因為蟲樣突起炎此外如子宮周圍炎喇叭管炎卵巢炎等亦為此病之誘因盲腸炎之原因主在大便祕結者名滯糞性盲腸炎症候盲腸突起炎及盲腸周圍炎者右腸骨窩起突發性疼痛其甚時輕按之亦訴劇痛腹部大多膨滿包藏多量之瓦斯於腸管內屢屢右腸骨窩上起強度之膨隆觸診上初期腹壁一體緊張而強抵抗甚但右腸骨窩上無腫瘍之狀自覺的症候除上舉之外訴嘔吐噯氣嘈雜食氣消失增煩渴舌被淡黃白之苔至往往放口臭大便多祕結初期中排泄水樣便尿量減少其色暗赤熱度往往在三十九度至四十度本病之併發症如次一廣泛性急性腹膜炎此為最危險之症腹壁一體訴疼痛膨大脈細數體溫上升頻發嘔吐全身症狀漸次增惡二含氣性腹膜炎此症在蟲樣突起之穿孔上空氣與糞便均進入於腹腔內起強度之腹部膨滿劇甚之腹痛現肝脾濁音部之消失及全身虛脫症狀三利尿困難亦一併發症也此因盲腸周圍炎性傳播於機轉之膀胱漿膜而起四肋膜炎為本病之併發症者亦不少尤以右側肋膜炎為多此大多為漿液性其滲出物之吸收頗迅速五膿液穿漏亦為併發症之一其穿孔起於種種之方向如腸管穿孔泌尿器穿孔子宮穿孔或腹壁穿孔等滯糞性盲腸炎者在便祕之後俄然右骨窩發疼痛局部隆起如腫瘍狀壓之訴劇痛打診上呈與盲腸周圍炎性滲出物相異之濁音不帶鼓音此腫瘍不達於身體之中央部及肝臟下緣腹部因糞便之瀦留及多量瓦斯之發生致膨滿而且緊張無熱候即或有之亦僅微療法滯糞性盲腸炎可投鴉片馬非噴德撲之類以鎮靜蠕動此種病以外科的療法為正道且絶對的安全此係西醫之說但余等對於盲腸炎症以大黃牡丹皮湯為最多大黃牡丹皮湯之證為右腸骨窩上觸之有腫瘍其腫腸或自發痛或壓之痛腹壁一體緊張舌多白苔或黃苔乾燥訴口渴脈遲緊或洪數金匱要略云脈洪數已化膿不得不下故余於此時與大黃牡丹皮湯屢收大效次為薏苡附子敗醬散用此湯時必時間經過已長腹部已軟弱無抵抗強犯營養局部之腫瘍上軟而不熱脈細數微數一言以蔽之病勢陷於虛證時用之因此時忌下劑也此外亦可從證選用大柴胡湯桃核承氣湯桂枝茯苓丸大承氣湯厚朴七物湯等西醫對於輕症之盲腸炎不用手術而以冰囊貼於腹部往往有逾月不愈者余對於此種患者用大建中湯或當歸芍藥散屢收奇效此種之痛所謂弛緩症也大多因水毒停滯腸管故宜用溫藥以溫之古醫道雜志中曾有一文揭載茲録之如下輕症之盲腸炎荏苒不愈者投大建中湯而速治此漢醫所謂久寒陳久之水毒停滯於腸致盲腸部之附近發疝痛也在患處貼冰囊以冷卻之病勢惡化不治亦當然也戶冢町山口從七十日前得盲腸炎因系輕症故不用手術僅施以服藥及局部之冷卻法不料身體漸次衰弱食思全無大便祕結因乞余診治余與以大建中湯服藥約二日後之午前腹中大痛難堪即以電話請余余曰病近於治矣更囑連續服此藥後五日由其幼兒背負以來乞再用藥診後更命連服三天而病遂愈矣盲腸炎即用開腹術在盲腸上亦無何等變化卻如子宮附屬器之炎症此余等所屢屢聞之者也但若誤診之後則下腹痛便祕腹部膨滿等之症狀蜂起維用盡百方不能全治也凡有此症之人其所訴之症狀大抵相異而在施用手術之後其所感之苦惱其狀一也今之名醫多雲盲腸為有害無用之物系二十年三十年之經驗然則切除之何以又往往不能蘇其再生此點甚望吾醫家真挈而研究之也實驗例一曲町區下六番町郡司正一氏之母年五十八歲由近鄰之醫師斷定為盲腸炎除手術之外無良策於是求治於湯本先生由湯本先生病介紹於余初診昭和八年六月二十三日在發病後之四日脈滑而有力舌上有淡黃白苔乾燥訴口渴體溫三十八度五分觸於右腸骨窩上有手拳大之腫瘍有自發痛對於壓則過敏大便自病後未有一回食欲無亦不嘔吐投與大黃牡丹皮湯次日即二十四日下痢八次尿量增加二十五日下痢三次腫瘍軟自發痛苦體溫最高三十七度五分二十六日下痢二次體溫如尋常能離床七月四日起步來院診斷之下腫瘍及壓痛全無此患者服藥三日即能離床云二目黑區中根町旭丘小林某氏男年十八歲從道友權藤成章君之介紹於昭和八年六月二十九日招余是日天曉時訴腹痛體溫上升達三十九度有口渴煩躁之狀大便祕舌上有白苔而乾燥脈緊腹部一體有抵抗感右腸骨窩特為顯著投與大黃牡丹皮湯從是夜至翌日瀉下四行翌日熱降自發痛去服藥至七月二日計三天理應稍稍靜養乃此君不聽家人之勸告盤桓於友朋之家而不歸至七月十四日再發腹痛倍於前日注射噴篤捧二筒亦僅能鎮痛體溫近四十度脈洪大而緊再投與大黃牡丹皮湯翌日瀉下體溫亦降口渴煩躁減續服十日而全治三與上同日橫濱本木之林氏以至急電話乞余作盲腸炎之藥是日林氏在鄉里之祖母因盲腸炎危篤去電報告故林氏急電余也因告知將冬瓜子桃仁牡丹皮薏苡仁各別包之看其如何情形則用如何調合之法而與之其後二周林氏上京叩余門謂僅一帖之藥十四日間不通之大便快通危篤已免近日已在遊居之中也四嘗經淺田診療所施盲腸炎手術後手術孔經十年至今不愈右腳攣急起居不自由因之失業此日生活甚感困難妻子到處乞方聞餘名來乞余余於大黃牡丹皮湯合芍藥甘草湯中兼用伯州散投與之一個月未滿已得舍杖步行但此患者因無錢購藥苦不堪言以後即轉居田舍不知其消息云第二十二章腸疊積症本病可分麻痹性與痙攣性但前者多於後者症候本病之來起腹部劇甚之疼痛患者呻吟難堪起發作性疝痛性狀之疼痛疊積亦反覆達二十四小時至三十四小時大多伴以嘔吐大便稀薄如黏液狀屢屢挾血液肛門因括筋麻痹而撒開不絶漏出黏液樣血樣糞便又肛門牽引至內部致其周圍之皮膚滑澤腸疊積症之診斷為臍部或右腸骨窩上發見緊張之腫瘍此腫瘍為長圓形而呈蠟干狀表面平滑疾病之初期不甚疼痛此腫瘍有時稍稍變其位置而增大其廣袤此為本病之特徵有時一側之腸骨窩橫於他側又通腹壁能觸知腸不蠕動發病後二三日腸管內瀦留之瓦斯愈益顯著腹壁之緊張其度增劇故此時欲從腹壁觸知腫瘍甚屬困難本病中緊要之其他症候為患者全身之症狀即四肢厥冷眼球陷沒頰肉落鼻尖聳前額蒙冷汗眉間呈縱皺現恐怕之狀脈搏頻數且細小本病能喚起如下之危險症狀一吐糞症此症最為頻繁因便祕頑固放屁完全缺如致來嘔吐此嘔吐最初僅吐出胃內容物漸次於吐出物中含膽汁終至放糞臭之糞狀物二腹膜炎此症從疊積部起波及於全腹膜故腹部膨滿疼痛劇甚三腸穿孔四陷於壞死之腸脫落不能則止而起腸出血五腸管狹窄及腸管閉塞因腸管脫落部上有瘢痕組織故腸管顯然狹窄或來閉塞也療法本病忽然現重篤之症狀非初期也宜從證選用附子粳米湯大建中湯大烏頭煎烏頭湯赤丸之類一舉而可得效本病起時便祕者千萬不可用下劑如大柴胡湯大承氣湯大黃牡丹皮湯大陷胸等切不可用而宜用溫藥熱藥如附子乾薑類之配劑如前述之方余於鄉里開業時曾診一婦人初因子宮病施用開腹手術其後現常習性之腸疊積症狀診察時腹部極軟弱無何種抵抗胃腸弛緩有多量之停水余初亦用不少藥方結局使長服大建中合當歸芍藥散十二年後妊娠所生産兒極健旺云第二十三章腸寄生蟲病蛔蟲古書所載之蛔蟲即今日之蛔蟲此蟲類蚯蚓生鮮時帶赤黃色或帶灰黃色症候本病無自的特有之症狀或僅為局處的或為反射的神經症狀近來有主張本病有中毒之樣者蓋經幾多試驗的結果證明眼炎皮膚刺戟症狀為蛔蟲之中毒也屬於局處的症狀為腹痛腹鳴便通不整肛門部感瘙癢食欲缺乏嘔吐放不快之口臭等反射的症狀以神經性徵候為主如眩暈頭痛瞳孔散大痙攣麻痹舞蹈病癲癇聽神及視神之障礙等患者屢屢煩鼻腔內之瘙癢要用指尖搔爬此外呈貧血症甚羸瘦眼球陷沒健康之腸壁蒙蛔之損傷者所見甚稀但一旦形成團塊則往往閉塞腸管通常蛔蟲占居於小腸內倘一度竄入其他臟器即招危險今將其主要之症狀列舉如下一侵入輸膽道時則來鬱血性黃疸間亦來肝臟膿瘍二形成膽石之一原因即膽石中心發見蛔蟲三往往侵入胃中起該部之壓迫及疼痛四有時超過於胃及食道之上方入於咽頭內占居於聲帶之上部致睡眠時來窒息五或超過喉頭進入氣管枝喚起肺臟膿瘍及肺臟壞疽六有時進入鼻腔鼻淚管入內耳穿通鼓膜出於耳外時時欲以手指除之七罹潰瘍性變化腸黏膜因自己之頭部壓迫促進穿孔蟯蟲本病之診斷為發見蟯蟲盛其卵蟲在糞便之中卵蟲的發見比較的少蟯蟲之外形類乾酪蛆其後端呈絲狀症候局所的症候為腹鳴腹痛便通不整肛門上感瘙癢食思缺損口臭噁心嘔吐等神經症狀為頭痛眩暈瞳孔散大癲癇舞蹈病麻痹鼻腔煩癢等又夜間從肛門而出至翌朝發見於臥床有時超過會陰部侵入腔內及包皮下喚起白帶下龜頭炎等十二指腸蟲十二指腸蟲為圓柱狀雄蟲多呈白色長徑平均八三粍闊徑平均四六粍雌蟲呈淡黃色或褐赤色或赤色比之雄蟲長而且大占居於空腸回腸者居多症候本病之症候為貧血及貧血由來之症候其症候因此寄生蟲吸吮血液而起此種貧血通例自感染本病後五周至六周而起皮膚變蒼白色檢其血液赤血球之數比通常減去五分之一血色素暈然且顯然減少進於貧血之度時身體之諸機能降退患者略略動作即容易疲勞吸呼困難訴心悸亢進又容易發汗貧血達於極度時患者不能起坐起床之際即來眩暈耳鳴視野暗黑及失神心臟右側擴大所謂左心室之貧血性擴張聽診之時有收縮期的貧血性雜音內頸靜脈之球部有高調之獨樂音皮膚屢屢現浮腫外皮及黏膜往往來出血食思減退口渴增進有時來反理的食欲即非日常食物之物質如土塊壁土等亦所歡喜便通不正或祕結或下痢利尿大多增加體溫有時降至正常以下亦有時發熱患者訴腹部壓重膨滿及疼痛形似鼓腸條蟲條之種類甚多臨床上所必需認識者為有鉤條蟲無鉤條蟲廣節裂頭條蟲本蟲寄生於腸內人所不知須俟見節片或全蟲體發見於糞便之中始可知焉但蟲全體與糞便同排泄者頗稀須在熱性病之下痢及驅蟲療法之際方能見之症候本病全無自覺之症狀但亦有便通不整腹痛腹鳴腸內回旋之感覺唾液分泌過多口臭噯氣嘈雜噁心嘔吐善飢食欲全無羸瘦蒼白頭痛眩暈等療法蛔蟲可與鷓鴣菜腹痛甚者用大建中湯甘草粉蜜湯蛔厥者用烏梅丸參照藥方解釋篇烏梅丸條金匱要略云蛔蟲之腹痛時其脈洪大通例腹痛甚時脈沉緊或變弦蛔蟲痛時則洪大後藤艮山云凡痛者脈多緊弦然反洪大者蛔蟲之所為也患者腹痛如不明其原因可行今日糞便之檢查法如發見蛔蟲卵時必系蛔蟲之痛蟯蟲亦用鷓鴣菜湯又金匱要略載用雄黃薰方即用雄黃之末將瓦筒二枚對合之燃火於雄黃燒之即以其燒者向肛門薰之之法也較之今日西醫之用浣腸法者手續輕而效果著十二指腸蟲用大建中湯烏梅丸大建中湯加棐子貧血呼吸迫促動悸眩暈耳鳴等者從證用苓桂朮甘湯真武湯八味丸當歸芍藥散麥門冬湯炙甘草湯之類條蟲用大建中湯大建中湯加棐子吳茱萸湯之類或應用石榴根凡欲達驅蟲之目的者須於空腹時頓服為要備考本間棗軒之說蛔蟲之藥初用烏梅丸甘草粉蜜湯理中安蛔湯之類後世方劑雖多然其效莫能出鷓鴣菜之上鷓鴣菜一下諸證即脫然近年西洋舶來之搜猛希娜其藥性可強健脾胃對於下蛔蟲有奇效下略烏梅丸甘草粉蜜湯鷓鴣菜湯應用之目標不同鷓鴣菜有效之病其他未必有效反之烏梅丸甘草粉蜜湯亦然所謂理中安蛔湯者人參湯加烏梅花椒也和田東郭蛔蟲之症強熱不解者如白虎湯之石膏劑久久服之有效又附子劑之證應用附子而不效者可用烏梅丸大便不通者與鷓鴣菜湯第二十四章黃疸原因黃疸為肝臟及膽道疾患最頻繁之一症候其原因摘舉要項如下一膽道狹窄為最頻繁之原因二肝臟內性門脈管分歧部血壓顯然低下大多來門脈血塞之結果肝細胞形成之膽汁不順流於肝臟毛細管卻逆流於門脈管致惹起黃疸三橫隔膜之右半運動被障礙時則橫隔及肝臟之吸息的壓減退膽汁流出於腸管內之力微弱致膽汁鬱積於肝臟內性道而起本病因之右側橫隔膜起肋膜炎間起黃疸四膽汁之分泌過量充盈於腫道膽汁排除於腸管不充分時則其膽汁之部分與血液均移行於淋巴管致成黃疸此名膽汁分泌過多性黃疸由以上四原因所起之黃疸名器械性黃疸即鬱血性黃疸一名吸收性黃疸五此外又有瀰漫性或停留性黃疸者其通常為肝細胞從血色素形成膽汁膽道亦因此排出之作用形成病的狀態亡失排泄之作用膽汁不達於膽道瀰漫於淋巴管及血管惹起本病此原因之病之最頻繁者為膽道之閉塞此膽道閉塞之原因大體如次因胃腸加答兒而起者曰加答兒性黃疸此因十二指腸黏膜之腫脹輸尿管之開口部狹窄或閉塞或腸黏膜上形成黏液拴子殘留於輸膽管或輸膽管之黏膜與腸管黏膜均陷於炎症因腫脹而閉塞膽管異物閉塞膽道其最頻繁者為膽石亦有因肝臟奇斯篤馬或蛔蟲竄入輸膽管而致閉塞者但較少耳膽道之瘢痕性及癌腫性狹窄亦為本症之原因瘢痕性之狹窄基因於膽道黏膜之損傷而起膽石外部之壓亦為本病之原因其最多者為胃腸膵腎上之腫瘍遊走腎腹膜炎性滲出物肝臟動脈瘤子宮及卵巢腫大等又肛門部之淋巴腺上腫脹亦足致膽道之狹窄症候黃疸著明之症狀為皮膚及結膜之變黃此症狀因膽汁色素侵入血液在肝臟內吸收於直接血液但大多先入淋巴管後進入血液中皮膚黃疸者皮膚變黃色也此因膽汁色素之量循環於血液中致皮膚呈淡黃色或銅褐色或黃灰色如呈黃褐色時則名黑色黃疸皮膚菲薄且富於血管之部分呈黃疸最早故最早現黃疸之部分為顏面而尤以顳顬部前額部鼻唇溝及頤部為甚下腿等表皮較厚之處往往不顯黃疸之病尤以勞動者因日光變色之故者為甚皮膚黃疸初期僅由於膽汁色素致血漿變黃但疾病進化表皮細胞亦蒙膽汁色素之浸潤此膽汁色素呈褐色之顆粒以至於凝結沉著黏膜黃疸最著明於眼球結膜黃疸尿呈褐色或暗褐色間呈緑褐色振蕩之時作色之泡沫染於白紙白布亦呈黃色大便多祕大如團塊放腐敗性之臭氧糞便之色因腸管內膽汁流出之減少或消失致帶黃白色或灰白色甚者往往帶銀色或放光輝此層尤宜注意皮膚瘙癢亦為本病屢發之症往往搔破皮膚而不自知其癢尤以夜間為甚故往往睡眠不安亦起心悸遲徐及徐脈此外食思亡矣感覺苦味訴不眠及精神奮昂等舌有苔皮膚黏膜網膜出血療法黃疸之治劑大多使用黃疸色之藥劑與利水之劑及味淡如水之藥物共用此處自然妙理殊可驚而又甚有趣茵陳蒿湯茵陳五苓散枳實梔子大黃豉湯梔子桑皮湯大黃消石湯等黃疸治劑之定名也患黃疸者便多祕大便多堅硬已如前述故多用大黃之配劑本病尤以肝臟膽囊膽道等障礙者為多故多呈胸肋苦滿之狀所以多運用大柴胡湯小柴胡湯四逆散柴胡加芒硝湯之類此中尤以大柴胡湯合茵陳湯為余等使用之好方劑以上雖為黃疸之治劑治黃疸亦可兼治皮膚瘙癢且雖非黃疸而訴皮膚瘙癢者活用之亦可奏效備考本間棗軒之說初發微惡寒而不發熱但心下覺有痞鞕而不爽快飲食亦與平日無異在明窗之前觀其白睛黃如梔子之色小便亦呈黃色如梔子黃蘗之煎汁從白睛小便發黃漸漸變為胸部發黃而及於全身病勢步步進行漸覺心中懊惱右肋下急脹按之痛苦不堪默默不欲飲食或日暮微發潮熱或全身瘙癢發疹目眵亦黃唾液之色亦黃而苦擦破皮膚則出黃水汗亦黃色染衣不褪小便赤濁如皂莢汁大便大多如黑漆或灰白與平常之色迥異臭氣亦與平常之便不同病勢更進一步則右肋下硬腫如症癖積聚之狀其根核在肋內而向肋骨下行不能稍容指頭此時食思愈無或嘔吐或吐黑水或目昏身體羸瘦脈微沉面目及身體均呈極濃之黃色黧黑如煙薰皮膚枯燥而落黃屑小便益見不利全身現浮腫腹脹滿如鼓脹飲食不能藥亦不能飲而死死於黃疸者大多必現水腫不現者甚稀但亦有羸瘦而死者急黃大冢曰此殆今日急性黃色肝萎縮歟即急黃疸見於隋唐時代諸醫籍其候迅速疑急疫其實非也蓋本病因膽汁之通路卒然焮腫壅閉致膽汁逆流故其證卒然在一二小時中凡白睛胸肋及小便等齊變黃色心中懊惱肋下急脹煩熱身重譫語妄語恰如狂人口舌乾燥有煩渴引飲之狀脈浮緊為極甚之劇急症狀此證不論少壯老大俱難治愈尤為稀有之病就豫經歷僅有數人皆不得回春之術下略黃疸之病夜間不能認出即晝間黑暗之室亦不能認出須在明窗之下細細熟視方能瞭然疫之發黃先醫謂多從永臥床褥或病室幽暗而來余初甚疑其後實驗之下果然肋下有塊痞者肝膽閉塞之所致也吐黑水者大便呈黑色者膽汁腐敗之所致也大便灰色者放異樣之臭氧者膽汁注入之所致也故苟能將通路漸漸開通使膽汁回覆本路則小便之色自白而大便可復黃色矣今之診黃膽者大多重視小便之色以為心得而不重視大便之色按金匱中有大便之色正黑又有大便必黑云云用消石礬石之方後病從大小便去又曰小便正黃大便正黑正是候也二千年前已有查看大便之必要實不得不感昔賢之精神也中略黃疸之小便其泡沫染紙則黃者可服大黃黃芩黃連梔子黃蘗等則小便雖黃而泡沫則呈白色中略治法初發小便不利而發黃者茵陳五苓散為宜心下有痞鞕者與小柴胡湯加茵陳肋下急脹或鞕滿作塊癖者用大柴胡湯茵陳蒿湯黃疸之治藥中以將軍劑大黃劑之意為要藥用攻下之勢使閉塞自行開通若將軍之藥力不及時可與大黃消石湯若用下劑而猶不動者用吐方為宜視其證之緩急選用瓜蒂吐酒石吐根之類吐下二方交下猶無微效而塊癖愈大面目變為煙薰色之黑疸者正傳之當歸白朮散有神驗此方余家已歷傳八世得奇驗者多用諸藥而不效驗小便愈不通利心腹脹滿全身浮腫不思飲食或乾嘔或飲食後吐黑水者茯苓飲加茵陳為宜亦可用加減胃苓湯分消湯回春茵陳散等急黃髮熱而有疫之樣者麻黃五味湯為宜狂躁者與大青龍湯肋下鞕滿或舌上有黃苔者用茵陳蒿湯大黃消石湯三黃湯加茵陳當歸白朮散者白朮茯苓當歸黃芩茵陳前胡枳實杏仁甘草半夏大棗生薑也加減胃苓散者豬苓陳皮赤茯苓澤瀉白朮蒼朮甘草神麯厚朴木瓜檳榔腹皮香附子山楂子縮砂燈心生薑也分消湯者蒼朮茯苓橘皮厚朴枳實豬苓澤瀉香附子大腹皮縮砂木香燈心草生薑也回春茵陳散者茵陳梔子茯苓豬苓澤瀉蒼朮枳實黃連厚朴滑石也麻黃五味湯者麻黃葛根石膏生薑茵陳也有持桂里之說黃疸之病從鬱熱而生猶之米入曲室以火蒸之致米成黃色之曲也故治之病時應禁酒餅油膩魚鳥一切厚味食之於服藥終無益黃疸之色變黑如煙塵小便如膏腹脹飲食太少者皆死候也桂枝加黃耆湯黃家以通大小便為大法脈浮時先發汗但此方以陽浮陰弱之症為宜如浮緊洪數之類則用許仁則療急黃之方療急黃之方為麻黃葛根石膏生薑茵陳麻黃連翹赤小豆湯麻黃連翹赤小豆湯本有八味治瘀熱在裡發黃之方喻氏將此改竄為瘀熱在表之方亦唯三味用麻黃連翹赤小豆殊為合理茵陳蒿湯發黃之病古來以茵陳為專藥但專用茵陳一味往往不愈凡欲治疸以先去里瘀熱為本其次利小便又其次治黃則大熱解而黃退梔子利小便茵陳治黃三味相次效用庶可全共茵陳五苓散古訓黃家宜利其小便此方平淡為近世醫家通用之方但五苓散非小便不利者無效茵陳蒿湯大黃消石湯亦小便不利症之治藥也但此二方以腹滿為主小便不利為客梔子蘗皮湯蒸蒸之發熱非翕翕之發熱者專以此藥為解熱之劑梔子大黃湯此條治酒疸但亦不必限於酒疸凡諸疸心中懊惱或熱痛之症者皆可用之大黃消石湯此為裡實之症凡腹滿大而堅小便不利便色帶赤裡熱甚明之重症用之小柴胡湯大柴胡湯黃疸之腹痛而嘔者輕則用小柴胡湯重則用大柴胡湯黃家不嘔痛胸肋妨脹者用此湯甚宜屢試屢效小建中湯黃疸或小便自利腹中急痛等不拘男女用小建中湯均宜腎氣丸服分利之藥而黃不退口淡四肢軟弱憎寒發熱小便渾濁者用此方甚宜因專分利則脾胃敗必至腎絶而死也茵陳四逆湯大冢曰此方非古方茵陳附子乾薑炙甘草也發黃之治法盡詳於傷寒金匱唯陰黃一症仲景之方論亡佚千古以來唯王好古有茵陳四逆之論以補仲景之闕曰盡其微妙但豫尚以為此症實甘草乾姜附子足矣豬膏發煎豬膏於黃為不可缺乏要品醫宗金鑑云余友駱天遊病黃腹大如鼓百藥妄效用豬膏四兩發灰四兩一劑而愈外臺中引肘後云黃疸者一身面目悉黃如橘柚得熱以外冷迫之熱因留於胃中而生黃衣療治之方用豬脂一升一味煎成溫熱時盡服之一日三次燥尿當下療黃疸方生小麥苗搗絞取汁飲六七合晝夜三四飲三四日便愈生小麥苗者小麥之蘗芽也水煎用之亦可此外有從石菖根莽草二味之方絳礬丸絳礬厚朴橘皮三稜莪朮黃連苦辛術甘草水莎用醋糊為丸順氣和中湯茯苓飲之加減方人參養榮湯理中加茯苓湯亦可選用外臺祕要方集驗之大黃散同瀉心湯療黃疸之身體面目之皆黃者有效第二十五章加答兒性膽管炎及膽囊炎原因膽道加答兒為甚頻繁之疾患其原因可分類如次一胃及十二指腸加答兒為最頻繁之原因因該部之炎症存在於輸膽及其深部波及於膽管故也二急性或慢性傳染病之後有時亦發本病如纖維素性肺炎腸窒扶斯丹毒咽頭窒扶的里黴毒之際發本病是也三獨立之傳染四中毒亦為本病之一原因尤以燐中毒為主要五膽道之鬱血亦一原因尤以慢性心臟疾患及呼吸器諸病即所謂鬱血性加答兒者為多六月經與本病之發生亦有關係即婦人在月經來時或月經之前膽道上來加答兒性變化是也七膽石之形成亦能誘起膽道之加答兒八肝臟疾患亦為本病之一原因症候本病之症候由於膽汁之鬱積而來者曰吸收性黃疸由於膽道黏膜之腫脹及黏膜塞子而來者曰加答兒性黃疸診斷上所必要者為黃疸之原因既往症及肝臟之診查亦屬必要大多踵食餌不攝生噁心嘔吐便祕或下痢等之前驅症呈胃十二指腸加答兒之症狀原發傳染性膽道加答兒其全身之症狀顯著肝臟及脾臟漸著增大往往來膽血症而至於死加答兒性黃疸之持續及過經因原因而異如為胃十二指腸性黃疸則一二周間即可治愈倘與不治之肝臟疾患併發者雖不至死然亦不能消失療法茵陳蒿湯梔子豉湯類大柴胡湯等均可選用詳細情形參照黃疸條第二十六章膽石症原因不明女子為多四十歲以上之女子罹者尤多症候本病有時全無疾苦此之謂潛在性膽石症但大多誘起膽石疝膽石疝之起起於膽石從膽囊而出強通過於膽管之時此際膽石嵌頓於膽管致起膽汁之鬱積及疼痛但膽石從肝內膽管轉移於膽時則膽石疝不起倘膽管從肝臟內至腸漸次增其口徑則膽汁之鬱積亦不來膽石症之主徵為疼痛有時只限局於膽囊部即右直腹筋外緣之右季脅下接觸之部位大多放散於心窩右側肩胛部及右腕等其他之體部疼痛之發作性度增加則患者叫喊不絶或呻吟不已顏貌頻促呈恐怕之狀前額被冷汗有時甚至神識亡失全身筋肉起間代性之痙攣又反射作用上往往伴戰栗或誘起嘔吐體溫常升騰黃疸為本病緊要之一症候發病後平均經過三日始現膽石疝長短之持續不一短者一二小時長則亙及數周期間長者往往訴疼痛倘時時激增則來衰脫症狀療法余對於此病常用柴胡湯加石膏而奏效有時於大柴胡湯或大柴胡加茵陳山梔子中兼用白虎湯實驗例一往年餘隨湯本先生自晚至夜候診於日本橋區濱町之更生醫院所長平石貞市博士以蛔蟲之研究而得學位者也平石博士同時又兼營優生病院適優生病院中來一膽石症之男子平石博士本以利翁法為其特殊伎倆不料施行無效每日發疝痛狀之疼痛漢法無相當之藥一日院長偶談及此事湯本先生因作大柴胡湯合大黃牡丹皮湯加石膏送至病院服藥後二日發作大輕減服藥四日痛苦全去倫篤擎寫真上膽石之大比入院時減去其半云二澱橋三丁目之松本氏近十數年來心窩部感發作性之劇痛某醫師謂為胃痙攣某醫師謂為膽石疝本年五月起強度之發作無鎮靜之模樣因入日比谷胃腸病院院中斷為膽石疝治療不效轉入芝之鈴木胃腸病院亦診斷為膽石疝發作時每反覆施行利翁亦不輕快身體漸次衰弱進院乞治於余初診在腹診上顯然右直腹筋痙攣膽囊部住有抵抗鈍重之感與以大柴胡湯服藥二次發作不來已全治矣三此嘗揭載於古醫道雜志中板橘區志村町板橘氏之母年六十五個月之前不能離床時時心下部劇痛醫云胃痙攣反覆注射注射後噁心嘔吐強身體頓覺衰弱脈沉緊稍似黃疸大便多祕三四日一行舌上有黃苔而不幹燥右胸下有抵抗壓痛余告以此膽石疝痛也與四逆散一帖服後發作襲氣不堪劇痛發熱達四十度更乞余往診診得膽囊部上有拇指大之膨隆甚疼痛舌苔白而乾燥煩渴引飲與白虎加人參湯翌日熱收疼痛去更於大柴胡湯中兼用白虎加人參湯發作不再來服藥一個月即能從事家事與平生無異膽石疝痛腎結石等中大抵現石膏之證先輩已言之矣余對於膽石疝痛用大柴胡湯中兼白虎人參湯屢屢著效但因發作猝然故對於漢法醫之不甚信仰者往往中止服藥轉乞西醫甚至惡罵漢醫者此不僅膽石疝痛為然凡慢性疼痛性之疾患一旦增痛往往見之第二十七章結核性腹膜炎原因結核性腹膜炎為慢性腹膜炎中最頻繁之疾患常有續發的症狀此外亦有續發於臟器之結核性疾患者其中漿液膜之結核性炎症之一分症來者甚多亦多有與結核性肋膜炎心囊炎及結核性肋膜炎併發者此外與腸結核或腹部淋巴腺結核屢有關係亦有現肺癆或全身粟粒結核之併發症者婦人泌尿生殖器尤以喇叭管卵巢及其他子宮附屬物之結核為本病之起點症候本病往往形成滲出物其液大多為漿液性血性或鈍膿性敗膿性含脂性者甚稀患者大多徐徐增加腹圍其時全無痛性或感僅微之刺摘腹部膨滿愈甚胸內狹迫及呼吸困難愈愈增加此時發熱甚不定或全不發熱或升降不正常常至極低之度診其腹部純觸知腹腔內滲出物之波動患者於仰臥時可得之打診上前腹壁證明有高調之鼓音側腹壁有濁音但若側臥轉位時其上側腹壁則變為高調性之鼓音尤其接觸於腹壁諸部證明其知覺過敏體溫上升頗多不定有時最高僅三十七度三四分升昂者亦不過三十八度或三十八度五分患者往往發汗或盜汗貧血羸瘦逐日增進有時前腹部之臍附近其面凹凸且能觸知硬固之索狀物此際該部能觸知而且能聽得腹膜炎性摩擦音本症經過緩慢有時遷延至一年以上療法本病之特徵在腹圍之增大即腹滿之顯現是也腹滿亦有實證與虛證但在實證中應用大小承氣湯或大陷胸湯者甚稀本病屢屢併發肋膜炎在初期腹滿之程度有輕度之壓痛與有抵抗之時期選用四逆散小柴胡湯合枳實芍藥散小柴胡湯合小陷胸湯大柴胡湯等從證用之腹滿已甚胸內狹迫及呼吸困難時除上舉諸湯外可從證選用梔子厚朴湯梔子厚朴合枳朮湯梔子厚朴湯合小半夏加茯苓湯厚朴七物湯四逆散合梔子厚朴湯厚朴生薑半夏甘草人參湯等如以上諸方無效又體力未衰脫者可投與大黃牡丹皮湯以上對於滲出性成形性者從證選用之體力已衰脫而羸瘦貧血盜汗在臍之附近能觸知有凹凸而硬固之索狀物者運用大黃䗪蟲丸八味丸之類實驗例前年餘診一少女訴腹滿與腹痛右側回盲部附近有甚壓痛之證明究為盲腸周圍乎抑為結核性腹膜炎乎甚雖斷定然病名可以不問而知其為大黃牡丹皮湯證已屬無疑余既確定治方即與投藥其後經過中患者伴流注膿瘍之結核性腹膜炎症治療半途中大腿之後面與臍部來瘻孔而排膿且起右股之股關節炎一時陷於步行困難余始終一貫亙一年半中常用大黃牡丹皮湯兼用伯州散連服之下終於治愈僅殘餘右足之伸長與股關節之少微畸形耳其中患者每日下痢三回乃至五回而在一年半中不少衰弱卻見強壯所以結核性病對於下劑並不禁忌所困難者陰陽虛實難於確定所用方劑難於確合耳第二十八章腸結核原因本病多數為食餌性結核而續發於肺結核者亦甚多原發性起於飲食牛畜之乳肉與其調製物症候本病病機雖已蔓延亦不現何等之疾苦者曰潛在性腸結核但有時亦起劇甚之腸痛此種腸痛現於右腸骨窩者最多每在食後經過之時間其痛輒來壓於該部則疼痛增劇便通屢屢不整或來頑固之便祕大多因制止而頻發下痢初期之疾病大便與其他單純之腸加答兒無異僅為不消化便與黏液耳此時期欲診定其為本病勢頗不易只有從其他臟器上證明有結核性變化之存在為斷且其下痢對於止瀉法極頑固而右腸骨窩及臍窩之腹壁無力失其緊張以此情形推斷為本病耳但病勢進化則大便中混血液更進化則大便呈汁粉之性狀其下痢往往頻發於近曉故名雞鳴下痢有時結核組織崩壞血管破裂若穿通腸壁俄然起腸出血或腸穿孔倘此崩壞之組織鄰接於腸漿膜時則或起廣泛性或限局性之腹膜炎小兒之原發性腸結核往往呈特有之徵候者名腸間膜癆其主徵為全身羸瘦貧血頑固之消耗熱四肢及胸部瘦削腹部顯然鼓脹膨滿有時腸間膜腺纍纍腫大外部能觸知之肝臟大多腫大便通不整療法腸結核患者之腹部一帶虛軟尤其在臍之附近以拳抵之常覺腹底下沉如搗餅之軟毫無抵抗且氣味惡而干因鼓脹或腹滿所以抵抗極弱也腹診既如上述則下痢脈細數者虛證也除虛證甚少陽虛證之病亦甚難治又腸結核之患者大部分續發肺結核此時治療上更加困難從腹證上見腸結核者最多投與大建中湯人參湯之類但此等方劑為除虛證之治劑輕輕投之反有危險余依病證考慮分量屢屢運用小柴胡湯腸結核之初期腹部軟弱左右之直腹筋強之變急迫於心下左右腹筋之空隙虛軟而上浮與前述情形迥然不同本年二月餘曾診得此種病之婦人右肺下葉浸潤呼吸迫促全身有輕度之浮腫下痢一日數行投與小柴胡湯合真武湯而大見效又父執長野氏以麻黃一味煎汁治愈腸結核此亦足資考慮之資料也第二十九章腎臟炎甲急性泛發性腎臟炎原因一傳染性原因最頻繁者見於諸般之傳染病之際二寒冷性原因所發之寒冷性洛伊馬基斯名急性腎臟炎三外傷性原因而發者名外傷性急性腎臟炎四由於傳播性原因而發者名傳播性腎臟炎此種腎臟炎亦屬於傳染性腎臟炎起於痳疾膀胱炎腎臟周圍炎等五中毒性原因來自中毒性急性腎臟炎此因服用某藥劑或某毒物或由吸下或由塗擦皮膚而起慢性皮疹及皮膚遭火傷之後而來之腎臟炎亦為中毒性症候本病從諸多之腎臟疾患如尿之性狀而能下其診斷即尿帶血性生血樣垽渣有時呈淡黃色之肉羹汁狀屢屢帶赤褐色或黑褐色但頻頻現血液尿此際宜注意蛋白尿之現存及尿垽渣中有無腎臟圓柱圓形細胞細尿管上皮尿之理學的性狀亦屬必要尿量減至千五百竓以下其色濃厚比重增大皮膚浮腫為本病患者屢見之症候初發者見於顏面上或僅限局於該部眼瞼腫脹眼瞼裂顯然狹小但亦有全身皮膚髮強度之浮腫者漿膜腔亦屢屢浮腫見胸水及腹水者亦不少患者大多呈強度之蒼白色檢其血液在發病後短時日中赤血球及白色素已減少大動脈系之血壓變化亦現急速其度增大舒張期大動脈音旺盛屢屢帶鼓音橈骨動脈緊張此因血中存留之新陳代謝物質刺戟心筋而發此外為左心室肥大動脈血壓亢進體溫不變大多升騰間有升至攝氏三十九度或三十九度以上患者屢屢訴筋肉及關節上之牽引性疼痛睡眠不安食氣缺乏口渴增進又排尿困難尤其是屢屢尿意頻數而排尿時則來疼痛本病之持續有長短種種之不同傳染病例如見於纖維素性肺炎之際急性腎炎在一二日間即消散者亦不少但此際宜注意者急性腎炎暫時治愈而其原因的疾苦依然留存或增惡此種情形往往持續四周至八周之久而亦有荏苒亙八個月以上者乙慢性實質性腎臟炎原因本病之原因不知大多為獨立的疾患間有起於急性腎臟炎者傳染性及中毒性原因為本病之主要如馬刺里亞肺癆黴毒慢性化膿症鉛中毒酒精濫用等是本病大人罹之者為多症候尿之變狀最為主要即尿之量減呈暗色或帶黃赤色其比重頗大達一二以上蛋白之量亦多達或以上間於經過中排泄正常之尿量此外尿中有多量之垽渣以鏡檢之有腎圓柱圓形細胞細尿管上皮細胞尤其緊要者發見腎臟圓柱狀中有多數之脂化之細胞顆粒細胞及脂肪小滴血中之赤血球血色素減少患者呈蒼白色皮膚腫脹漿膜腔中亦屢屢充盈滲漏液本病大多徐徐而起以顏面蒼白及皮膚浮腫遂為疾病之端緒體溫之升騰無併發症者不現此外來動脈血壓之增進但急性腎臟炎及萎縮腎則比較的稀患者大多食思亡失便通不整本病之經過大多緩慢有時遷延數年之久其間如來急性增惡則血液中富尿恰如呈急性腎臟炎樣之症本病間有移行於續發性腎臟萎縮者丙慢性間質性腎臟炎腎臟萎縮本病因慢性之經過間生質性結締織炎症之增殖此增殖使結締織暫時減少腎臟之廣袤常以此而減故本病名腎臟萎縮但腎臟萎縮有原發症與續發症之區別原發症中更有壯年性與老年性之區別原因本病之原因有傳染性中毒性及退行性屬於傳染性者現於馬刺里亞及黴毒之傳染病之後間亦有因膀胱炎及淋疾而成本症者鉛毒萎縮腎者鉛之中毒也脈管硬化性萎縮腎者退行機轉之結果也大多見於年高者續發性萎縮腎者起於慢性腎臟炎也冒寒濕潤飲用酒精可誘發本病症候本病現於隱然皮膚不現浮腫故大多須經檢尿手續始能知本病之實在但本病之存在亦有可疑之症候如心悸亢進恆久性頭痛視力減退反覆鼻血聲音嘶嗄嘔吐頻繁頑固之濕疹皮膚瘙癢等此外如急癇痙攣發作及俄然發生胸出血等亦本病實在之表示也尿之量增加一日達三立至五立患者在夜間睡眠中屢屢頻催尿意其色呈淡黃屢屢交緑色又覺輕度之溷濁放置之表面則生泡沫尿中有諸多之異物如蛋白糖分膽汁色素多含有之尿之比重減至一一五以下有時竟至一二其反應為弱酸性垽渣甚多或竟缺如以鏡檢之有廣狹種種之物或如玻璃或有少數之顆粒狀與圓柱狀蛋白量甚少經數日或數周間完全不見因上述之狀態故往往有誤診為單純性尿崩症者因尿崩症亦屬尿量增加比重減少也但蛋白之現出心臟及脈搏之變化網膜變化等則缺如此即與本病區別之點也血行器之變狀亦為本病必要之症候左心室肥大常能證明之心尖搏動如扛舉性抵抗顯著第二大動音帶礦性屢屢伴左心室之擴張心尖搏動在左側乳腺或其外方從第五肋間腔現於下方此外則漸次來左心室之擴張及肥大網膜變化在本病為全數五分之一患者之顏貌呈蒼白色急速陷於羸瘦稍稍為輕度之運動即容易感疲勞訴心悸亢進皮膚漸著乾燥上皮有剝脫之傾向屢屢生頑固之濕疹食思大多缺乏口渴亢進口腔內訴乾燥感覺舌上訴黏稠感覺本病患者之脈搏顯然硬固觸之如有針條之感療法急性泛發性腎臟炎之初期現浮腫脈浮緊頭痛發熱有時不必發熱筋或關節訴牽引性之疼痛口渴煩躁排尿困難等用大青龍湯以發汗其時胸水腹水同時消失矣此種症狀多現於體質好之人大青龍湯以發汗是一頓挫的療法故得速效幼年之急性泛發性腎臟炎屢屢現五苓散之證即浮腫尿利減少口渴及吐與頭痛此五苓散之證也五苓散之口渴與大青龍湯之口渴一見即能區別五苓散證之吐大多吞入後即吐而脈象則兩者雖皆浮但五苓散之脈浮而散不緊也其詳請參閲藥方解說編皮膚病內攻性腎臟炎屢屢應用麻黃連軺赤小豆湯此方比諸大青龍湯之症狀較緩和煩躁口渴之程度輕脈不緊迫除以上方劑之外可從證選用症候與治方第九章浮腫條下所揭載之方劑慢性實質性腎臟炎訴頭痛頭重耳鳴心悸眩暈顏色蒼白尿利減少手足厥冷者與當歸芍藥散豫用此方曾消失蛋白特於眩暈甚者與苓桂朮甘湯合方婦人訴腰腳冷痛者與苓桂薑朮甘湯合方訴胃部膨滿食氣不振時有嘔氣者證明胃內有停水也有胃阿篤尼之狀者與茯苓飲其時加頭重不眠心悸眩暈等之神經症狀者與苓桂朮甘湯或半夏厚朴湯之合方余曾診一男子十數年來苦患氣管枝喘息肺氣腫併發慢性腎臟炎從診與小青龍湯服後喘息肺氣腫先愈連服一個月後蛋白全消漢方中消失蛋白之藥無一定之藥從證處方蛋白亦消失此際患者從西醫家言不禁攝取一切之刺戟性飲食物服用乾薑細辛等刺戟性溫性藥物感多大之不安要知從證擬方正如小刀之細工毫無末梢的杞憂問題西醫不知病之陰陽虛實雜投藥劑斯亦愚矣有浮腫者除用以上諸方外可從證參照症候與治方第九章諸方選用之萎縮腎者大多選用動脈硬化症之治方心悸亢進恆久性頭痛視力減退反覆衄血者與桂枝茯苓丸桃核承氣湯兼用瀉心湯頑固之濕疹訴皮膚瘙癢等除以上之方外選用白虎湯類真武湯類梔子豉湯類第三十章腎臟結石原因罹本病者男子多於女子此在日常之營養品中與結石之形成不無影響而肉類及酒類之濫用尤易促起本病而全身新陳代謝機之疾患亦與本病有一定之關係痛風患者多罹腎石基斯金患者間患基斯金結石其實例也亦有來於遺傳性者此外如凝血寄生蟲卵亦招腎石之形成而腎部之外傷致腎盂出血時亦能誘發本病輸尿道中諸般之疾患亦能促進腎石之形成尤以尿鬱積及尿分解而來者為多但腎石形成之機轉則不明確症候腎石或腎砂不呈何種之疾苦在剖檢之際偶然發現者此名潛在性腎臟結石此外大多呈腎盂炎或腎盂腎臟炎之症候在施用手術之際若向外方穿孔始能發見其結石而在此際尿中發見多量之結晶性垽渣其先不得不疑為腎臟結石非從細檢其垽渣之性狀及結石之化學的成分不能知之腎臟部之疼痛為屢屢見之症候於廣泛性中放散久之間亦誤認為腰痛或肋間神經痛本病患者現一種固有之體位即上體向前方屈曲而步行肩胛向患側偏倚脊柱突窿於健側避脊柱之回旋及屈曲運動而營強直性之步行有時經數周至數月時間及長久之噁心惱嘔吐後始現本病之症候又本病現慢性膀胱加答兒之症候此外尚有少數之患者罹尿血尿中見多量之結晶狀垽渣本病最頻繁之症候為腎石疝此症候當腎石去腎盂通輸尿管而至於膀胱時腎石嵌頓於輸尿管內而起此際患者俄然訴腎臟部劇甚之疼痛此疼痛往往放散於遠隔之部位尤以膀胱部龜頭及大腿為多疼痛之性狀不一疼痛時患者之顏貌呈恐怖狀態皮膚因反射的血管痙攣而呈蒼白色且厥冷伴以黏稠之冷汗腦動脈上發痙攣時則患者亡失神識至於起間代性筋肉痙攣此外往往伴戰栗發熱及嘔吐疝痛發作時對於尿之變狀殊堪注意其時尿量減少或來無尿之症此無尿之症因偏側之輸尿管閉塞健康之腎臟受反射性刺戟致妨礙其作用之故此無尿症亙數日之長時間乃起尿毒症又在疝痛發作之際往往放多量之血尿為時持續甚久此血尿之原因由於嵌頓之結石損傷腎臟黏膜而然結石若離輸尿管或遠於腎盂或下至膀胱時則疝痛之發作消散利尿再呈多量血尿亦漸次消失矣但結石若從膀胱而出通於尿道時則又喚起膀胱及尿道劇甚之疼痛焉腎石疝發作之持續長短不同或止數時間或經數日若腎盂中存多數之結石或結石從輸尿管還歸於腎盂時則反覆來腎石疝之發作腎石疝之發作通常者不至於死惟重篤之危險症狀結石嵌頓於輸尿管不赴上方亦不赴下方致成輸尿管之炎症壞疽及穿孔因而發穿孔性腹膜炎者死之症候也腎石將輸尿管完全閉塞時則尿鬱積於腎盂內致成急性腎盂水腫此際腎臟部上得顯然觸知腎臟腫塊但亦有不能觸知者療法疝痛發作之際腹診上腹筋如板之硬固身體前傾營深呼吸則增痛者此所謂呼吸在淺表也此際先與芍藥甘草湯在此時機西醫往往使用莫爾希納噴篤撲阿篤洛批等注射之雖覺不快然並無何種危險之副作用而奏效之時間則甚窵遠但若兼用本方往往奏效神速豫嘗反復注射莫爾希納阿篤洛批等量極多時極近猶不能鎮痛與此方一帖立見功效其見效之時間不過服後未滿三十分鐘耳此非偶然就腹證上確係鎮痛之明證也欲圖利尿而排除石者以豬苓湯為宜若尿利減少排尿困難且血尿者服用此方亦能快愈又發作時屢屢訴便祕者此際從證選用調胃承氣湯桃核承氣湯大小承氣湯大黃牡丹皮湯大柴胡湯之類則排便而同時尿量頓增加疼痛如拭去矣本病之患者大多現桃核承氣湯大黃牡丹皮湯之證因此方之特長有根治腎石之希望此則特堪注目者也豫於已往數年診得一止發無時之腎石疝痛症發作時腹部亦軟弱如綿之男子其年五十七歲與八味丸而著效於此可知腎石疝發作時其奏效之藥不必限於芍藥甘草湯豬苓散桃核承氣湯之類如患者當發作之時脈軟弱通常在發作之時脈沉弦或緊腹筋不緊張僅可與通例稍異也第三十一章腎盂炎原因本病之原因分細菌中毒二種就中以細菌者為頻繁本病往往有與腎臟炎同時發者此名腎盂腎臟炎本病之發病素除普通之發炎菌之外並普通大腸菌其他肺炎重球菌結核桿菌及窒扶斯菌亦能喚起本病分裂菌從膀胱而出至輸尿管遂達腎盂者甚多故腎盂炎中屢有膀胱及輸尿管之炎症症候本病之診斷往往頗覺困難只能下推測的診斷但本病中如兼腎臟膀胱或尿道之疾患時則本病固有之尿候由腎臟膀胱或尿道之尿候變狀所蔽對於獨立性腎盂炎尤其對於局部性腎臟變化及尿之變狀局部性腎臟變化之中頻繁者為腎臟部之緊張壓迫及疼痛如壓迫該部則疼痛劇增尿之變狀因炎症之種類而異最輕者尿中含有多量之黏液用鏡檢之發見棍棒狀及尾狀之上皮細胞之垽渣此上皮細胞來自膀胱之深層若屋瓦狀之排列同時缺扁平上皮細胞腎盂炎之所致也化膿性腎盂炎者尿之垽渣中含多核性膿球腎臟不冒時濾過之尿不含蛋白質或僅有痕跡膀胱炎及尿道炎之際以上之尿變狀亦來腎盂炎中特有者為局部的腎臟痛出血性腎盂炎起血尿有圓柱狀之凝血又腎盂炎屢屢併發腎臟水腫此際俄然劇甚之腎臟痛惡寒發熱嘔吐排泄透明之尿其量甚微腎盂炎之原因有急性惡急性若慢性之經過慢性症多帶化膿性常與化膿性腎臟炎同來由尿毒症尿腐敗症近圍穿孔或澱粉樣變性而死者甚多療法本病中以往來寒熱胸脅苦滿默默不思飲食心煩呈喜嘔之狀者為多此時可用小柴胡湯多口渴乾燥多煩渴引飲者用小柴胡湯加石膏白虎加人參湯又發病後經四五日以上始便祕者大柴胡湯之證也若同時併發加答兒者兼用豬苓湯第三十二章糖尿病往時稱消渴者酷似本病之症狀也金匱要略腎氣丸條男子消渴小便反多飲以一斗小便亦一斗云原因本病在血液中積滯過剩之葡萄糖從尿中為持久的排泄者也間亦現遺傳的疾患其中尤以中樞神經病相互而來者甚多尤以希斯篤里神經衰弱癲癇或神經病等為最多神經的興奮屢屢為本病之引誘又精神系統之器械的振蕩如墮落打擊汽車負傷等亦易致本病亦有與神經疾患或慢性之消化器疾患並聯而起者此外攝取含水炭素久而量多時亦能致本病本病見於小兒者稀往往見於二十歲以上之男子尤其在五十歲至六十歲者為多又罹本病之富裕者較貧乏者為多症候本病大多經過緩慢而少急性之經過其俄然而起者則呈重篤之症候本病惟一之確徵為證明尿中含有葡萄糖其他多量之利尿尿比重增加煩渴食氣亢進進行性羸瘦皮膚煩癢慢性陰部瘙癢恆久性顯疹慢性癤瘡四十歲以內之白內障果物樣口臭其他為昏睡狀態頑固之兩側神經痛腱反射消失脊髓癆樣症狀等往往見之尿之變狀為本病診斷上最緊要者尿量增加至一日三立至八立患者放尿頻繁夜間不能安眠排泄淡黃色之尿放尿後表面殘有泡沫此泡沫為本病之一特徵蛋白膽汁色素之外示糖分之存在尿量與尿比重俱增加拘急增大達一三乃至一四或超過之尿量不增加比重卻減少者甚稀尿呈酸性反應倘放置空氣中其酸度益加顯著患者飢餓訴煩渴雖攝取多量之食物亦漸次陷於衰脫但有時其營養髮生無障礙亦見佳良故本病可分瘦削性糖尿症及肥胖性糖尿症二種本病患者煩渴特甚飲用多量之液體尿之排泄亦多口腔乾燥及有黏稠之感全失發汗之傾向皮膚乾燥粗糙蔽有細小之表皮屑片體溫往往較平常低下本病之併發症頗多為炎症及中毒性二種皮膚上發煩癢生慢性顯疹癤瘡等其他從輕微之外傷為致皮膚生壞疽之原因此壞疽現於下肢之中趾部毛髮往往乾燥帶碎乾性有時生禿髮病眼目之疾病頗頻繁其中最屢現者為白內障此外為弱視視神經疾患虹彩炎眼筋麻痹等均無但起網膜炎齒牙亦屢蒙其侵害陷於齒需齒其他口腔炎亦往往見之肺臟為屢侵之臟器本病患者多數為肺結核而斃而患肺壞疽者亦多胃擴張為稀見之併發症肝臟亦往往腫大或來急性及慢性腎臟炎之症候生殖器之變狀往往見之疾病之初期則淫欲亢進漸次精液之形成消失成陰萎症婦人則窒不耐煩癢男子起包皮炎神經症狀中第一舉為頑固之神經痛就中以坐骨神經痛為最多尤其屢犯兩側有時起多發性神經炎招來腱反射消失末梢性運動麻痹皮膚知覺消失等本病最重篤危險症狀之一為糖尿病性中毒此名糖尿病性昏睡在本症之先屎中呈搿魯海兒脫氏鹽化鐵反應患者之尿及呼吸若林檎或有歐推兒樣之芬芳性臭氣至其病室內時即能知之此際患者突然陷於人事不省屬最長大氣息顯著營深呼吸或發強度之譫語加之呈發揚狀態此致死的轉歸能陷腦及胸麻痹也現於數時間內或一二日間間有一時輕快但未幾又增惡療法陽證最多用石膏配劑之方劑如白虎加人參湯竹葉石膏湯或用大柴胡湯加石膏小柴胡湯加石膏之類亦往往柴胡加龍骨牡蠣湯大黃消石湯麥門冬湯之類亦可用之反之陰證則用八味丸本病之煩渴者起於尿量過多液體缺乏與治小便不利而煩渴之方劑如用五苓散豬苓湯者甚少卻多用石膏劑用石膏劑後煩渴煩癢止尿中之糖量減少白內障去其他之併發症亦屢屢輕快本病感腰痛或坐骨神經痛者用八味丸往往收效瘙癢用石膏劑無效則用梔子豉湯之類不能制止者如八味丸真武湯附子劑為必要之方尿量過多因患者夜間不能安眠用附子多奏效用則尿量能出於意外之減少猶有併發症之各方參照各疾病條下實驗例一日本橋兜町某株式證券會社置藉男子四十二歲東京大地震災後罹糖尿病未全治荏苒至今顏色黧黑有如垢之斑點體重曾近二十貫現僅十四貫左右也前胸肩胛間部上膊之皮膚生癜風自覺之症候為陰萎與無力眼缺舒時時口中流出潰瘍左側之坐骨神經痛衄血頻繁從肩至頸強頭重等口渴達煩渴程度多尿量近來之血壓在二百米里之上大便一日一行脈左右俱緊右稍浮左稍沉舌根附近見淡黃色苔腹部無軟弱之狀特觸之亦無抵抗之狀患者服藥及二十二個月僅殘留輕症之坐骨神經痛及眼症此外已全輕快尿亦無糖之證明初診當時捉每個之症狀所謂病之治標也加以本治之方而其症全治當初衄血之血壓有亢進症狀兼用瀉心湯桂枝茯苓丸在某中途訴吞酸嘈雜乃與柴胡加龍骨牡蠣湯坐骨神經痛甚時用烏頭湯稍稍用別種之治療方針此後六個月間連服大黃消石湯病勢漸漸擊退大半血壓最高者右百三十至四十米里左百三十五至四十五米里此亦有趣之事也附記之二近鄰雜貨店之主人偶然於醫生治療頸部癤腫之際發現尿中含糖始知罹糖尿病非自覺症之過程也時時頸部出癤腫荏苒經年未治愈口渴但不至煩渴引飲之程度舌一面白苔稍乾燥腹診上左右之直腹痙攣急心下部有抵抗證明胸脅苦滿儼然桃核承氣湯之腹症也脈稍沉有力大便一日一行患者喜服漢方藥求藥某所不大見效漢方無糖尿症之藥為因病名不一只可下抽象的治方但罹糖尿病者往往生者甚少余既以此藥告之乃與大柴胡湯加石膏合桃核承氣湯服藥一周尿中之糖消失此後每日不發見糖之反應矣和田東郭用大柴胡湯加石膏治頭髮之拔落云森立之用大柴胡湯治陰萎有效此亦有趣之事也備考本間棗軒之說消渴古人單稱消金匱要略始有消渴云云傷寒之消渴乃謂一時煩渴無真正之消渴中略仲景氏之書中凡婦人二字標出於書首者其中僅限婦人之病無男子之病以此考之則消渴亦限於男子之病也於婦人者甚稀檢閲藥室雜說中消渴之治驗者數十人盡男子也療治婦女之消渴者僅二三人而已中略治法依前述論統為不治之症但輕症者能節飲食不怠服藥百人之中亦可救其二三焉初發者用白虎加人參湯多房失精及疝家等常患腰痛或下焦虛冷少腹拘急發消渴者八味地黃丸腎氣丸有奇驗津液涸竭氣血耗散者選用竹葉石膏湯麥門冬飲子天女散等飽食後腹脹滿者用五味平胃散便祕腹脹者用調胃承氣湯麻子仁丸蘆薈丸施用蜜煎導灌腸法亦宜常服牛酪飲葛根粉葛根水等亦為止渴之一手段也麥門冬飲子者麥門冬人參知母生地黃茯神五味子瓜蔞根葛根甘草竹葉也天女散者天花粉地黃葛根麥門冬甘草五味子粳米也有持桂里之說字書云痟即消渴病蓋痟從消字而出消者飲煩渴恰如旱天灌水日下曝冰之消也消渴二字相連為良好之病名此病古分紀於肺胃腎三部呼之為三焦渴大抵湯水多而食少大便如常者上焦渴也多飲湯水又常多食小便赤黃色者中焦渴也渴而好湯小便如濁物之膏者下焦渴也此病前哲或謂系胃熱之症或謂積久飲酒所致各持一說鄙意觀之酒食色欲皆足患此也消渴久不愈則成雀目夜盲症或脊發癰白虎加人參湯此治所謂上焦渴之上消方者也友人青圃患消渴舌白苔而燥脈緩用此方得奇驗謂胃承氣湯消穀善飢大便鞕所謂中消之症此方治之大冢曰抵當湯治消渴亦有效腎氣丸此方為下消之治劑下消精髓枯竭之故引水自救也吾師云消渴之證脈似陽而實陰故用腎氣丸余初聞之茫然歷多年乃神悟吾師之所謂陰陽即仲景之所論浮沉者也又脈書所言微細如蛛絲非陰脈也此事非可面提口授惟學者留意研究自能知之大冢曰八味丸證之患者其最高血壓在生理以下者為多足資參考外臺中療消渴口苦舌乾者之方麥門冬茅根烏梅栝蔞小麥竹茹生津湯麥門冬黃耆栝蔞根甘草人參黃連牡蠣地黃知母前方用於輕症後者用於苦消渴嘈雜者為宜錢氏白朮散人參白朮茯苓藿香木香甘草葛根繅絲湯煮蠶繭之湯蝸牛散燒存性服用其末鉛用散栝蔞藿香丸益元湯石膏黃柏地黃栝蔞根地骨皮外臺療消渴方下除栝蔞藿麥丸外之七方皆後世之方也運用之或有危險故不録消渴者通例等於今日之糖尿病尿崩症其他口渴多尿之疾病亦包含於此病名中此等之藥物力能止渴即糖尿病之效藥也活人事證方神功散同芍藥甘草湯治消渴有效第三十三章腳氣原因真原因不明維他命不足為本病誘因中之一症候本病之主徵為運動及知覺障礙並心臟患之症狀症狀有輕重種種之別最輕度之患者惟僅自覺作事上不感何等之疾苦其重症則患者訴疾苦之甚疾病頗有急性的經過至致死的轉歸本病大別為下四種一神經性症本病徐徐而起且病初之症狀輕微大多不能明示起始之趨勢患者亙數日或周余後則全身倦怠惡寒頭痛等或以加答兒症狀為前驅如鼻加答兒氣管枝加答兒或胃腸障礙而露本病逮夫本病之固有症候出現後此等症狀即消散本病固有之症候為腳氣尤其是下腿感倦憊與萎弱步行時容易疲勞時於排腸筋緊張之時感疼痛患者訴頭痛口渴容易脫汗其次腳部手指口圍感知覺麻鈍下腿現輕度之浮腫下腹部則知覺障礙眼瞼耳殼亦現之隨病勢同進行而伸展於下肢一般手指前膊等暫時患者訴心悸亢進心窩苦悶心悸亢進為疾病之初期只現於運動時其後於安靜時亦起食欲缺乏利尿減少大便祕結膝蓋腱反射於疾病之初期中亢進其後漸次減弱或竟消失又腳部之粗大力減退故患者容易躓仆脈搏數增加速而且軟二萎縮性症本病亦如神經性病腳部感萎弱腓腸筋之緊張徐徐而起後腳部之萎弱逐日漸進遂致大腿股關節成輕度之屈曲位置下腿從膝蓋以下成鉛直懸垂足部呈內翻馬足狀其他見瘠髓癆之際呈浦拉海篤洛麻裴兒喀氏症狀早夜侵害上肢之運動而現該筋肉之萎縮拇指球及小指球殊扁平甚至凹沒陷於上述之狀態患者每不能動作致縛於病褥知覺障礙亦神經性病脈搏及心臟異常浮腫僅存或全缺腱反射亦大減弱或全消失其他間亦有陷於萎縮及筋肉攣急性攣縮者此尤多見於腓腸筋本病經過甚緩慢有亙數月或年餘者三水腫性症本病或如神經性症腳部徐發萎弱或起萎縮性症患者之步行漸次困難但在萎縮性症之際不呈顯著之運動麻痹及筋肉萎縮但浮腫為本病之特徵先逐日現於腳部廣延於身體各部遂及於漿膜腔患者訴強度之心悸亢進呼吸促迫心窩苦悶利尿顯著減少大便祕結心臟尤其左心擴張往往為心囊水腫所蔽不能認出其真正之擴張四急性惡性症或心臟性症本症之特徵為急性心臟機能不全好襲少壯之人即於健康時本症俄然而起或以輕症腳氣之症候為之前驅速來病勢之惡化患者心悸亢進心窩苦悶呼吸促迫體溫上升食思全失煩渴噁心嘔吐利尿減少顏貌汙穢蒼白色大便常祕結其他患者訴腳部倦憊及重感腓腹筋緊張壓之覺疼痛又下肢現輕度之浮腫知覺麻鈍腳部之運動麻痹激增心悸亢進心窩苦悶逐日顯著增惡患者訴胸內如爆裂樣之苦楚眼目口腔鼻腔開大瞳孔散大其顏貌甚險惡心囊及其他之漿膜腔現水腫但此水腫性症則增加心動之數心臟部及心窩部見泛發性之博動心尖之音幽微而暈濁第二肺動脈音亦暈濁頸動脈跳動橈骨動脈頻數且軟上下指端厥冷呈紫藍色肺臟陷於急性氣腫心臟濁音部狹小甚時完全消失橫膈膜及其他之呼吸筋呈不全麻痹狀呼吸大大促迫體溫過下降患者精神亡失遂在肺水腫之症狀下而斃療法神經性症感下腿之倦怠與萎弱出行之際容易疲勞頭重口渴脫汗加以下腿浮腫知覺麻鈍等可與越婢加朮湯病勢進步浮腫伸展全身心悸亢進胸脅苦滿利尿減少大便祕結者與大柴胡湯柴胡加芒硝湯萎縮性症用桂枝加附子湯桂枝附子湯八味丸當歸芍藥散當歸四逆湯桂枝芍藥知母湯之類水腫性症初發腳部萎弱下腿浮腫者與越婢加朮湯若脈浮緊口渴煩躁全身現浮腫無自汗之症利尿減少者與大青龍湯胸脅苦滿心悸亢進呼吸促迫利尿減少大便祕結者與大柴胡湯柴胡加芒硝湯若浮腫強烈心下有堅硬如板之痞狀食氣缺乏顏色如土心悸亢進呼吸促迫喘息利尿減少之候者與木防己湯服下猶不效時與木防己去石膏加茯苓芒硝湯心臟性症與以上諸症迥異病勢急激多衝心之懼本病總犯陽實證初期即為下劑之適應症若胸脅苦滿心悸亢進呼吸促迫體溫上升食思亡失煩渴噁心嘔吐大便祕結利尿減少之候先與大柴胡湯惡飲食飲之嘔吐不能納入時與瓜蒂散以吐之若腹滿之甚喘鳴促迫大小便不利者與大承氣湯心下如石之堅硬肩背凝結呼吸促迫甚煩躁心中有懊憹之狀大小便不利者速與大陷胸湯危迫眉睫有衝心之兆者與走馬湯若陽極變陰脈已變沉遲煩躁厥冷現吐逆之狀投與吳茱萸湯能救十中之一焉備考朱氏集驗方去杖湯與芍藥甘草湯同治腳弱無力行步艱難有效友人戴明達用之有效驗大冢曰魏氏家藏方之六半湯芍藥甘草湯同條治腳氣行步不能云云此方亦常有應用之機會也外臺生薑半夏湯治腳氣入心悶絶欲死者為宜醫事小言腹攣急及於痹時用桂枝加苓朮附湯足不腫而其初氣急者最懼之候不得不診察其有無衝心之兆微帶寒熱舌上有苔渴而小便不利咳喘腳弱者越婢加朮湯之證也心下堅塊如凝小腹不見格別或手足不腫脹無異常之兆而水腫者用木防己加茯苓芒硝湯本方去石膏但熱渴者不去為宜全身軟腫呼吸障礙者用防己黃耆湯從胸至喉發腫音聲變態者凶兆也腫少有小便數日不利但其腫甚堅煩渴者水毒伏於內衝心甚急也不能平臥者衝心之候也肩息者亦然胸間之動氣強大人迎之脈強大者衝心之候也言語氣息不足者亦衝心之象也類聚方廣義腳氣致萎弱不能起立麻痹之特甚者不用烏頭附子入方劑無效此用烏頭湯為宜本間棗軒腳氣衝心之漸近者用茯苓飲合吳茱萸湯有奇驗此方咽下嘔氣忽止飲食亦納小便亦快利豫多年試用此方救急頗多第三十四章拔沒篤氏病原因本病因甲狀腺機能之病的亢進成自家中毒症多來於女子但幼年時不現遺傳的素因與本病之發生有重大關係本病之患者其兩親或祖先大多有神經或精神之疾患其他之全身病如糖尿病心臟疾患結核患等之家族發生本病者甚多其他神經病之經過中發生者間亦有之精神的興奮急性傳染病等亦為本病之誘因症候本病之特徵為心悸亢進甲狀腺腫大眼球突出及振顫心悸亢進即心臟急速症為本病之症候中最早促患者之注意之一症疾病之初期惟身體及精神之亢奮踵起安靜時比較的不著明病症進化遂達持久性患者覺腹內不快搏動之感訴恐怖胸內緊迫及苦悶心臟收縮之數在健全時六十至八十本病之心臟收縮數則在百二十以上其時與脈搏同速其他心動頻數發作性顯著同時心動旺盛胸壁顯著振動其他口蓋弓脾臟腎臟等亦呈搏動心動既如上述之強盛於是漸次心筋之擴張及肥大間亦可聽得收縮期的心臟雜音甲狀腺腫大亦為心悸亢進之前驅大多發於其後或多同時來者此腫大常現於兩側亦有先發於左側而後來於右側者此甲狀腺腫大為純粹之脈管性腺腫基因於脈管尤其於動脈及靜脈之擴張及延期於甲狀腺腫分述六徵於次一著明而得望見之搏動二觸之知振顫三著明而能聽得吹鳴性之雜音四動脈管之擴大五脈管之破壞性易六脈管內之血液對於壓易排除眼球突出每常現於兩側眼目漸次從眼窩突出其時眼瞼完全不能閉鎖不能掩蔽眼球眼球機能陷於機能不全尤其是視軸輳合機能更失其功能此名真歐皮烏斯症候亦有眼球與眼瞼之運動不相符合者名曰喀雷夫歐斯氏症候更有眼瞼開大與之刺戟其瞬目減少或缺少者名曰司脫兒維喀氏症振顫時常見之其眼動小而且速又往往呼吸困難喘息發作及咯血顏貌呈蒼白色眼球帶藍青色體質多纖弱呈神經質容易興奮屢屢訴不眠其他發汗甚易分泌唾液及尿之排泄量增加有時併發黃斑白斑鞏皮病限局性皮膚浮腫蕁麻症關節浮腫等又來多量如水之嘔吐其重篤劇甚者下痢療法動悸不眠發汗過多神經過敏見物易驚胸脅苦滿肩凝等與柴胡加龍骨牡蠣湯若胸脅不苦滿而訴以上之甲狀甲狀腺之部分有壓迫感或喉頭有狹窄感者與半夏厚朴湯耳鳴眩暈之甚者芩桂術甘湯當歸芍藥散之類合方與之脈浮大心悸亢進呼吸促迫口渴舌乾眼球突出者與越婢加半夏湯症狀進化呈枯燥之狀應用炙甘草湯失眠之甚者從證選用酸棗仁湯梔子豉湯瀉心湯茯苓飲合芩桂甘棗湯或茯苓飲合酸棗仁湯之類以上之方劑服後仍心悸不靜時頓服桂枝甘草湯或桂枝甘草龍骨牡蠣湯實驗例一幡谷町田中氏之妻三年前罹脅膜炎愈後心悸亢進耳鳴肩凝治法已盡終不輕快有一醫生下黴毒之診斷注射薩魯侯兒生之外別無良法云但病家尚遲疑未定偶有一人知之遂勸來余處乞診餘一見而知為拔沒篤氏病左為初診日大略所舉之現症昭和七年三月三日初診身高長稍羸瘦眼瞼裂開大眼球中有光澤甲狀腺肥大脈促而有力心下悸與臍動均著明筋肉搐搦大便一日一行尿意頻數口渴有舌苔主訴耳鳴頭重目下最痛苦者為月經之前以上症狀更增惡投與大柴胡湯加石膏合當歸芍藥散耳鳴頭重肩凝均輕快但訴下腹痛食欲減退四月二十五日轉用小柴胡湯加石膏合當歸芍藥散續服不滿三個月自覺痛苦消失眼球復歸於正常甲狀腺大減退頰部現筋肉還復數年前之狀家族皆驚喜不止二同道荒木性次君之知友某之妻乞診拔沒篤氏病余與荒木君傾心相謀盡術以治之亦能稍輕快但未至全愈服藥一月餘以效遲故去而就西醫此後余每診拔沒篤氏病病家心誓能依余方續服半年以上者方為投劑西醫更有何種治法尚不疑為效遲漢醫之治一月不瘳者即以為效遲而去以此觀之西醫真有一種魔術的魅力矣第三十五章神經病神經痛者所患神經之範圍上有廣延之疼痛現出發作性或增惡化疼痛發作之數及持續無一定疼痛之性狀亦不一或如鑽或如灼或如碎雖強壯男子亦必絶叫嗚咽不能營心身之勞動亦有妨礙睡眠者大多神經痛在維雷氏壓點壓迫此壓點則招來所患之神經疼痛發作若更增劇者皮膚之知覺大多在所患神經之範圍而起障礙初期呈知覺過敏後期則知覺亡失脈管運動神經分泌神經及營養神經亦往往同時障礙其他激甚廣大之疼痛則放散於皮膚部分或來間代性或來強直性之筋肉痙攣解剖的變化多陰性只於某場合呈神經炎性變化神經痛之原因有寒冒性外傷性傳染性及中毒性之區別又有反射性神經痛者是起於遠隔器官之前驅疾病屢見於婦女生殖器之疾患吾人所最多遭遇者為顏面神經痛及坐骨神經痛甲顏面神經痛原因本病為最頻繁之神經痛因三叉神經分枝通過多多之骨幹且其末梢之所在淺表易蒙傷害感冒性三叉神經痛發生於受冷之氣候或遭遇風雨者比較的少有傳染性三叉神經痛適來於馬剌亞里神經痛此外來於腸窒扶斯因夫魯恩柴及黴毒等中毒性三叉神經痛因中鉛水銀之毒而來又痛風起於糖尿病之際外傷性三叉神經痛甚多若三叉神經之挫傷又刺創頭蓋骨之膜炎腫瘍之壓迫神經幹之腫瘍侵蝕齒牙頸骨鼻腔前額腔眼及耳等之炎症等為其原因有時本病繼起頭蓋底之疾患如見腦膜之黴毒性急性炎症及肥厚腦底腫瘍腦動脈瘤等本病以男子比女子為多又肥胖貧血神經者亦多症候本病常發於偏側但亦因恆久性而漸次及於其他處者此際最初冒者為一側之神經大多疼痛消失同時冒三叉神經之全三枝者少有最多者不過發三叉神經之某一枝中之一枝就中最多者為上眼窩神經疼痛發作之時間有前驅症發毛皮感覺蟻行感覺冷感強直感覺等疼痛之性狀急烈時或如灼或如碎或如鑽其發作之持續及反覆之頻疏並無一定皮膚之知覺始而敏鋭後漸麻鈍或竟亡失血管運動機障礙初期大多脈管痙攣皮膚變蒼白色未幾見該部脈管之開張因此而皮膚潮紅及訴灼熱分泌障礙亦為往往發生症候淚汁及鼻汁之分泌增加甚至出衄血其他唾液汗液之分泌亦顯著乙坐骨神經痛本病外傷及感冒為最頻繁之原因為諸神經痛中之最多見者感冒性之原因為露臥濕地或冷石上或沉溺水中或其他之野營等外傷性之原因為墜落衝突打擊久時之跪坐或乘馬及峻路之長行行運過勞大腿之骨折及脫臼坐骨神經部之腫脹及滲出物子宮及卵巢之轉位及腫瘍子宮周圍炎子宮背炎妊娠直腸內糞便滯積骨盤腔之腫瘍脊椎之脫臼骨折及腫瘍脊髓膜之出血炎症及腫瘍等傳染之原因亦來自本病如馬剌利亞黴毒有時如淋疾腸窒扶斯回覆期急性關節洛伊馬荼斯等中毒性之原因往往見於糖尿病之際症候本病多來於偏側有時則從偏側而及於他側或始即兩側齊發其來於兩側者為脊髓勞之一症候極難治愈本病容易診斷當問診何神經痛之範圍得患者坐神經骨之路徑其疼痛從臀部之坐骨神經之派出部沿大腿及下腿之後面波及足跖部分的坐骨神經痛者沿大腿之後面或腓腸部或只限局於足跖之疼痛也壓點腸骨後上棘之高接於薦骨之近旁部分臀部之下緣出於坐骨神經之坐骨截痕部分大轉子之直後大腿後側之中央後股皮神經分歧之部分膝膕部腓骨頭之直下內外踝緣之後側等患者起立時脊柱多向患側面弓曲稀有向健側彎曲者罹患側之腳部之筋肉漸次陷於不動性萎縮命患者伸展下肢之膝蓋關節屈曲股關節時大腿之後面發劇痛則該坐骨神經亦伸展此症候在本病之診斷上頗重要療法從證運用桂枝湯之加減局所有潮熱灼熱感淚液鼻液增加與葛根湯疼痛劇甚煩躁口渴選用越婢湯大青龍湯局所有冷感皮膚蒼白脈沉細沉遲者與麻黃附子細辛湯病情頑固荏苒不愈者從證選用桂枝芍藥知母湯烏頭湯附子湯之類神經痛之中所謂基因於瘀血者餘名之為血證性神經痛選用桂枝茯苓丸桃核承氣湯當歸芍藥散之類坐骨神經痛以應用桂枝茯苓丸桃核承氣湯當歸芍藥散之時為多其他則顏面神經痛條下之方劑亦可選用嘗治糖尿病與八味丸亦奏效吾友荒木性次君與苓薑朮甘湯速治老人之頑固坐骨神經痛神經痛之頑固者通常附子湯不能見效苓薑朮甘湯亦有奇效發作性疼痛劇甚不能動亦不能觸指者運用芍藥甘草附子湯甘草附子湯烏頭湯之類或單與甘草湯總之疼痛之甚者大抵不能速治其輕微者易治愈也慢性症則須經過時日亦有因投劑而往往疼痛增劇者臨床家往往遭遇之投藥之前須先告患者以宗旨慢性與急性之不同使患者理解漢法多因此而損名者此宜特為注意者也備考小青囊理中湯治受寒邪與腰痛楊氏家藏方水玉湯小半夏湯同治眉稜骨痛不能忍者有效此因痰疾之所致也第三十六章末梢性神經麻痹原因末梢性麻痹之疾患為頻繁之疾患其原因分寒冒性外傷性中毒性及傳染性四種末梢性麻痹之疏頻依各個神經而異其神經之徑路有表在性在長遠之長程中蒙感冒及外傷者為最頻繁其陷於麻痹者亦愈多故顏面神經及橈骨神經之麻痹為吾人所最多遭遇者只中毒性麻痹一種或系毒物吾人未能加以說明在條件之下侵一定之神經陷於麻痹例如見鉛中毒之際兩側橈骨神經麻痹是也症候末梢性麻痹容易認識何則蓋不論何處均能見其所屬之筋肉現運動障礙或一肢之神經及所屬之筋肉均陷於麻痹此亦大多為末梢性之原因故該麻痹肢之神經呈變狀反之若兩側之上肢及兩側之下肢或四肢均陷於麻痹者其原因在脊髓此名截癱又偏側之上下肢現麻痹者其原因在腦髓此名偏癱甲顏面神經麻痹原因本病為最頻繁末梢性麻痹之一其原因分如次之數種一中毒性顏面神經麻痹此中尤多鉛中毒二傳染性顏面神經麻痹此除癩病者發之外尚有發於窒夫的里丹毒腸窒扶斯黴毒赤痢及其他帶狀匐行疹多發性神經炎流行性感冒産褥等三感冒神經顏面神經麻痹為頗頻繁之症本病症百分之七十二由於顏面接觸冷氣四外傷性顏面神經麻痹亦為頻繁者初生兒於分娩之際用鉗子手術壓迫顏面致起本病此中最多者為耳疾由岩樣骨之結核性破壞傳布於夫阿洛芝浦氏管經過其內壓迫顏面神經干遂崩壞之以成本病其他起於頸部淋巴腺顎下淋巴腺或耳下腺之腫大或化膿壓迫顏面神經或破壞而顏面之受切創打創外科手術槍創等亦為本病之誘因有時遇頭蓋底之壓迫亦能喚起本病如硬腦膜之黴毒慢性炎症肥厚腦底之腫瘍如腦動脈瘤五症候的顏面神經麻痹現癩病白血病痛風糖尿病延髓及腦髓疾患多發性神經炎幼年性筋肉萎縮症候之一病狀神經性之人及酒客易罹本病此因神經組織之抵抗力減退之故症候本病症候中之必發者為顏面神經麻痹其他顏面神經從運動枝分布於口蓋筋及馬鐙骨來自懸雍垂及口蓋弓之傾斜或聽覺異常或味覺纖維性亦從淺大岩樣神經之三叉性神經來於顏面神經鼓索神經再從顏面神經而出致味覺障礙亦本病中之一症候又淚液腺及唾液腺分泌神經纖維亦出於顏面神經致淚液及唾液之分泌障礙亦見於本病顏面筋肉之麻痹為本病必發之症候與上述症候顏面神經干之部位相異顏面之患側既變其姿容一見便知本病之存在即該部之皮膚失皺襞平滑眼瞼開裂比健側廣大患者眼瞼之閉鎖障礙又往往下眼瞼外翻患者不絶惱流淚今試患者營嗤笑運動時患側全失其運動其狀如假面今欲逐次精密微視每個之顏面筋麻痹患者一定營顏面筋運動前額之患側失皺襞健側現水平之橫皺患側蹙額之際依然不變形皺眉筋麻痹者患側之眉間失皺襞也眉比健側底下患側之瞬目消失顏面顯著傾斜以指尖試之或接觸於眼瞼角膜不起反射的瞬目尤其當患者閉眼時健側之眼能開合患側之眼開放不動顏面之傾斜愈顯鼻尖健側傾斜鼻孔患側狹小口裂及頤部牽引於健側口角之口角舉筋因而麻痹而患側下垂又患側之口裂不能閉鎖口笛噓嘯吐唾作用口尖不能挺出從裂口逸出空氣飲食之際食物容易從患側之裂口溢出於是患者之頭部不能不傾於後方頰筋麻痹則障礙咀嚼運動頰部不能營充分之緊張頰黏膜咀嚼運動之際嵌入齒列間而傷之又食物堆積於齒齦頰黏膜之間患者不得不以手指抉出或從外方壓迫頰部驅逐出口腔味覺障礙者從顏面神經之膝狀節與鼓索神經之顏面神經分歧部分之間生障礙也常冒於舌之前方三分之二之部位或唾液之分泌減退口腔之患側屢感乾燥淚液之分泌亡失顏面神經麻痹往往發前驅症如眩暈頭痛感頭內朦朧耳鳴難聽及耳痛等此等之前驅症直至發病本病有輕症中等症重症三種之區別輕症顏面神經麻痹可見電氣興奮性之變化施特種之療法大抵經二三周間自可治愈中等症呈部分的變化反應治愈須四周至六周重症顏面神經麻痹現出完全的電氣性反應漸次顏面筋瘦削有致終生不愈者顏面神經麻痹大多來於偏側現兩側者稀乙橈骨神經麻痹原因外傷為本病源中最多者其他感冒傳染病中毒亦本病發生之原因也症候本病之來手及指現特有之變狀上肢上舉於地平線則其手之手掌面屈曲同時內轉拇指外轉且稍彎曲而指節手掌面亦屈曲本病恆多俄然而起有時其前驅症現知覺異常療法顏面神經麻痹之初期其輕症者可用桂枝加黃耆湯黃耆桂枝五物湯桂枝加附子湯桂枝加朮附湯桂薑棗草黃辛附湯之類橈骨神經麻痹亦可用以上方劑備考傷寒六書諸虛寒乘鬱冒不仁不仁之仁即無中心之貌轉麻痹之意也血氣虛弱不能周流一身者是正氣中伏邪氣故肢體頑麻不仁厥如死尸也用桂枝麻黃各半湯大冢曰厥者不仁之甚也今謂知覺消失也本間棗軒之說麻痹之一症屬於中風癇證之微漸而不備中風癇證之正證難定為中風亦不能認為癇症也又有似痛風處古人則別立其病門金匱要略中之中風歷節篇中痹亦列入但臂不遂者入痹也其病情為偏臂或兩側麻痹萎弱羸瘦血色無紅活或痛不能舉或不能伸屈非中風非痛風無惡寒發熱之證飲食如常因循而永不愈或發於腳大多其始為兩腳或一腳之指痹漸漸由膝而上或萎弱或掣痛瘦而細血氣凝滯變色步行困難而致殘廢其病臂者先用桂朮附湯桂枝加苓朮附湯葛根加朮附湯及桂枝芍藥知母湯無效時再用大防風湯獨活寄生湯等腳之治法治用以上諸方又可隨證用六物附子湯腎氣丸之類下略大防風湯者地黃芍藥當歸川芎黃耆白朮附子人參獨活牛膝杜仲甘草也六物附子湯者苓桂朮甘湯加防己附子也獨活寄生湯者獨活寄生杜仲牛膝細辛秦艽茯苓桂心防風川芎乾地黃人參甘草當歸芍藥也第三十七章動脈硬化症原因本病之主要原因為酒精中毒及黴毒尤其以幼年時之黴毒易喚起本病但不因黴毒固有之變化而來故不得不與黴毒動脈炎有區別其他脂肪過多症糖尿病痛風肺癆鉛及尼哭金中毒亦喚起本病酒精比之黴毒為少熱性傳染病中尤其是關節洛衣馬基斯馬剌利亞發生本病者不少遺傳亦決不可輕視脈管彈力性之良否有遺傳的關係年齡亦與脈管彈力之變化有最要緊之關係年高則由脈管退行性變化之傾向因發本病者亦甚多症候本病患者之皮膚之彈力富皺襞筋肉萎縮骨質菲薄血行器官呈本病固有之狀態動脈管強固脈搏扁平脈波之升降頗遲緩心臟多呈著明之變化若全身之血管硬化以致全身血壓之亢進其結果心臟肥大擴張甚至惹起心筋之衰弱實際上全身之動脈不悉呈硬化性變狀唯呈上行大動脈之動脈硬化症左心室肥大擴張又兼以冠狀動脈硬化症時此為隨附之疾苦上行大動脈硬化症所患之動脈管擴張及延展屢於喉頭窩容易觸知其搏動打診上於胸骨之右緣約有三仙米之廣袤呈鼓性濁音聽診上有收縮期的雜音此雜音與大動脈瓣孔狹窄之際所現異點之雜音有相異之點其性甚柔軟其始與心臟收縮期一致且多兼大動脈第二音之有響性旺盛又上行大動脈之硬化症屢有冠狀動脈硬化症隨兼大動脈瓣閉鎖不全或大動脈瓣孔狹窄下行大動脈硬化症腹壁菲薄而柔軟時觸診上呈蛇行狀現硬固之脈管遇輕度之壓迫觸知其容易起喘上下肢動脈硬化症所患之動脈硬固呈蛇行狀脈搏小或全缺其他所營之肢部之運動性知覺性脈管運動性及營養性機能受障礙尤其著明下肢動脈硬化症之際所見之變狀發現所謂間歇性跛行症患者於該部有異常之感覺訴熱感冷感疼痛及緊張之感運動下肢每常增劇其度遂至運動中止又硬化症達強度所患之動脈閉塞時其所屬之末梢部致生壞疽腦動脈硬化症為所惠之腦髓循環遇障礙遂示所謂動脈硬化症性腦髓軟化症現出諸種之局所症狀及全身症狀又患者呈類似腦神經衰弱之症狀感頭痛眩暈全身倦怠本病腦溢血亦為最頻繁之原因療法動脈硬化症之患者陽證與實證為多用冷藥寒藥瀉下藥之配劑為多如石膏大黃芒硝山梔子之類組入方劑本病呈神經衰弱症之症狀感頭痛眩暈不眠不安且時時衄血者用瀉心湯梔子豉湯之類如心臟喘息心下堅硬顏色惡口渴心悸小便不利等與木防己湯服之一旦輕快者再與木防己去石膏加茯苓芒硝湯石膏與茯苓與芒硝有互相關聯之作用可考究上之二方而運用之間歇性跛行症可用桂枝茯苓丸或當歸芍藥散當歸四逆湯之類從證兼用附子湯或合方若有壞疽之傾向者亦運用以上之方劑有動脈硬化之傾向者全身肥滿腹部有膨滿之傾向者從證從人用大承氣湯大柴胡湯大黃消石湯大黃牡丹皮湯之類連服之可減輕全身之症狀能軟脈力阿篤雷那林可硬化動脈使用於動脈硬化之時須細心注意是否確為阿篤雷那林症若近似阿篤雷那林而為歐夫歐特林證則亦危險之藥品也其原料恐有麻黃余對於證明顯著動脈硬化之患者其血壓常在二百以上為一個七十三歲之男子患病已半年以上投與越婢加半夏湯木防己湯旋即氣管枝喘息心臟性喘息和緩目下猶健在云麻黃一味有無硬化動脈作用雖不得而知然從證適當用之則甚無危險也往年有一男子年六十餘歲患上症指水腫餘一診之與甘草麻黃湯服之一夜出汗而死後讀濟生方患氣促久不瘥遂致水腫者與甘草麻黃湯有效但此藥可發表老人虛人不可輕用余當時年少未熟方脈讀濟生方後始大悔愧前非云第三十八章腦溢血原因本病基因於最小腦動脈之病的變化形成粟粒動脈瘤此病有頗有破裂之傾向或自然破裂或因補助原因促進破裂本病以四十歲以上者為多亦為頻繁腦疾患之一壯年時之血管疾病見於心臟瓣膜障礙腎臟炎酒精中毒黴毒及其他傳染疾病之際脂肪過多且身體短矮有短頸者比瘦人為多故短矮之體質名卒中質體但無重要之理由恐為脂肪過多呈血管變狀也本病或見於家族遺傳的是亦血管變狀傳遺的發生腦出血亦來於安靜時或睡眠時多為一定的補助原因而促進補助原因為大動脈系統之血壓一時性的亢進轉機即憤怒俄然精神興奮荷重怒責飽食酒精飲用久時之前屈體位等其他腎臟炎及大動脈閉鎖不全左心室肥大動脈硬化症等亦能促本病發生外氣亦與本病之發生有關係初冬多見腦溢血此因寒冷所致皮膚血管上乏血液內臟中充盈血液故也症候本病定型的症候分多數的病期即前兆期卒中發作反應期墜廢症候及續發性短縮但此各期不必每常定備一前兆期此時期頸內充血眩暈頭內搏動精神興奮記憶力減退眼火閃發重聽間有一時性之失語症患者有數時間或數日間身體之偏側中發現蟻行感覺或知覺麻鈍或一肢無此等之感覺其他一肢或身體之半側發覺一時性萎縮或知覺麻痹二卒中發作患者突然卒倒亡失神識此人事不省之時間達數小時或數周時之持續其度頗強刺戟皮膚不呈反應作用瞳孔往往兩側大小有異對於光線之反應甚遲鈍呼吸帶鼾聲時現不正之基歐因斯德枯氏呼吸式患側之口唇呼吸時每翩翩動搖顏面多呈強度之潮紅表示血液之灌溉又往往呈蒼白色陷於虛脫之狀體溫於初發作之二三時間內攝氏一二度之下降後再復於平溫或稍稍上升脈多強度之中含緊張而充實顏面蒼白而細小緊張弱多為緩徐中調節不整診斷上之必要者為麻痹側之皮膚反射如提睪筋反射臀筋反射肩胛反射等之消失反之乳房反射則多存在比之健側其度常弱腱反射亦常於此期消失且現高度之人事不省屢見尿之失禁利尿之起始二十四小時內其量常增加有時證明含蛋白及糖分或患者反覆嘔吐又或起半側或全身之間代性痙攣其他時則現強迫的體促頭部及眼目向同側之方向其他又現全身之痙攣性振顫又現一時性眩暈短時之失神劇甚之嘔吐此名頓挫性卒中發作又半側麻痹等為卒中發作前驅此種出血其初血量甚少先侵害運動性路徑其後血量增加由是起卒中發作此種卒中發作屢屢有其誘因俄然由腦內充血器械的振蕩症其一例也此外如急速腦壓之亢進亦為卒中發作之誘因從卒中發作而至醒覺其狀有種種或俄然而來或徐徐而起或全不醒覺因腦壓亢進達於最高之度乃陷於人事不省遂至因心臟或呼吸麻痹至於死之轉歸三反應期此期患者呈顯著之不安體溫升騰至平常以上脈搏頻數皮膚髮汗訴頭痛輾轉床上發輕度之譫妄此症狀常有一二日之持續以上所述為發作及反應期腦溢血之定型的症狀有時惟單純留神經亡失僅呈神識朦朧輕度者神識呈第四期之墜廢症狀此種發作狀態之輕重由於其出血範圍之遲速與多少及其位置而定四墜廢症狀此症候由於出血之部位而異其主要者為腱反射之亢進大多發現於發作後三四日或數小時之後內囊中崩壞時他方面則來偏癱見顏面神經上肢及下肢之運動麻痹特堪注目者為顏面神經中之前頭筋皺眉筋眼瞼輪匝筋蒙其侵害或常從上肢強度侵及下肢以致知覺全缺但亦不過一時性之知覺亡失耳然內囊後腳之後部三分之一崩壞時則招永久性之知覺亡失檢查運動麻痹之狀其背部之筋呈偏側麻痹肩胛骨下垂患側之胸廓其呼吸運動微弱患側腹壁之努責作用力亦微弱患側之聲帶運動亦困難又現交感神經麻痹之症狀而見顏面偏側潮紅偏側發汗眼球陷沒眼瞼裂狹小瞳孔縮小等疾病追從時日而進麻痹症狀之一部分或急速或徐緩消失麻痹之最早且大而解脫最緩者厥為下肢麻痹此因僅僅殘留腓骨神經之麻痹往往使患者足尖步行又屢屢足尖曳引至足上肢麻痹之緩解者僅微就中以前膊背面之伸筋消失麻痹症狀為最困難麻痹患久乃致筋肉之不動性萎縮五續發性短縮症狀此症狀起因於脊髓錐狀體徑路之續發的變性手指屈曲伸展困難前膊多屈曲且取回前之位置稀有伸展者上膊呈內轉位置膝蓋腱三頭膊筋腱反射及骨膜反射顯然旺盛本病有再發之危險又本病之患者漸次陷於癡鈍有涕泣之傾向精神的感應屢屢變化其他陷於健忘症膀胱及直腸亦易失禁遂致體力衰弱至死的轉歸療法平素有頭內充血感眩暈精神亢奮不安便祕肩凝等之症狀者服用瀉心湯黃連解毒湯之類以防病之未然有年齡之婦人最多患以上之症狀身體漸次有肥滿之傾向者從證服以上之方劑之外可用桃核承氣湯桂枝茯苓丸之類心脅下痞滿胸脅有苦滿之狀及耳鳴頭痛便祕等與大柴胡湯腹部膨滿抵抗力強脈沉實便祕者與承氣之類其他凡食毒血毒水毒澀滯鬱積目的除在疏通而投藥方者之外從證可用當歸芍藥散大黃硝石湯大黃牡丹皮湯以上之方劑一度罹本病已經快者有再發之危懼者亦可選用之石膏劑有軟脈作用凡兼動脈硬化症者儘可從證運用之當歸芍藥散所以預防腦溢血甚有意外之效余於本方有去手足之希毗雷感消散眩暈屢能降下血壓一婦人患慢性腎臟炎最高血壓一百八十至二百服本方時必氣分良好而止有左手足希毗雷頭重眩暈又對於已襲腦溢血此後時之人事不省卒倒之一男子最高血壓在二百五十內外右手感希毗雷訴脫力與此方合大柴胡湯血壓從百六十下降發作消散目下能活動於業務而不見何種障礙至如何之證用當歸芍藥散望就藥方解脫篇考察之腦溢血之預防參照前章動脈硬化症條卒中發作陷於人事不省痰喘壅塞說者謂用瓜蒂散就余之經驗則推獎走馬湯紫丸之類但發作後數小時體溫上升及四十度者不論如何之脈症可斷言其絶無有效之藥又屢挾嘔吐豫後不良者余對於此種之劇症無相當之投藥但卒中發作至醒入於反應期中從證選用次之諸方心氣不安顏面充血頭痛煩躁體溫上升脈浮大動數或洪數者用瀉心湯葛根黃連黃芩湯口渴甚而煩躁者用白虎湯竹葉石膏湯之類煩躁不眠及下臍不適者用梔子豉湯頭痛頭眩強煩躁者用侯氏黑散煩驚發譫語不能轉側者用柴胡加龍骨牡蠣湯大便祕結者用調胃承氣湯若有上衝之氣味者用桃核承氣湯脈浮而無寒熱妄行獨語如狂者與防己地黃湯自知身體不能動亦不能發言語痛處不自感覺身體拘急不能轉側大小便變異者與續命湯麻痹搐搦久而未愈手足屈伸運動不自由者應用附子劑之定證也如選用桂枝芍藥知母湯真武湯近效方術湯桂枝加朮附湯桂薑棗草黃辛附湯八味丸之類金匱要略中風歷節病之條下選用千金三黃湯越婢加朮湯風引湯之類備考有持桂里之說中風古來殊無明辨始於素問病源千金外臺諸書其大意不過內虛風侵之意劉河間李東垣朱丹溪諸輩之論出與昔人不同其見識超絶千古依鄙見考之中風為內因之病無外來之邪實如三子之論但病發有由癇而來者由疝變者或由於瘀血結毒結毒分陳久黴毒第三期黴毒而來者其原因雖不一要之皆起於血氣衰敗也參連湯卒中風患心胸脈浮大數動者先與此方亦用瀉心湯瀉心湯此方能救急治緩亦能誠良劑也附子瀉心湯瀉心湯之症為但不欲食其甚時不欲食進飯藥即欲睡或手微冷等症亦同此方風引湯參照症候之治方第十一章古今録驗續命湯此病無盛熱但脈之浮者先取表亦宜故如續命湯等不可全廢如脈不浮熱不盛者猶可用此湯大柴胡湯中風腹滿拘攣者與此湯口眼喎斜身體不遂而緩言語蹇澀者此乃古方之妙用也烏頭湯從疝而變中風手足踡攣或半身不遂當用此方烏頭湯與續命湯同為發劑續命湯治脈之浮大者烏頭湯治脈之弦緊者此為吾門百試百效之法又按此方亦治踡攣續命湯治拘急不得轉側桂枝附子湯治四肢微急即緩與急少有相差率皆此類之症云真武湯此方治手足之振搖或喎僻口眼喎斜不遂其脈沉者黃耆桂枝五物湯血痹者血凝不流也此種之痹乃痹中頑麻之謂此方主治之大承氣湯食厥中有從宿食卒中風之症者此中風之萌起發於飲食滯留也故用吐下之藥後大多遍體現枯或言語蹇澀但其發時與尋常之中風異胸滿而痛呈苦悶狀者亟與大承氣湯攻之急要時用備急丸走馬湯療治茶談四十歲以上之人別無病象發洪大之脈者大多為中風之萌象速宜灸治服藥蓋此其前兆也叢桂亭醫事小言俄然眩暈而倒脈浮弦面赤色手足帶麻痹言舌少澀全為中風但自眩暈發者用白虎加人參湯或參連白虎湯眩暈非用白虎湯不為功三黃湯瀉心湯苓桂朮甘湯亦可適宜用之但非如白虎湯之有意外之驗也芳翁醫談偏枯半身不遂中風言語蹇澀者當與麥門冬湯加石膏此治大逆上氣咽喉不利師家之常法也大凡治偏枯中風一閒齊翁用石膏類聚方廣義中風卒倒人事不省身熱牙關緊急脈洪大者或鼾而大息頻頻缺伸者及醒起後半身不遂言語不能者或口喎斜言語蹇澀流涎泣笑不常者或神思恍惚者多用瀉心湯就食時之老人卒然暈倒人事不省者此際可認其心下滿與四肢厥冷面無血色額上流冷汗脈伏如絶其狀如中風者名曰食鬱食厥用附子瀉心湯為宜橘窗書影余嘗謂中風之實證者皆屬金匱之熱癱癇其重者用風引湯柴胡龍骨牡蠣湯去鉛丹加鉤藤芍藥甘草羚羊角輕者用四逆散加棕櫚葉紅花白殭蠶及抑肝散加芍藥黃連羚羊角而不全治者則至少其屬大小續命湯朮附指桂枝加朮附葛根加朮附等之症者即能生存亦不免於廢人耳第三十九章癲癇原因本病區別為特發性即尋常性癲癇與症候的即戛克松氏癲癇兩種尋常性癲癇定型的狀態起於人事不省及全身之間代性痙攣之發作由於腦皮質中運動中樞及精神的中樞之一時性充血而起症候的癲癇起於腫瘍形成出血膿瘍寄生蟲嵌入之骨片等刺戟腦皮質運動中樞見全身之間代性痙攣或限局性痙攣此症當特有之痙攣發作時神識往往全不消失其全身痙攣每節從同一肢部始特發性癲癇為頗頻繁之疾患女子罹此疾者比男子為多本病常與遺傳性有關但無世世蒙本病之襲來者本病之素因亦間有來於先天性凡兩親之有酒精中毒之傾向者其小兒易發癲癇尤以罹有酒精麻痹之傾向者為甚分娩時之障礙亦為本病之原因如分娩困難之情形等是傳染病亦為本病之誘因尤以黴毒為甚中毒亦為本病之原因此即中毒性癲癇是也其最頻繁者為酒精之濫用頭蓋之外傷全身振蕩亦往往與本病之發生有關聯精神的感動例如驚愕恐怖喜悅精神過勞等亦足誘發本病實際上極必要者反射的癲癇也此疾患從腦髓遠隔之臟器上起疾病由此疾病反射的作用感應於腦髓而起其著名者由於瘢痕組織之愈合致壓迫神經而起除去之則症如消散此其一例證也此外如鼻腔咽頭耳內之茸腫形成或耳內有異物糞便鬱積腸寄生蟲包莖包皮結石子宮轉位妊娠心臟疾患等亦招來本病焉症候本病初發於七歲及至二十歲之間癲癇之症候有次舉三種之區別甲重症癲癇本病來定型的癲癇發作其起時突然襲來或有呈一定的前驅症者此前驅症有遠隔性與直達性二種一遠隔性前驅症來於發作襲之數日以前患者易憤怒小事輒亢奮睡眠不安健忘症呈癡鈍之症狀二直達性前驅症又名攪風癲大多見於癲癇之後作以前數秒之時此攪風癲更有次之分類知覺性攪風癲起種種之知覺變常症瘙癢感覺冷感心窩苦悶腹部膨滿噯氣腹鳴等但此種疾患比較的稀有運動性攪風癲起筋肉之短縮攣縮或麻痹初發時每常在同一肢部從運動性皮質中樞之部位正規的波及於其他之肢部脈管運動性攪風癲起脈管筋肉之痙攣致皮膚之蒼白與厥冷感覺性攪風癲來自耳鳴耳響聲音難聽取不快之嗅覺及味覺視覺障礙等患者所現之色澤則紅色尤多有時見可恐之幻覺形體陷於暴躁癲癇發作大抵以號叫始患者俄然亡失神識而倒此神識之亡失程度頗強當患者發作之際雖其身陷沒於火中蒙劇甚之火傷尚屬不能自知發作起時顏面及全身之皮膚呈蒼白色全身之筋肉現強直性之痙攣經數秒時之後始見間代性之筋肉痙攣此際眼球振蕩遂回轉於肉上方顏面筋肉極度傾斜下顎骨與上顎骨互相接著移動於側方起強度之間代性鬥牙之音遠處即能聽得之舌輾轉於口腔內嵌入列齒之間屢遭損傷排出染著血樣之唾液而泡沫狀之唾液亦從口唇之間流出此恐系因咽下筋起間代性痙攣不能咽下唾液之所致背部筋肉之間代性痙攣亦現顯著之全身痙攣患者輾轉反側呼吸為不正之結滯往往放鼾聲咽雷樣之騷鳴肢部營種種運動拇指插下放其餘諸指中致拇指之伸展甚為困難筋肉收縮之力極強大往往發生脫臼骨傷等頭部筋肉之痙攣程度頗強阻礙頸靜脈之血行外頸靜脈現指節大之青色索狀物此外急性眼球突出強度之結膜充血顏面紫藍色等亦因同一之理而起皮膚上亦容易出血在強直性痙攣之時期瞳孔擴大在間代性筋肉痙攣之際則瞳孔縮小但光線上其知覺興奮性及反應則完全消失焉癲癇發作持續至十秒至五分鐘之間其後筋肉痙攣遂漸次緩解而至消失患者徐徐醒覺不自知其發作時之如何情狀也或一種患者於發作後無幾時即醒覺在發作之前覺心神爽快發作之後易憤怒帶亢奮性或發妄覺幻覺破壞身邊之物甚者放火殺人但醒覺之後仍屬不悟者此種狀態名曰癲癇後狀態此狀態間亦有亙數日而不消散者癲癇發作起於晝間者曰晝間癲癇反之起於夜間者曰夜間癲癇乙輕症癲癇本病尤屢現癲癇性虛神患者之顏貌俄然變蒼白一二秒時間之神識亡失患者或閉其眼或瞬其目或當步行寫字讀書奏樂裁縫等施行手技時若發作之疾患則忽然停止其運動及再現神識時經若干時之深息或缺伸始能再行運動但對於發作時之諸徵則不能自知焉癲癇性眩暈亦為輕症癲癇之一種患者起眩暈之發作身體曲屈或憑几以防其身之轉倒此眩暈發作亦不外來於輕度之神識消失之發作性也強直性及間代性筋肉痙攣若起於一二之筋肉其度弱或持續時間短神識消失之度輕者亦為輕症癲癇之一種丙類似癲癇症本症名癲癇樣狀態其種類甚多一行犯罪之事如壞亂風俗放火殺人等類似癲癇之徵候此時患者神識亡失所作之事醒覺後似知而不甚知者二屢現運動機之變調如向前直走不知所至或旋轉回環無所底止自己毫不知覺者此名疾走性癲癇三自過度之發汗而來者名癲癇發汗此外尚有癲癇樣之頭痛昏睡振顫失明神經痛偏側知覺亡失等之發作性病療法癲癇患者大概體格強壯之實證者為多若腹大滿而便祕脈沉實者與大承氣湯此證之患者為大食家消化力本強因侵入風邪等所致故與大承氣湯同時宜減食則發作之襲來自減頭重及其他之神經症狀亦可以消失若胸脅苦滿心下有急迫狀態脈沉實大便祕者與大柴胡湯如胸滿煩驚小便不利或胸腹之動加時與柴胡加龍骨牡蠣湯如更逆上不安不眠者兼用瀉心湯瀉心湯一方有鎮癲之效金匱要略中有藜蘆甘草湯之方其條下云病人常以手指腫動此人身體瞤瞤者藜蘆甘草湯主之此藜蘆甘草湯之方論已闕淺田栗園翁所著金匱要略辨正云以手指臂動之文義難通且方亦闕諸家亦無明辨余嘗診一婦人將按其脈此婦忽奮指臂撲余膝恬然無羞慚之色身體振振然動豫診斷為臟躁等於歇斯的里作甘麥大棗湯連服而不效久之加咳嗽豫此時遍查諸家方書得藜蘆湯而用之服後吐多量之痰涎舊患頓愈此藜蘆湯乃藜蘆甘草二味也依淺田翁之治驗藜蘆湯應用於癲癇但若用瓜蒂散吐而不效者用藜蘆湯亦無理也余前年診一婦人十數年來頭重心悸不眠時起癲癇發作陷於人事不省先治月經過少與桂枝茯苓丸頭重心悸不眠之患先消失矣參照症候與治方第十一章備考本間棗軒之說癲之病發於猝然因顛仆之故取其名焉癇之義未詳行余醫言中雲癇者病發簡慢之稱也未免強解史記酷吏傳有濟南瞷氏宗人三百餘家注中有瞷音間小兒之癇病也說文云癇者戴目能見也戴目為癇之主證故取名曰癇云其因多父母之遺孽引血脈而發者譬諸父母患癇者其子孫必患癇且傳其子孫之親族也中略癇之證候千態萬狀變化無極故有五癇八癇十二癇二十五癇之目皆本於病狀而名統而言之總而括之不過陽癇與陰癇之二證耳陽癇即屬急病卒然暈倒人事不省四肢搐搦經看護者之扶摸反致躁擾口眼喎僻鼓頷股栗一身無處不搖眼直視上竄口動牙關緊急水藥俱不入咽喉生閣閣之聲涎潮壅盛氣息高或吐涎沫或吐頑痰脈沉微四肢微冷須臾發熱出汗脈浮大搐搦亦止反覆缺伸如睡眠中高喚才應欲醒不醒醒則後發幾回陰癇即緩證也發於身體之一部但發一證不發諸證即諸證備者來時亦甚緩慢中略治法卒倒而牙關緊急四肢搐搦人事不省墜地如死脈存胃氣者必能回生先用三黃湯瀉心湯或參連湯或加熊膽或與回生散口噤不能入藥汁者可從鼻注入凡人事不省之病人會厭不蓋氣道飲食誤入肺中則卒死故藥汁宜徐斟酌用之缺伸而精神回覆發熱出汗脈浮數者抑肝散或加羚羊角為宜虛里之悸動高精神較復尚屬恍惚或驚或怯或妄語或不寐或瘛瘲不止者可用三黃湯加辰砂柴胡加龍骨牡蠣湯大柴胡湯加羚羊角侯氏黑散羚羊角等卒然口眼喎僻微腫變色者宜刺以去敗血或刺其絡且與涼膈散但喎斜而不腫者羚羊角為宜熱已解而眩暈未止心下痞鞕欲嘔吐涎沫或暖氣多出者用半夏瀉心湯加茯苓有神驗虛里及臍旁之悸動亢進逆氣屢屢衝於心下欲死者用苓桂朮甘湯或三黃湯茯桂甘棗湯奔豚湯等凡癇病用寒涼鎮墜之藥後氣逆眩暈頭項強四肢瘛凝或麻木或不遂或攣急或精神恍惚或憂鬱或悲傷或喜笑等之證荏苒久久不愈者沉香天麻湯為宜無癇之症候但日夜喜笑不止者是亦癇也甘麥大棗湯為宜回生散者香附子紫檀人參白檀鬱金甘草胡椒也抑肝散者柴胡甘草當歸川芎茯苓朮鉤藤也涼膈散者大黃朴消甘草連翹梔子黃芩薄荷藥也沉香天麻湯者沉香益智天麻防風半夏附子獨活羌活甘草當歸殭蠶生薑也傷寒類方柴胡加龍骨牡蠣湯能下肝膽之驚痰以主治癲癇必效惠美寧固一男子頭與兩手振掉不止已二三年腹中無異飲食亦無異常余思此仲景師之所謂四肢聶聶之類也與以防己茯苓湯而愈腹證奇覽癲癇吐涎沫見水而發者五苓散主治之見火而發者黃連湯主治之第四十章神經衰弱症原因本病發於神經系統之病的興奮及倦怠遺傳在本病之發生上大有關係此不獨為本病之遺傳即如其他之中樞性官能的神經病或器質的神經疾患凡家族中有此疾患者往往遺傳而生此疾有時先天性中亦有本病之素質例如兩親為大量飲酒者或受胎之際罹重篤之疾患者此等小兒即享受有本病之素因者也但本病大多為後天性疾患幼年期已有本病之基礎者例如在學校中因精神過勞過劇之名譽心體育之不注意濫行手淫等是慢性疾患尤其隨兼以津液之亡失者亦為本病之原因內臟下垂症亦屢屢誘發本病此外因頻繁之分娩長久年月之授乳亦能喚起本病症候本病之症候或俄然而來或漸次發生逐日而增加其劇度有時因主發於一二臟器之神經症狀呈如局處的臟器疾患之狀而致本病之存在者本病必發之症狀為腦性障礙此之謂腦神經衰弱症患者在精神的勞動之際容易倦怠感頭內朦朧頭重頭內搏動頭痛等思考力減退對於事物乏深思熟慮之力讀書之際對於書中意義不能瞭解由此等之症狀漸次增劇其度以後遇僅微之精神勞動即感疲乏漸致患者憂慮自力之微弱勇氣失喪嫌忌精神的事業或在當行之時露恐怖興奮及發汗等眠睡大受障礙就褥後不容易即睡即能入睡而時間甚短且睡中屢屢襲來不安之惡夢頭內朦朧及頭重成為久持性其進一步則頭目眩暈往往陷於恐怖狀態脊髓性症狀亦屢屢見之患者脊柱全部或一局所之疼痛但雖敲打或壓迫不發見其壓點此種狀態名曰脊髓過敏症又往往有薦骨部上灼熱之感者此外少數之患者有感軀體之周圍有帶狀之感覺此種患者往往抱莫非是重篤之脊髓疾患乎抑脊髓癆乎之恐怖如遇四肢之知覺異常或膀胱及生殖器機能之神經的障礙時則愈益增加其恐怖之念此外屢屢見瞳孔之不同但對於光線之反射作用則存在大多反比健康時為過敏膝蓋腱反射大多亢進但有時則減退甚或消失脈管運動性及分泌障礙亦為屢見之症候蒼白及潮紅相踵交發頗為急速又有發汗之傾向握其手掌往往有冷汗此外更招胃液分泌之障礙見分泌過多及鹽酸過多尿利亦大多增量其色透明稀薄比重亦低皮膚知覺變常症亦往往現之尤其多為蟻行感覺冷覺刺沖性疼痛灼熱等耳鳴耳響難聽眼火閃發視力減退亦為屢見之症候皮膚知覺過敏症及亡失亦為頻繁之症候患者屢覺筋肉疼痛步行不安容易蹉跌或在步行之際發劇烈之疼痛因此故欲久時就褥此即疼痛性無力症也患者又有食思缺乏或反之罹善飢症此外在攝取食物之際頗有不快之感覺持續於全消化之時間甚至現神經性消化不良症即胃部訴不快壓迫之感起胃痛惱胃部膨滿頻發鬱氣顏面著潮紅頭內有充血及搏動之感此外眩暈心窩苦悶心悸亢進等腸機能亦遭障礙腹鳴鼓腸便通不整此外患者有咳嗽刺戟喉頭之瘙癢感覺及疼痛有時發痙攣性失聲症或兼喘息樣發作尿中含有多量之燐酸鹽呈所謂燐酸尿之狀患者多數因膀胱知覺過敏排尿之頻數或反之感利尿困難此因膀胱壓縮筋衰弱括約筋因痙攣性收縮之故若括約筋麻痹則起尿之淋瀝生殖器亦屢見障礙症狀或患者色欲之亢進而交接之後心身又甚覺倦怠或恨遺精有時患者陷於色欲亡失症此外訴精神的陰萎精液漏攝護腺漏等療法吾人日常遭遇最多之神經衰弱症為胃疾患尤以胃內停水即胃阿篤尼症胃下垂症為最多此種患者最多所患之症狀為頭重耳鳴心悸亢進眩暈疲勞倦怠不眠食氣不振等胃中必有振水音之證明觸診於腹部覺抵抗甚少抵抗低而無力屢見腹筋之拘攣與臍下之動停水少而頭眩心悸甚者茯苓桂枝白朮甘草湯為宜豫數年前得下舉之治驗神經衰弱症兼有胃下垂佐世保市高木子二十七歲主證發作時襲來頭重與眩暈約三個月前發作甚激身體搖搖欲倒不能步行之狀態者居多暫時在夫之任地佐世保市不思歸鄉乞余診診時有胃之下垂症振水音著明從證與苓桂朮甘湯分五日服之服後尿量隨病之輕快而增加第六日步行來院更與苓桂朮甘湯分五日服之此後即不復來院一個月之後遇其母於途詢之已全愈矣録自古醫道若胃部膨滿噯氣食思亡失頭重心悸眩暈不眠等之症狀者與茯苓飲或其中用苓桂朮甘湯之合方又若心下痞鞕腹中雷鳴食氣不振便通不整之狀不眠精神不安者與甘草瀉心湯又腹部膨滿煩驚心悸亢進不眠吞酸嘈雜等之症者與柴胡龍骨牡蠣湯咳嗽刺戟喉頭有瘙癢感覺及疼痛或失聲症者與半夏厚朴湯遺精者可用桂枝加龍骨牡蠣湯八味丸當歸芍藥散天雄散之類陰萎者亦選用以上之方劑森立之翁用大柴胡湯治陰萎余亦仿之用大柴胡湯以救頑固之不眠動脈硬化症之原因呈神經衰弱症樣之症狀者應用梔子豉湯瀉心湯類者最多此不眠之治法可參照症候與治方第十一章金匱要略中百合狐惑陰陽毒病證治篇中百合之病古來說者甚少使用其中之方者亦稀今就百合病觀之論曰百合病者百脈一宗患其病致之也意欲食復不能食常默然欲臥不能臥欲行不能行就狐惑病觀之狐惑之病狀如傷寒之默默欲眠閉目不得起臥不安不能飲食聞食臭而惡其面目乍赤乍黑乍白蝕在上部則聲嘶以上二論為百合病狐惑病之症也其病象類似今日之歇斯的里神經衰弱症稀撲孔豆里之病備考類聚方廣義稟性薄弱之人色欲過多則血精減耗身體羸瘦面無血色身常微熱四肢倦怠唇口乾燥小腹弦急胸腹動甚逮甚熱不死何待若永服桂枝加龍骨牡蠣湯嚴慎閨房之事保嗇調攝庶幾可以骨肉回生否則惟有待死而已第四十一章歇斯的里原因本病為世間人人可知之疾病往時謂僅婦人發生者誤也本病大概發於春機發動期以後有時幼時亦見之本病往往現遺傳的疾患或與其餘之神經疾患併發其他如精神的興奮心身之衰弱諸種之中毒亦誘發本病症候本病症候之發生上有緊要之關係者為病的觀念故本病並不現存唯由想像而起尤其意思屢屢被其侵襲患者若能有除去本病疾苦之意思即能見本病之治愈故以本病為基因於大腦皮質障礙之定論見解頗為正當云本病之障礙起於諸種之神經範圍運動性知覺性脈管運動性營養性分泌性感覺性精神性症狀現其刺戟及麻痹徵候其起時或只一二之障礙或泛發全般之障礙至強弱頻疏等等則千差萬別渺無一定尤其此等之症狀往往或忽隱沒或忽出現一時看去為頗重篤之變狀而在瞬息之間或消散或輕快運動障礙中可記述者曰歇斯的里性麻痹歇斯的里性痙攣及歇斯的里性短縮歇斯的里性麻痹現偏癱狀或現截癱狀或現單癱狀又有偏癱中麻痹一側之知覺伴以失亡者顏面筋及眼球筋之麻痹極稀而喉頭筋肉之陷於歇斯的里性麻痹者則甚頻繁此外或由於膀胱壓縮筋麻痹而來滯尿或由於膀胱括約筋麻痹而成淋瀝至間代性及強直性筋肉痙攣亦屢屢見之其範圍持續及強弱則類別甚多極無一定又屢屢見眼瞼痙攣點頭痙攣搐搦性痙攣此外患者緊扼感覺從胃部或下腹部上行此恐系起因於食道筋肉之上行性痙攣故名曰歇斯的里球此為診斷上重要之症狀筋肉短縮在上肢特現於屈筋下肢特現於伸筋此外亦有現咬筋之短縮者此之謂歇斯的里性牙關緊急云又因項部筋之向偏側短縮致成斜頸之病舌筋之向偏側短縮致成舌之傾斜背筋之短縮見脊柱之屈曲者知覺障礙為本病頻繁之症狀就中以皮膚知覺亡失為最多此皮膚之知覺亡失或限局於一定之部位與皮膚神經之解剖的區域不合致或來於肢部之球狀或帶狀或胃及全肢或現其半側此名歇斯的里性半側知覺亡失云皮膚知覺過敏亦屢屢見之此亦與皮膚知覺亡失相伴而來或代之而來而在限局之一點知覺過敏者往往而然卵巢部為最頻發之局部所謂卵巢痛者是也此外脊柱亦發限局性知覺過敏尤以頸椎及胸椎為甚又屢現神經痛或諸般之知覺異常症而顱項骨之中央亦往往發生疼痛此之謂歇斯的里性頭痛其或有頭之中央限局性之寒冷者此名歇斯的里卵云黏膜之來自知覺障礙者亦甚多尤其最頻繁者為咽喉黏膜之知覺亡失而喉頭黏膜之呈知覺變常症者亦不少焉因此之故致成歇斯的里性咳嗽及歇斯的里性言語困難焉脈管運動性及分泌性障礙中可記述者為皮膚之蒼白色及潮紅並所謂青藍色浮腫及唾液分泌過多排尿異常青藍色浮腫來於上肢者尤多所患肢部呈青藍色如浮腫狀之腫脹排尿則數日間全閉此名歇斯的里性尿閉症此際則嘔吐多量之水樣物以代價之吐物中含有多量之尿素反之或在僅少時日之間排泄多量之尿其尿如水樣之稀薄比重甚輕此之謂痙攣尿此外由於胃腸黏膜之分泌障礙而成胃液分泌過多症鹽酸過多黏液性下痢及膜樣腸炎有時因皮膚之血管破裂致溢出血液名曰血汗此外或髮香汗症或胃及氣管枝黏膜之出血現歇斯的里性吐血及喀血者五官器能障礙中尤屢屢見者為視野縮小就中對於緑色之視野狹小最為頻繁或來色盲弱視及黑視往往現於偏側有時來偏側之難聽或耳聾或耳鳴耳響耳躁有時來嗅覺過敏症嗅覺亡失症嗅覺錯誤症味覺過敏症味覺錯誤症及味覺亡失症此外有時見喘息狀態心悸亢進厄逆噯氣胃痛腸痛腸鳴鼓腸等精神異常亦屢屢見之患者甚易興奮或反之其性遲鈍呈無欲狀態本病症候之發生上最緊者為意思之缺乏即患者或不直立或不能步行或欲行而不行但臥時頗能營強大之筋肉運動或有數年間臥於病床而不步行者因步行時有劇甚之疼痛也此症名曰疼痛性無力症此外應特書者為筋肉痙攣之歇斯的里發作此名之曰歇斯的里性癲癇此歇斯的里性癲癇之強弱持續與夫頻疏之分甚無一定其狀類似癲癇髮間代性筋肉痙攣然與癲癇之發作有異其神識不亡失不過稍稍朦朧而已療法本病症狀雜多既不統一亦不連絡從證用藥亦不遑枚舉茲僅能舉其日常多用之方劑如半夏厚朴湯非治歇斯的里球而治痙攣麻痹者也對於歇斯的里性言語不能症歇斯的里性喘息歇斯的里性咳嗽歇斯的里性發汗過多歇斯的里性唾液過多歇斯的里性嘔吐等均得治之余鄉里中有一農家之婦人患以上之症狀而不能步行且以上之症狀互相出沒數年之間醫治無效與此劑收神效其次為甘草瀉心湯此方從金匱要略狐惑病之論運用之此外如苓桂甘棗湯甘麥大棗湯奔豚湯之類可以預防歇斯的里性癲癇歇斯的里之發作與根治參照症候與治方第十一章及神經衰弱之條第四十二章赤痢本病主流行於亞熱帶及熱帶地方特徵為腹痛裡急後重排泄血樣之黏液便為傳染性之大腸疾患原因本病因食未熟之果物而誘發者往往有之但如此攝生之過失雖不常發本病然實可助長阿米巴或赤痢菌之繁殖也症候本病之潛伏期長短不定但大概在一周間至重篤之症則其期甚短赤痢症狀中最重要者為便通及糞便之性狀患者之便意頻繁襲來往往一晝夜間便適達八十次乃至一百次加之強激之便意窘迫之感覺患者身體有不能離便器之狀態此狀態名曰裡急後重但每次之排便量極微大多不足一食匙便通之際大多以腹中之雷鳴與下腹之刺痛為前驅檢視肛門其開口往往深陷沒於內方以指插入肛門時肛門括約筋為痙攣的收縮覺有絞扼樣之感此際患者有劇烈之疼痛此外在排便之際腸內容物觸於括約筋上有疼痛難堪之感赤痢之糞便甚稀薄但初期往往雜以非常硬之糞塊加答兒性赤痢在糞便中屢屢有血點或在血緣見混在之黏液塊此外發見蛙卵或膨脹之砂吾米類之黏液塊一日中糞便之量達一立其大便漸次失糞臭放類於精液之臭氣化膿性赤痢在糞便中見有膿之混在其膿中屢屢有黃色之碎屑及斷片放置於便器內則沉降於器底壞死性赤痢其糞便含有多量之血液或類似赤肉之水性浸出液或見纖維素性肺炎之鐵色痰之樣有時其便呈帶黑色放腐肉樣之惡臭體溫在疾病之初期升至三十八度以上或三十九度大多經二三日其熱始解但須持續至一周或一周以上始復平溫脈搏頻數顏面早枯瘦眼目帶灰色之陰影狀舌乾燥生舌苔口中發惡臭此外食欲亡失同時口渴增進往往惱噯氣噁心嘔吐腹部則其初屢屢膨脹但漸次陷沒觸診至左腸骨窩字狀彎曲之部覺一致之壓痛且每常證明有硬固之索狀樣之腫塊此腫塊在初期為有痙攣性之收縮腸管經日則有浸潤之情形者為多赤痢在數日內或二三周內即可治愈但亦有移行於慢性赤痢者阿米巴性赤痢大多排泄混在暗紅色血液之液狀便通常為慢性之經過赤痢之併發症可分二類一為直接從腸之變化而起所謂有局處性者也一則起於發炎病素侵入遠隔器官所謂赤痢轉移症者是也一局所的併發症有限局性或廣泛性腹膜炎直腸周圍炎完全直腸瘻等二赤痢轉移症中其最頻繁者有肝臟膿瘍與多發性關節炎在阿米巴赤痢之際肝臟膿瘍尤多頻發此病除發生於赤痢病狀之際外在赤痢病治愈後始見有時與肝臟膿瘍同形成肺膿瘍多發性關節炎大多類似急性關節洛伊馬基斯在種種之關節上起腫脹灼熱及疼痛有時一二關節上來化膿其結果起全身腐敗症或關節之強直此外現耳下腺炎神經炎脊髓炎亦赤痢中之經過也療法發病之初期與葛根湯務叮嚀使其發汗可奏意外奇效裡急後重肛門括約筋有痙攣的收縮傾向之際觸於字狀彎曲之部屢屢有一致之便固之索狀物對於壓多過敏者此際與桃核承氣湯能緩解窘迫的症狀口渴口臭舌現黃苔而乾燥心下痞鞕胸脅有苦滿之狀者用大柴胡湯全身有熱感尤其肛門灼熱裡急後重者與白頭翁湯病勢進步見黏血便或膿血便身體疲勞而猶裡急後重不止者與白頭翁加甘草阿膠湯若噯氣噁心嘔吐者運用小半夏加茯苓湯小半夏湯加黃連生薑瀉心湯之類大勢挫後從證選用小柴胡湯小柴胡湯合三物黃芩湯黃芩湯甘草瀉心湯人參湯之類併發症之治療甚多參照各疾病之條下備考本間棗軒之說最初惡寒發熱脈浮數腹中痛水瀉下痢及五六次忽現裡急後重不快利之狀數數上廁但大便不出唯見如涕如眵之腸垢與血交下或竟下血舌上出白苔或渴或嘔而無食思小兒經二三日腹力易脫大人亦比他病亦早露疲勞其初邪氣著腸用發表之手段可取全效凡有惡寒脈浮數等之表證者其先頻服葛根湯其次與黃芩湯加葛根黃連即黃芩湯與葛根黃連黃芩湯之合方也此於治熱痢有奇效下痢漸次多腹痛甚稍見脫狀者選用桂枝人參湯或逆挽湯諸症下痢舌不生苔但痢赤痢之意有白苔或黃苔其毒深者見黑苔或乾燥欲裂或譫語腹微滿而撮痛數數上廁裡急後重甚離廁則便意來甚或長居廁間不欲相離所下者皆系膿血腥臭如鱁𮫿遂致脫肛不納強納之復忽脫此症世稱疫痢實別於普通之痢痢之重症者也傷寒論下痢譫語者與小承氣湯其先宜蕩滌之而用合璧飲保命集及溫疫論所載芍藥湯感證集腋之檳榔順氣湯均可選用之裡急後重者不妨加檳榔木香但不及大黃為有效耳中略每日發潮熱渴欲飲水不思食物或乾嘔或不能飲苦味之藥小便與大便時同出外此別無小便且澀滯而不快利者柴苓湯為宜前件諸證俱備且腹微滿而急痛裡急後重甚者與大柴胡湯經日熱已下下痢亦從減但下多膿血似臟毒者傷寒所謂便膿血桃花湯之證也可用千金之大桃花湯或春林赤石脂湯為宜患痢數十日熱既解唯下痢不止者真人養臟湯為宜或與補中益氣湯間服阿芙蓉或灸天樞痢疾愈下愈疲病家思欲早早制止買服調痢丸痢病丸活兒丸等之鴉片劑下痢雖立止但卒然腹滿嘔吐四肢逆冷諸證並起至於死者往往有之續瘍科祕録辨其害云痢毒著腸數數下痢有如淋疾小便頻數掃除其毒而下痢不止此時若與澀藥以止其下痢所得大害為必然之事卻宜報以下劑除去其毒則下痢亦從而減矣下略逆挽湯者桂枝人參湯合茯苓飲去橘皮也合璧飲者小承氣湯合黃芩湯也保命集之芍藥湯為瀉心湯合芍藥甘草湯加枳實當歸木香檳榔溫疫論之芍藥湯為芍藥當歸檳榔厚朴甘草生薑此中或加大黃檳榔順氣散者小承氣湯中之枳實代以檳榔加芍藥也柴苓湯者小柴胡湯合五苓散也千金大桃花湯者桃花湯合附子理中湯加當歸龍骨牡蠣芍藥去粳米也補中益氣湯者小柴胡湯去黃芩半夏加白朮當歸陳皮升麻黃耆也春林軒之赤石脂湯者其中加石脂也養臟湯者芍藥當歸人參白朮肉蔻肉桂甘草木香訶子皮罌粟谷也有持桂里之說痢之初發不忌脈之浮數但痢之末期則忌浮數大冢曰初期之浮數者表證也有太陽病之脈狀故不忌浮數末期之浮數者陰虛證也例如四逆湯輩之脈狀故忌之細數者不可為也痢之脈不沉實者善候也萬病均以脈為目的其中尤以痢疾須以脈為標準故此病如見惡脈斷不能視為輕症論曰脈沉弦者下重之候也沉弦者內中積滿之候也通例下痢之脈常微弱今見沉弦者病毒積滯之故也故疝癖亦見沉弦之時內有毒也疝亦有下痢之症者有下重也是以虛極之症亦有下重者施治得見功效雖似陰症而下重者畢竟為陽症也痢疾而嘔吐雖極虛者亦多得治因嘔吐亦起於內中有毒故也虛極而嘔吐但不下重者是為不治之症病人入於醫者之手凡嘔吐而又下重者十中能救二三此症北尾春圃諄諄告人不宜用附子而宜用白頭翁之類或用下劑桂枝湯吾邦指日本自國近來行古醫方者對於痢疾有專用葛根湯之趨勢自謂已闡明醫道此說一起世之刀圭者流遂誤會其旨對於痢之初發者輒不詳察其脈症無方不用葛根湯矣此實可謂疏忽之至蓋此病初起有發汗者有不發汗者發汗者之中有桂枝之症有葛根之症豈能一律局定一方故發汗者可從太陽病脈浮雲云之章可下者可本少陰病自利清水云云之條治之葛根湯痢疾發熱少腹痛強者用桂枝加大黃湯為宜若熱強而腹亦痛者用葛根湯為宜又葛根湯之證為熱度增強自汗出不惡寒腹稍痛脈甚者用葛根黃芩黃連湯為宜表症解後病情較輕者用黃芩湯加大黃黃連為宜中脘猶覺有物如滿之氣味者用厚朴七物湯若或心下強痛大便中交下赤色之物時用大承氣湯為宜若用葛根湯後脅下痞鞕滿者用大柴胡湯倘熱不解時用柴胡加芒硝湯便血甚者用黃連阿膠湯服後猶不止者與桃花湯若便糞如膿者黃芩湯為宜又有一種熱強而不渴者此乃白頭翁湯之證非用下劑之症也凡痢疾大抵有毒在毒未盡時切不可用神丸阿芙蓉木香黃連乳香沒藥沉香須待毒盡用之則佳以上為陽症之要訣至於陰症方面則用真武湯附子理中湯之類在用真武之時機可兼用神丸功效可以早著又有因於瘀血者其腹痛與平常異往往痛於少腹下腹汙物呈紫黑色此病以桃核承氣湯為宜腹中不痛但下瘀物者用當歸四逆湯桂枝人參湯初起泄瀉見症候與治方第三章下痢之條與痢疾混合或泄瀉一兩日遂下膿血之痢者用此方甚宜葛根黃連黃芩湯黃芩湯黃芩加半夏生薑湯河間芍藥湯黃芩湯去大棗加當歸黃連木香檳榔官桂大黃黃連湯此方以腹痛而有嘔氣為目標此腹痛之部位從心下至臍上半夏瀉心湯參連湯蘗皮湯黃柏梔子黃連阿膠又一方中加烏梅此方應用於膿血痢之熱甚者白頭翁湯白頭翁加甘草阿膠湯大柴胡湯四逆散用大柴胡湯後熱勢大挫但猶腹痛拘攣者用此方甚宜厚朴七物湯調胃承氣湯三承氣指大小調胃之三承氣湯之內製裡急後重之力以方為最大柴胡湯白頭翁湯之症窘迫已愈者用此方最宜大承氣湯此方正面之主治比於厚朴七物湯但無外症而腹滿強者用之腹滿強亦痢毒之愈甚者也大承氣之腹痛在上痛不甚劇亦有在少腹下腹者非此湯所主治也下痢已差後更經年月日而間之復發者大抵此湯之所主治也此外休息痢而有腹候者亦此湯之症也休息痢者病愈而復發發而愈愈而復發之病也桃核承氣湯大黃牡丹皮湯桂枝加芍藥湯小建中湯錢氏白朮散人參白朮茯苓藿香木香甘草葛根小兒之痢大半解而不令解口乾而渴者早用白朮散為宜桃花湯此方用於膿血痢之久久不止便有膿血小腹痛者為宜此膿血痢有陰症與陽症之別陽症適用蘗皮湯白頭翁加甘草阿膠湯陰症適用桃花湯痢疾久則成陰症之狀其痛在大腹者用理中湯四逆湯白通湯此際不可用赤石脂禹餘糧湯之類又曰久而腸不滑只下真之膿血者桃花湯之正症也下重雖亦有裡寒症但可決為概系熱症亦有痢中始終不痛者此時以逐毒為宜逐毒而下痢止亦不後重但有下重又遺屎者遺屎為十度中之二三度亦以止後重遺屎為宜大概陽症中多赤物少白物裡寒而用赤石脂之時則交下白物者為多此名滑腸不後重也真武湯此方運用於痢疾而具種種陰症者凡自利而不自覺其下者或小便不便腳上有腫氣者痢之見真武湯證之一二例者或遺屎者多為此方之症遺屎無陽症中風癇等陽症之遺屎因身不自由而致與此症不同凡痢疾泄瀉之遺屎十度內不過一二度倘越三度則非陽症是陰症也且此亦不限於痢凡熱病下痢恍惚欲上便器而已不自覺其遺屎者倘越三度以上即為真武四逆之症矣真武之證有舌證其舌十之七八有純紅痢疾遇舌赤者惡證也初起即有是種狀態者必至危險其狀先淡紅自後恰如産後之舌而有滑澤此舌如見渴者極惡之證也是故痢疾應知舌之白乎黃乎抑為黑乎而決定其吉凶白通湯真武湯不效益近於脫症而下痢猶不止即如神丸或赤石脂禹餘糧之類不能治者與此方有偉效駐車丸黃連乾薑當歸阿膠此方對於痢毒未盡而成陰症裡寒者用之為宜大體陰證所下之物亦如陽症之下魚腦髓或輕之膿血凡無此者可與此方此方對於下物之色之目的甚宜而於産後之痢尤宜白頭翁加甘草阿膠湯症也此方對於陰陽合併之症也俱於産之痢疾有特效香連丸黃連木香肉豆蔻此方能止腹痛有除後重之力紫丸紫圓以上為桂里翁痢疾論之大略自古以來對於治療痢之學說言者甚多豫信桂里翁之諸說最為剴切故不厭其煩詳為引說雖方之取捨選擇視乎其人然苟能熟察翁之所說達痢疾治療之奧義豫敢信其決能奏有效之途徑也大冢證治準繩仲景之建中湯指小建中湯無赤痢白痢舊新之區別但治腹中之大痛者有神效其脈弦急或澀浮而大按之空虛或乏舉按之力者有此湯治之入門良方小承氣湯對於痢之初發積氣甚盛腹痛難耐或不脹悶裡急後重度度入圊廁而不快通窘迫之甚者甚相宜名醫方考桃仁承氣湯實為痢疾初起主治之藥或其初已失與下劑之時期反用收斂之藥致邪熱內蓄不能血行腹痛甚而欲死者急此方攻之外臺祕要方赤痢或白痢日下痢數十行者不問老人小兒以甘草一味水煎頓服之為宜魏氏家藏方二宜丸甘草乾薑湯治赤白痢有效以蜜丸服之津田玄仙之說痢疾中有邪實之痢腐肉之痢二證之分至為緊要苟不知此點決難無過邪實之痢者諸邪會集於大腸下青白等之穢物外證不熱脈實而數口渴舌有苔有種種之實證入廁必若於有後重之氣味是證宜用傷寒論之白頭翁湯或芍藥湯或芩連湯等涼劑去邪之品味以去其會集之腸邪此則無論何人無不知為痢病正面通治之法也腐肉之痢者大腸中之氣邪不下則元氣虛脫大腸之內皮因之而腐其肉下落致成腐肉痢之虛證血亦隨之而多下此極虛之危症也其外證亦手足厥冷好熱湯與冷物脈勿論已即其他各方面無處不呈虛證後重比之邪實之證且甚之糞中向無臭味此為虛實分別之大概但邪氣之中因元氣虛而下赤肉者其時必從邪氣之脈而不見虛脈此時世醫往往難辨虛實遂用錢氏白朮散以敷衍之抑亦不思大便中下膿血之點滴者非腐肉痢之下地乎輕者桂附之中加相當之劑重者與溫補劑決無所用其疑焉類聚方廣義痢疾有大熱腹滿痛如錐刺口舌乾燥或唇舌破裂大便一日百數十行或便中交下膿血者大承氣湯主治之東郭醫談桃花湯有用於痢病之心得有裡急後重晝夜六十行之症用此湯後翌日便膿血止呈水瀉樣晝夜十行或五六七行甚者便膿血之人而便血赤石脂亦有大效桃花湯在痢病之治發熱甚時間不用之半熱之時用之即有效故少陽篇之桃花湯條有從二三日至四五日云云豫用桃花湯並不用湯而用散藥以白湯吞之少陽病等難用附子之症每煎用真武湯而兼用桃花湯之散云桃花湯方之命名其義有二一因此方所煎之湯其色似桃花一則因赤石脂一名桃花石之故時還讀我書痢疾之渴者大多好飲極熱之湯此際用寒下之劑為宜至欲熱屬陰之說可以不拘寒下之劑如大黃芒硝性寒而下達之劑也手足逆冷手尖冷者熱證也陽脫於上熱痢下而不下虛極者必手冷至肩足僅不過踝此證宜用溫補之劑證治摘要痢下久久不愈心中悸煩臥不能睡便中不混膿血者黃連阿膠湯為宜痢疾已久腸中裡面之外皮腐爛下赤白如魚腦之痢者速與大黃牡丹皮湯或薏苡附子敗醬散第四十三章霍亂霍亂之主徵為急性吐瀉其狀疑似虎力拉本病或為傷食之一種或有暑氣侵襲之傾向本尾臺榕堂所著霍亂治略編於此編其中有乾霍亂者乃腹痛煩悶而不吐下之症也本章則就吐瀉為主徵而說述之原因本病大多在酷暑之候從飲食之不攝生而誘發本病之病原菌不明症候本病現於俄然之間有時以全身倦怠食思不振嘔氣等為前驅本病大多起於夜間患者因心窩苦悶及嘔氣等打破睡夢腹部感雷鳴及疼痛頻發下痢病勢增加則起數次之嘔氣數小時之內達二十次乃至四十次所吐之物及糞便與虎力拉之物無甚區別因之患者呈重篤之虛脫症狀皮膚厥冷被以黏稠之冷汗鼻梁隆起眼球陷沒至呈所謂虎力拉性兔眼脈搏頻數且細小心音幽微此外患者有極甚之煩渴有掣痛性筋痙攣之苦體力尚存者其煩悶之狀實不忍卒觀其痙攣與虎力拉之情形同發於腓腸筋者最多尿利大減其量甚至有時閉止本病通例常亙二十四小時至十八小時之持續吐瀉漸減其度口渴止皮膚復平溫筋痛消失脈搏復故利尿量增虛脫之狀態消散反之至致死的轉歸者則吐瀉亦止但患者發現不快之厄逆煩悶其虛脫之狀愈形增加皮膚厥冷之度亦增脈搏益益細數心音不能聽得遂至死亡療法其初腹痛二三日或四五日之間日日行三五次之下痢者大多無甚大患可以治愈腹不痛而痢暴下者皆篤劇之症也其腹痛者乃正氣排斥邪氣邪氣相距故發痛也不痛而暴下者邪勢甚劇正氣不能相持譬之弱將遇徑敵未及一戰即棄戈曳甲而走也初期中不論腹痛寒熱之有無如見其機宜早用葛根加朮湯溫覆之使十分發汗則嘔吐不發若嘔吐已發而不甚者可自由施行後之措置蓋此病一發嘔吐即不能納藥用盡心思無適當治法故往往死焉故在初期中看護者宜叮嚀病人喻其速發大汗若已見嘔氣者葛根加半夏湯中用加倍之生薑發汗可愈毒不甚者始終用葛根加朮湯自能恢復發汗後下痢不止心下痞鞕腹痛而小便不利好熱飲者用人參湯下痢甚四肢微冷或惡寒者人參湯中加附子前證而發熱惡風四肢惰痛者用桂枝人參湯下痢發熱口舌乾燥渴而好冷水或飲後即吐者用五苓散茯苓澤瀉湯等冷服之嘔吐極甚而不止者先用小半夏加茯苓湯生薑半夏湯等冷服之使止嘔吐最為緊要嘔吐不止但對於適當之主方無用或嘔吐不止下痢甚一切藥汁均不能入者用溫石溫其腹部腰部在神穴天樞關元等穴數數以艾灸之炷大為宜其灸以腹內溫胸膈鬆開嘔氣亦止為度又嘔甚而心胸煩悶挾蛔蟲者能體認其狀情兼用烏梅丸為宜下痢甚且嘔腹中水鳴或腹痛小便不利四肢冷或有攣痛者真武加半夏湯即真武湯小半夏湯之合方為宜下痢不止厥冷煩躁四肢轉筋腹拘攣面色青肉脫眼凹聲嘶者四逆湯從證用四逆加人參湯下痢轉筋益甚厥冷過臂膝精神衰弱脫汗如綴珠脈細微或沉伏不見者用通脈四逆湯前證而心胸之氣閉乾嘔煩躁甚或發厄逆者通脈四逆加豬膽汁湯為宜此證多死若下痢與乾嘔均止厥冷煩躁轉筋自汗厄逆不止小便不利者茯苓四逆湯為宜此證亦多死但用此方後若小便通利大便之色帶黃味諸症漸次退者回生之機也吐下厥冷漸減心胸中發煩熱渴而好飲冷水者用石膏黃連甘草湯白虎加桂枝湯為宜若心下痞塞者與白虎加人參湯前證中加乾嘔痰喘或厄逆者竹葉石膏湯為宜吐藥者冷服納之諸方皆然若胸腹鬱熱吐渴均甚且煩躁者與冷水則煩躁能穩嘔吐能止初起發熱身體解惰腹痛或拘攣微利者是無大患用桂枝加芍藥湯溫被覆之使發汗可愈腹中結實而痛者用桂枝加芍藥大黃湯反能快通而止下痢若寒熱往來胸滿嘔吐心下痞鞕腹中拘攣或腹痛下痢者用大柴胡湯此病對於腹中凝結阻滯宜早疏利腹中和則下痢自止譬猶表證者用葛根加半夏湯以發汗則嘔與下痢自止同一理由嘔而心下痞鞕腹中雷鳴下痢或下痢中雜血者與半夏瀉心湯嘔吐劇者用生薑瀉心湯心煩不安者用甘草瀉心湯口渴而不嘔吐便血不止好飲冷水者與白頭翁加甘草阿膠湯為宜嘔吐下痢為此病之常態能審寒熱虛實選用甘草乾薑湯附子粳米湯吳茱萸湯黃連湯乾薑黃連黃芩人參湯為宜嘔吐甚時灸神穴天樞等穴藥中加伏龍肝之煎汁煎而冷飲之或即用伏龍肝一味之煎汁待能稍納藥汁再用本方適當之藥其中仍宜兼用止嘔之劑發斑疹或疙者選用葛根加石膏湯葛根加朮附湯麻桂各半湯大青龍湯使斑毒十分排托以防內陷斑之形狀大小不同其色紅鮮者吉紫黑者凶斑黑者從尺澤委中兩穴放血為宜即無斑而身體之血色黯紅者現青筋紅筋者多血之肥胖者皆以放血為宜但多少方面宜加酌量為是吐瀉後大熱煩躁譫語大渴舌乾黃黑心胸苦悶不能安眠大便祕閉或變泄痢下重等之證者隨證選用白虎湯大柴胡湯大柴胡加芒硝湯調胃承氣湯大小承氣湯病證轉變不隨施治之法者無起死回生之望平素好酒肉者或平素大便祕結者或病前數日大便祕結停滯於腹中者或平日貪啜水面果物者或一時痛飲過食者或在傷食病中感受厲氣者均隨其症選用備急丸紫丸瀉心湯調胃承氣湯大小承氣湯以逐除宿毒之停滯能驅出闖入之邪氣下痢自止矣又水毒穢物停在胸膈胃中欲吐而不能吐者用瓜蒂散為宜備考傷寒六書霍亂而不吐下腹痛甚頭痛發熱者與桂枝加大黃湯下之此名乾霍亂死者居多千金方小青龍湯治婦人之霍亂者也外臺祕要方霍亂而四肢逆冷吐少嘔多者附子粳米湯主治之肘後方梔子豉湯對於霍亂吐下之後心腹煩滿者有效聖濟總録半夏人參湯與大半夏湯同對於霍亂逆滿心下痞塞甚宜和田東郭霍亂中用巴豆劑或備急丸之症其脈閉而有力腹之上皮或有力或無力此因濕熱鬱結於內故見上厥或吐利吐而不利或煩躁悶亂反覆顛亂者用之此條見乾霍亂之治方證治摘要因暑而身熱口乾煩躁心神恍惚小便赤澀大便泄瀉者五苓散為宜自己按之而水瀉下痢者加滑石有效轉筋者理中湯中加石膏脈沉細轉筋煩躁發熱者亦當以無熱治之大抵霍亂而口渴轉筋者熱症也四逆湯證亦轉筋者但不甚輕耳霍亂而四肢厥冷吐少嘔多者用附子粳米湯心下痞者用甘草瀉心湯第四十四章腸窒扶斯本病起於固有之窒扶斯菌呈一定之熱型及腸症狀大概經過一定之期日變為急性傳染性疾患其病狀之經過與漢法之傷寒一致故可云傷寒之治方即腸窒扶斯之治方原因本病之病原為窒扶斯桿菌主犯二十歲至四十歲之壯健者而家族之罹患者尤易為本病之素因症候本病之潛伏期為八日乃至二十日前兆期或全缺如或者惡寒及不整之輕熱全身倦怠食思亡失不眠及神經痛而後頭神經或三叉分歧之神經其痛尤甚而大腿筋之疼痛者亦極多由前述之諸徵候因一回之戰栗或頻回之惡寒即現稽留熱自後呈窒扶斯之症狀即窒扶斯舌薔薇疹窒扶斯性下痢脾臟腫大窒扶斯便及血清反應等本病之熱通例有固有之經過此為診斷上重要之事在發病之第一周中腸黏膜之淋巴濾胞罹髓樣腫脹之時期熱漸次如階段之升騰第二周髓揉上浸潤腸淋巴濾胞上形成壞疽及窒扶斯腐痂之時期中熱達三十九度乃至四十度之稽留第三周腸黏膜上形成潰瘍之時期中一日中之體溫著著變化第四周窒扶斯潰瘍上形成瘢痕之時期中體溫之升降更為著明此際一日中最高之度與前同一而最低之度則漸次低降其後熱度漸次下降終於平溫但此熱型亦有呈種種之破格者此疾病之強弱與併發症之有無及輕重有關無併發症之輕症其稽留熱之持續甚短小或全經過不短小而熱不稽留常為弛張狀態腸窒扶斯之脈搏比之體溫之數少體溫雖高至三十九度以上而脈搏則屢屢在百之內外又重症患者之脈搏在經過之後半呈顯著之重搏性回覆期中更有顯然之重搏性或帶三搏性此外口渴食思缺乏呼吸數之增進及尿量之減少等皮膚在前半期中乾燥而且灼熱但至第四周中屢屢見多量之發汗因此皮膚上現多數之結晶性粟粒疹就中以下腹部之側面尤甚以手撫摩之能獨知無數微細之粗糙面舌因展出之故著著振顫且在發病之初日舌大抵黏著濕潤從舌背上至尖端現灰色灰黃色灰褐色或煤灰色之苔近於第一周之終末舌上乾燥且現非常之赤色屢屢現煉瓦狀之赤色在第一周之終末皮膚上現赤色類內形之斑即薔薇疹其大平均如豌豆大多微微隆起以指壓之則消退此斑最初發現於胸部與腹部之境界經驗上常發於脾臟及肝臟部但亦有發於其外之腹部及胸部並及全背有時亦生於頭部及四肢至發生於顏面者則甚鮮其數亦非常不同往往與窒扶斯流行之性質相異此薔薇疹之發見為腸窒扶斯之正規在診斷上極為重要每個薔薇疹之存在為三日至七日消失後皮膚稍稍落屑有時熱全消退後又來新恢期而發生薔薇疹者窒扶斯患者之腹部恆有輕重不定之膨滿此因腸管內發生多量之瓦斯所致又回腸部往往對於壓感甚鋭敏按壓之時發生鳩鳴之音此音即名為回腸音此因液狀之內容物及氣泡充盈於腸管內壓之則起是聲之故也脾臟在第一周之後半以後則肥大大便在發病之初日大多祕結通例當第一周之終末始大痢從此以後一晝夜中排泄二回或至六回之稀薄便窒扶斯患者之糞便呈黃緑色阿爾加里性反應靜置之則有淡黃色麵包心狀之垽渣沉降其外觀似豌豆羹汁故名豌豆羹便云窒扶斯患者之面貌屢屢為極特徵的所謂窒扶斯面貌者是也窒扶斯性之面貌究屬如何記述之雖甚困難但患者對於外界之刺戟毫無反應呈所謂無欲狀態口稍開放目取第一視位不稍振動此外則患者之舌展出其挺出之舌振顫久而不退入本病有時見再發此再發之所以恐系患者從外部新得病毒加以留存於局處之傳染毒以為誘因致發動而起此誘因為過早離床飲食之不攝生及精神的亢奮等亦有不得何等誘因之證明者初病與再發之間經過無熱之中間期極不同又屢屢當最初疾患經過未了之前更見體溫之升騰者此種情形名曰再燃與真正之再發有別再發之持續時間甚短且其症狀亦較初病時為輕快腸窒扶斯之異常症有電擊性窒扶斯頓挫性窒扶斯輕症窒扶斯無熱性窒扶斯逍遙性窒扶斯等腸窒扶斯之併發症一或者全身傳染之輕重及疾病之持續有異二或者腸壁上與潰瘍的機轉有關聯三或者窒扶斯桿菌或其他發病素侵入之結果而來其中尤以連鎖狀球菌及其外之臟器被侵入為甚一重篤之全身傳染往往現腦官能之障礙故此時有腸窒扶斯代神經熱之名稱患者昏懵且發不穩之譫語甚至舉臂亢奮高聲罵詈亂打自己之周圍逞其暴力口吐噴沫監視稍怠輒從病室逸走或自窗轉落之街此種狀態往時名敏捷性神經熱反於此者名曰遲鈍性神經熱云考察陽與陰讝語與鄭聲之區別遲鈍性神經熱之患者昏懵但其狀態安靜只不過喃喃發不明之言語故名喃語性譫妄此症之患者與外界全無干與不要求飲食物飲食物須經旁人之催促膀胱過充非經他人催促不排尿雖其體位最不便宜亦能亙數小時而不變有時一二手指為痙攣的動且手背及前膊上之腱亦跳動此所謂腱跳動或以手指撮引被褥恰如撮絨毛之狀此之所謂搜衣摸床其次為衰疲性靜脈栓塞此在左股靜脈最審見之此症現腳之疼痛冷感及衰弱患部上之皮膚現水腫呈皮膚靜脈之擴張及蛇行皮膚之溫度低降二基因於腸漿膜之炎症及潰瘍性變化之併發症中第一者為下痢之增進或窒扶斯患者於草四小時內排泄十回至十五回之稀薄便致生衰弱死亡之危險此外持久性便祕亦算入併發症中此因容易誘起窒扶斯腐痂之剝脫及腸出血甚至腸破裂故亦頗為嫌忌之症有時竟致發脹鼓脹此因瓦斯過充腸管為下腹膨脹示破裂之狀橫隔膜肺臟及心臟強排壓於上方往往生窒息死之危險腸出血大多起於第三周以前此因窒扶斯腐痂下之血管未充分中有血栓塊在未閉鎖前該腐痂剝脫而起其糞便呈黑赤色血痕狀之觀或混淆其他之腸內容物或為純血液性在純血液性之場合屢屢見凝固之血餅塊出血之量達一立或至二立失血強度之時患者之面貌呈尸色體溫低降往往在平溫以下且意識昏懵至此際右腸骨窩屢屢呈濁音在熟練之醫士只須觀察患者特徵的外貌更一檢其糞便即能推察得腸出血之存在矣出血之甚者在未排泄血便以前已至於死之轉歸矣凡腸出血在某症只一回之便血他症往往持續一日至三日亦有一時中止逾二三日後再發者其甚者亦有反覆數次云腸窒扶斯潰瘍進入之部分甚深往往接近於腸漿膜易於誘發腸穿孔及穿孔性腹膜炎三炎性併發症為窒扶斯桿菌或連鎖狀球菌或其他之病的侵入而起與否只須依炎性滲出物之細菌學的檢查便可決定窒扶斯桿菌在膿灶中得保持其數年之生活力又腸窒扶斯之經過中不論何種內臟得襲炎性併發症茲揭一二例如次氣管枝加答兒為極頻繁之併發症現於第一周之終末或第二周之始有時見肺炎耳下腺炎在本病併發症中頗為頻繁大多犯其一側兩側同時來者甚稀本症大多見於發病之第二周或第三周之終末亦有至恢復期始發現者耳炎亦為本病常見之併發症往往成鼓膜之穿孔蓐瘡最多往往生於薦骨部大轉子上此外尚有急性腎臟炎恩奇那等亦常見之療法本病之療法有漢法千古之聖典已詳述於傷寒論中今就本章所現之症候擬述其方法如次但不免有蛇足之譏耳前兆期通例現太陽病證老人虛弱人始現陰證即頭痛惡寒輕熱全身倦怠此其中用桂枝湯葛根湯麻黃湯之類麻黃湯之條下有身疼腰痛骨節疼痛云云此時期所現之症狀與神經病之症狀一致熱如階段狀之上進者小柴胡湯之證也此時舌上現白苔食欲亡失脾臟肝臟腫大耳鳴頭痛等舌現黃苔而乾燥舌尖赤大便祕者與大柴胡湯熱上稽留亦所謂潮熱大便祕讝語有搜衣摸床之狀亢奮高聲罵詈亂打自己之周圍或從病室逸走等之狀者用承氣湯類若無宿食停滯之候熱熾而口渴現如上之症狀時應用白虎湯遲鈍性之發喃語性譫妄不求飲食物或膀胱過充而不排尿或臥不適宜之地位身體亙數小時不變其體位者有陰症之意但亦有陽極似陰動極則靜者故宜參照脈腹舌等用真武湯或承氣湯之類腸管內發生多量之瓦斯苦腹部脹滿時用大小承氣湯梔子厚朴湯厚朴七物湯厚朴生薑半夏甘草人參湯之類下痢之時腹部仍堅實脈沉實者確為陽實之症應用大柴胡湯承氣湯之類一日下數回至十數回水樣之痢心下痞小便呈不利之狀者用人參湯若心下痞鞕腹中有雷鳴之狀者用甘草瀉心湯已陷於陰虛脈沉微惡寒有手足厥冷等之狀而下痢者用真武湯四逆加人參湯之類腸出血不止者用黃土湯黃歸膠艾湯人參湯四逆加人參湯此外之併發症可參照各疾病之條適宜用藥備考雜病紀聞平生壯實之人患傷寒其症亦劇此因正氣與邪氣相爭之故平常虛弱之人其症亦輕此因正氣弱相爭之力乏之故傷寒之為期大抵七八日壞症則大抵二十日而愈而其調理雖經四五十日不能復其平生之康健身體壯實者次要百日百日之間宜堅慎暑寒飲食心勞房事若此期不能養生則終生虛弱矣至於治療之大法最初惡寒頭痛甚口鼻乾有嘔氣發熱身體痛者傷寒之太陽症也一晝夜用葛根湯五六帖覆以被取其汗其病見重時用麻黃湯先覆以厚被再服以藥更啜熱粥以取汗發散之藥等咽下宜順速覆被後藥力已到則汗發如流水大抵經用三四日之發散劑則惡寒頭痛止表證去而為半表半裡之症倘經三四日發散劑而惡寒頭痛猶不止者仍用發散劑早在表症之間者移用柴胡湯此柴胡大抵早則二日遲則七八日表症之目的為惡寒發熱嘔益甚舌上有厚黃苔小便之色赤者柴胡之證也四五日中現出柴胡症者用小柴胡湯七八九日食益不進譫語煩渴大便五六日不通者此屬陽明裡症也此時如有不少之柴胡症殘留者用大柴胡湯若譫語甚舌苔黑遍身晝夜出汗者用大承氣湯使譫語輕而止其汗其調理之藥見虛候之時則以益氣湯調理之此為傷寒療治之大道又最初見陰症者用桂枝湯發表之虛候甚者用桂枝加附子湯麻黃附子細辛湯麻黃附子甘草湯等發散之太陰症才一二日即入於裡為少陰症不見里症者從症用真武湯附子湯四逆湯之類厥陰病者其經絡之症雖不多但非厥陰病之厥冷不得用附子劑凡陽氣里包之病猶火之入壺中急蓋其蓋則火氣穿通里穴若火盛而竟開蓋則火可消滅故傷寒論中有用麻黃升麻湯者此麻黃升麻為疏通表裡腠理之藥猶之對於蓋火之壺為之穿穴也其佐藥組合聊助陽滋潤津液之藥如見手足厥冷不得用附子乾薑之類用之厥冷反益甚甚至促其命期傷寒最初之治療第一發散既移於柴胡湯後即不宜發表因表虛之人苟稍稍發表即汗出如流者用桂枝加附子湯以逐汗最初數日汗出如流津液無大便祕者知為陽明病宜快用下劑又最初如陽症津液乾燥七八日後舌上現黃苔或反之苔去舌薄色赤舌之皺點去如陰莖龜頭之肌喜吞極熱之湯者是落於陰症之候也用生脈散後世多以麥門冬為主藥脈現虛候者用附子粳米湯婦人傷寒熱甚時經水來其熱大熱入血室子宮必發狂或起痙病角弓反張口噤等熱俄去則又變症譫語發狂精神不正者柴胡湯為宜或柴胡湯中或加紅花甚有效痙病古人用葛根湯此症如已用過發表劑者用桂枝加大黃湯從少陽病之時分而現經水發痙者大柴胡湯為宜少陽症之時或陽明症之時嘔逆甚者用柴胡劑或小半夏加茯苓湯如嘔益甚致嘔出蛔蟲者此時考用鷓鴣菜湯或理中安蛔湯蛔盡則嘔止少陽病時渴甚舌上現厚黃苔實煩者用石膏湯用石膏而腹痛者即不應用石膏凡石膏對於適當之病咽下即有快覺陽明病時用大黃劑下痢而病人覺急快者實證也與下劑適應下痢後腹無力覺不快者即不應用下劑少陰病時脈微沉虛大舌薄而赤大便溏足微腫等此皆虛寒之候用附子劑附子劑不應服後反脈力減或腹滿心下痞塞或精神濛濛或痰喘發動或現上逆目赤等是等皆不應用溫補之劑宜另用他藥
